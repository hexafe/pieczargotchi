<style>
  :root {
    color-scheme: light;
    --ink: #221814;
    --muted: #6c6259;
    --paper: #fff8ea;
    --panel: #f9eccd;
    --panel-strong: #edd296;
    --green: #4f8f39;
    --green-dark: #24582c;
    --moss: #b6d66f;
    --water: #317fb5;
    --rose: #d8646f;
    --amber: #b97924;
    --shadow: rgba(63, 39, 17, 0.22);
    --border: #3c2b20;
    --radius: 8px;
    --pixel-font: "Trebuchet MS", "Verdana", sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  [hidden] {
    display: none !important;
  }

  html {
    min-height: 100%;
    background:
      linear-gradient(90deg, rgba(36, 88, 44, 0.05) 1px, transparent 1px),
      linear-gradient(rgba(36, 88, 44, 0.05) 1px, transparent 1px),
      #e7f0d0;
    background-size: 32px 32px;
  }

  body {
    min-height: 100%;
    margin: 0;
    color: var(--ink);
    font-family: var(--pixel-font);
    font-size: 16px;
    letter-spacing: 0;
  }

  button {
    font: inherit;
    letter-spacing: 0;
  }

  .app {
    width: min(1180px, calc(100% - 28px));
    margin: 0 auto;
    padding: 12px 0 18px;
  }

  .topbar {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 10px;
  }

  .topbar h1,
  .stage-toolbar h2,
  .block-heading h2 {
    margin: 0;
    line-height: 1.05;
  }

  .topbar h1 {
    font-size: 30px;
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .topbar__status,
  .stage-meta,
  .block-heading {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-pill,
  .stage-meta span,
  .block-heading > span,
  .shortcut-badge,
  .cooldown-chip {
    border: 2px solid var(--border);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
    color: var(--ink);
    font-size: 12px;
    font-weight: 800;
    line-height: 1;
  }

  .status-pill,
  .stage-meta span,
  .block-heading > span {
    padding: 7px 9px;
    border-radius: 999px;
  }

  .status-pill[data-mode="game-over"] {
    background: #3c2b20;
    color: #fff8ea;
  }

  .ghost-button {
    min-height: 34px;
    padding: 6px 10px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
    color: var(--ink);
    cursor: pointer;
    font-weight: 800;
  }

  .ghost-button:hover,
  .action-button:not(:disabled):hover,
  .battle-move-button:not(:disabled):hover,
  .battle-train-button:not(:disabled):hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--shadow);
  }

  .view-switch {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 4px;
    padding: 3px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
  }

  .view-switch__button {
    min-height: 28px;
    padding: 4px 8px;
    border: 0;
    border-radius: 5px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    font-weight: 900;
  }

  .view-switch__button[aria-pressed="true"] {
    background: var(--green);
    color: #fffdf7;
  }

  .game-grid {
    display: grid;
    grid-template-columns: minmax(420px, 1fr) minmax(320px, 374px);
    gap: 14px;
    align-items: start;
  }

  .stage-panel,
  .side-panel {
    border: 3px solid var(--border);
    border-radius: var(--radius);
    background: var(--paper);
    box-shadow: 6px 6px 0 var(--shadow);
  }

  .stage-panel {
    padding: 12px;
  }

  .side-panel {
    display: grid;
    gap: 9px;
    padding: 10px;
  }

  .stage-toolbar {
    display: flex;
    align-items: start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .stage-toolbar h2 {
    font-size: 22px;
  }

  .stage-meta {
    flex-wrap: wrap;
    justify-content: end;
  }

  .canvas-wrap {
    position: relative;
    width: 100%;
    max-width: 572px;
    margin: 0 auto;
    aspect-ratio: 1;
    border: 3px solid var(--border);
    border-radius: var(--radius);
    background: #ddefb8;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .message-panel {
    display: grid;
    gap: 3px;
    margin-top: 10px;
    min-height: 54px;
    padding: 8px 10px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
  }

  .message-panel strong {
    font-size: 15px;
  }

  .message-panel span {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.35;
  }

  .attention-chip {
    justify-self: start;
    padding: 4px 7px;
    border: 2px solid var(--border);
    border-radius: 999px;
    background: #fff2bf;
    color: var(--ink) !important;
    font-size: 11px !important;
    font-weight: 900;
    line-height: 1;
  }

  .attention-chip[data-severity="critical"] {
    background: #ffd1d1;
    color: #7d2424 !important;
  }

  .panel-block {
    display: grid;
    gap: 8px;
    min-width: 0;
    padding: 9px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--panel);
  }

  .panel-block--compact {
    gap: 8px;
  }

  .panel-block--log {
    background: #fff4d7;
  }

  .panel-block--debug {
    background: #eef2d8;
  }

  .panel-block--arena {
    background: #eef2d8;
  }

  .panel-block--minigames {
    background: #eef2d8;
  }

  .panel-block--decorations,
  .panel-block--history,
  .panel-block--backup {
    background: #fff4d7;
  }

  .panel-block--debug details {
    min-width: 0;
  }

  .panel-block--debug summary {
    cursor: pointer;
    font-size: 16px;
    font-weight: 900;
  }

  .debug-controls {
    display: grid;
    gap: 8px;
    margin-top: 8px;
  }

  .debug-controls label {
    display: grid;
    gap: 4px;
    min-width: 0;
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
  }

  .debug-toggle {
    display: flex !important;
    align-items: center;
    gap: 8px !important;
    color: var(--ink) !important;
  }

  .debug-row--split {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .debug-controls input,
  .debug-controls select {
    min-width: 0;
    min-height: 31px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: #fffdf7;
    color: var(--ink);
    font: inherit;
    font-size: 12px;
    font-weight: 800;
  }

  .debug-controls input[type="checkbox"] {
    width: 18px;
    min-width: 18px;
    height: 18px;
    min-height: 18px;
    margin: 0;
  }

  .debug-range {
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
  }

  .debug-range input {
    grid-column: 1 / -1;
    min-height: 24px;
  }

  .debug-range span {
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }

  .debug-stats {
    display: grid;
    gap: 6px;
  }

  .debug-stat-row {
    display: grid;
    grid-template-columns: 72px minmax(0, 1fr) 36px;
    gap: 7px;
    align-items: center;
    min-width: 0;
  }

  .debug-stat-row span {
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
  }

  .debug-actions {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 6px;
  }

  .debug-actions .ghost-button {
    min-height: 30px;
    padding: 4px 6px;
    font-size: 11px;
  }

  .block-heading {
    justify-content: space-between;
  }

  .block-heading h2 {
    font-size: 16px;
  }

  .stats-list {
    display: grid;
    gap: 6px;
  }

  .stat-row {
    display: grid;
    grid-template-columns: 98px 1fr 42px;
    gap: 8px;
    align-items: center;
    min-width: 0;
  }

  .stat-name,
  .stat-value {
    font-size: 13px;
    font-weight: 800;
  }

  .stat-track {
    height: 14px;
    border: 2px solid var(--border);
    border-radius: 999px;
    background: #fffdf7;
    overflow: hidden;
  }

  .stat-fill {
    width: 0%;
    height: 100%;
    background: var(--green);
    transition: width 180ms linear, background 180ms linear;
  }

  .stat-fill[data-level="low"] {
    background: var(--rose);
  }

  .stat-fill[data-level="medium"] {
    background: var(--amber);
  }

  .actions-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .battle-status,
  .battle-training,
  .battle-log {
    display: grid;
    gap: 6px;
  }

  .battle-meter-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto;
    gap: 8px;
    align-items: center;
    min-height: 32px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(60, 43, 32, 0.22);
  }

  .battle-meter-row span {
    min-width: 0;
    overflow: hidden;
    color: var(--muted);
    font-size: 13px;
    font-weight: 900;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .battle-meter-row strong,
  .arena-command-row span {
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
  }

  .arena-command-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
  }

  .battle-moves,
  .battle-training {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .battle-move-button,
  .battle-train-button {
    display: grid;
    gap: 3px;
    align-content: center;
    min-height: 48px;
    padding: 7px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
    color: var(--ink);
    cursor: pointer;
    text-align: left;
  }

  .battle-move-button:disabled,
  .battle-train-button:disabled {
    cursor: not-allowed;
    filter: grayscale(0.45);
    opacity: 0.62;
  }

  .battle-move-name,
  .battle-train-button span:first-child {
    min-width: 0;
    overflow: hidden;
    font-size: 12px;
    font-weight: 900;
    line-height: 1.12;
    text-overflow: clip;
    white-space: normal;
  }

  .battle-move-meta,
  .battle-train-button span:last-child {
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    line-height: 1.12;
  }

  .battle-log {
    min-height: 72px;
    max-height: 120px;
    margin: 0;
    padding: 0;
    list-style: none;
    overflow: auto;
  }

  .battle-log li {
    padding: 5px 0;
    border-bottom: 1px solid rgba(60, 43, 32, 0.2);
    color: var(--muted);
    font-size: 12px;
    line-height: 1.25;
  }

  .action-button {
    position: relative;
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr) 26px;
    gap: 7px;
    align-items: center;
    min-height: 40px;
    padding: 6px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
    color: var(--ink);
    cursor: pointer;
    text-align: left;
  }

  .action-button:disabled {
    cursor: not-allowed;
    filter: grayscale(0.55);
    opacity: 0.62;
  }

  .action-button.is-flashing {
    animation: button-flash 260ms steps(2, end);
  }

  .action-icon {
    display: grid;
    place-items: center;
    width: 34px;
    height: 30px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: var(--moss);
    font-size: 10px;
    font-weight: 900;
  }

  .action-label {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 13px;
    font-weight: 900;
  }

  .shortcut-badge,
  .cooldown-chip {
    display: inline-grid;
    place-items: center;
    min-width: 24px;
    min-height: 24px;
    padding: 4px;
    border-radius: 6px;
  }

  .cooldown-chip {
    position: absolute;
    right: 6px;
    bottom: 5px;
    min-width: 38px;
    min-height: 18px;
    padding: 2px 4px;
    background: #fffdf7;
    border: 1px solid rgba(60, 43, 32, 0.35);
    color: var(--rose);
    font-size: 10px;
  }

  .inventory-row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
  }

  .inventory-item {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 8px;
    min-height: 30px;
    padding: 5px 7px;
    border: 1px solid rgba(210, 190, 143, 0.62);
    border-radius: 6px;
    background: rgba(255, 253, 247, 0.78);
  }

  .inventory-label {
    min-width: 0;
    overflow: hidden;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .inventory-value {
    color: var(--ink);
    font-size: 13px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
  }

  .minigame-card,
  .decoration-item,
  .backup-actions,
  .minigame-hud {
    display: grid;
    gap: 8px;
    align-items: center;
  }

  .minigame-card,
  .decoration-item {
    grid-template-columns: minmax(0, 1fr) auto;
    min-height: 42px;
    padding: 6px 7px;
    border: 1px solid rgba(60, 43, 32, 0.26);
    border-radius: 6px;
    background: rgba(255, 253, 247, 0.78);
  }

  .minigame-card > div,
  .decoration-item__info {
    display: grid;
    gap: 2px;
    min-width: 0;
  }

  .minigame-card strong,
  .decoration-item strong {
    overflow: hidden;
    font-size: 13px;
    font-weight: 900;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .minigame-card span,
  .decoration-item span {
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
  }

  .minigame-playfield {
    display: grid;
    gap: 7px;
  }

  .dew-catch-canvas,
  .spore-pop-canvas {
    width: 100%;
    aspect-ratio: 5 / 3;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: #dff2c8;
    cursor: crosshair;
  }

  .spore-pop-canvas {
    background: #efe2bc;
  }

  .minigame-hud {
    grid-template-columns: auto auto minmax(82px, auto);
    justify-content: space-between;
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
  }

  .decoration-list {
    display: grid;
    gap: 6px;
  }

  .history-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
  }

  .history-item {
    display: grid;
    gap: 2px;
    min-width: 0;
    min-height: 38px;
    padding: 6px 7px;
    border: 1px solid rgba(60, 43, 32, 0.24);
    border-radius: 6px;
    background: rgba(255, 253, 247, 0.72);
  }

  .history-item span,
  .history-item strong {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-item span {
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
  }

  .history-item strong {
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
  }

  .backup-actions {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .event-log {
    display: grid;
    gap: 5px;
    min-height: 72px;
    max-height: 108px;
    margin: 0;
    padding: 0;
    list-style: none;
    overflow: auto;
  }

  .event-log li {
    padding: 6px 7px;
    border: 2px solid rgba(60, 43, 32, 0.3);
    border-radius: 6px;
    background: rgba(255, 253, 247, 0.74);
    color: var(--muted);
    font-size: 13px;
    line-height: 1.25;
  }

  @keyframes button-flash {
    0%,
    100% {
      background: #fffdf7;
    }

    50% {
      background: #d8f2a3;
    }
  }

  @media (max-width: 880px) {
    .app {
      width: min(100% - 18px, 620px);
      padding-top: 12px;
    }

    .topbar {
      align-items: start;
      flex-direction: column;
    }

    .topbar__status {
      width: 100%;
      justify-content: space-between;
    }

    .game-grid {
      grid-template-columns: 1fr;
    }

    .stage-panel {
      box-shadow: 4px 4px 0 var(--shadow);
    }

    .side-panel {
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .panel-block--actions {
      order: 1;
    }

    .panel-block--status {
      order: 2;
    }

    .panel-block--minigames {
      order: 3;
    }

    .panel-block--resources {
      order: 4;
    }

    .panel-block--decorations {
      order: 5;
    }

    .panel-block--history {
      order: 6;
    }

    .panel-block--backup {
      order: 7;
    }

    .panel-block--log {
      order: 8;
    }

    .panel-block--debug {
      order: 9;
    }

    .action-button {
      min-height: 48px;
    }
  }

  @media (pointer: coarse) {
    .shortcut-badge {
      display: none;
    }

    .action-button {
      grid-template-columns: 34px minmax(0, 1fr);
      min-height: 48px;
    }
  }

  @media (max-width: 640px) {
    html,
    body {
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      padding: 8px max(8px, env(safe-area-inset-left)) calc(14px + env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-right));
    }

    .topbar {
      align-items: center;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }

    .topbar h1 {
      font-size: 22px;
    }

    .topbar__status {
      width: auto;
      margin-left: auto;
      gap: 6px;
      justify-content: end;
    }

    .status-pill,
    .stage-meta span,
    .block-heading > span {
      padding: 6px 8px;
      font-size: 11px;
    }

    .ghost-button {
      min-height: 36px;
      padding: 6px 8px;
    }

    .game-grid {
      gap: 8px;
    }

    .stage-panel {
      padding: 8px;
      border-width: 2px;
      box-shadow: 3px 3px 0 var(--shadow);
    }

    .stage-toolbar {
      align-items: center;
      flex-direction: row;
      gap: 8px;
      margin-bottom: 6px;
    }

    .stage-toolbar h2 {
      font-size: 18px;
    }

    .eyebrow {
      display: none;
    }

    .stage-meta {
      gap: 5px;
      justify-content: end;
    }

    .canvas-wrap {
      max-width: min(100%, 360px);
      border-width: 2px;
    }

    .message-panel {
      min-height: 42px;
      margin-top: 8px;
      padding: 7px 8px;
    }

    .message-panel strong {
      font-size: 14px;
    }

    .message-panel span {
      font-size: 13px;
      line-height: 1.25;
    }

    .side-panel {
      gap: 8px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .panel-block {
      gap: 8px;
      padding: 8px;
    }

    .panel-block--actions {
      order: 1;
    }

    .panel-block--status {
      order: 2;
    }

    .panel-block--minigames {
      order: 3;
    }

    .panel-block--resources {
      order: 4;
    }

    .panel-block--decorations {
      order: 5;
    }

    .panel-block--history {
      order: 6;
    }

    .panel-block--backup {
      order: 7;
    }

    .panel-block--log {
      order: 8;
    }

    .panel-block--debug {
      order: 9;
    }

    .block-heading h2 {
      font-size: 15px;
    }

    .actions-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .action-button {
