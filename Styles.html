<style>
  :root {
    color-scheme: light;
    --ink: #221814;
    --muted: #6c6259;
    --paper: #fff8ea;
    --panel: #f9eccd;
    --panel-strong: #edd296;
    --green: #4f8f39;
    --green-dark: #24582c;
    --moss: #b6d66f;
    --water: #317fb5;
    --rose: #d8646f;
    --amber: #b97924;
    --shadow: rgba(63, 39, 17, 0.22);
    --border: #3c2b20;
    --radius: 8px;
    --pixel-font: "Trebuchet MS", "Verdana", sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  [hidden] {
    display: none !important;
  }

  html {
    min-height: 100%;
    background:
      linear-gradient(90deg, rgba(36, 88, 44, 0.05) 1px, transparent 1px),
      linear-gradient(rgba(36, 88, 44, 0.05) 1px, transparent 1px),
      #e7f0d0;
    background-size: 32px 32px;
  }

  body {
    min-height: 100%;
    margin: 0;
    color: var(--ink);
    font-family: var(--pixel-font);
    font-size: 16px;
    letter-spacing: 0;
  }

  html.is-name-gated,
  body.is-name-gated {
    overflow: hidden;
  }

  button {
    font: inherit;
    letter-spacing: 0;
  }

  .app {
    width: min(1180px, calc(100% - 28px));
    margin: 0 auto;
    padding: 12px 0 18px;
  }

  .build-badge {
    position: fixed;
    right: max(8px, env(safe-area-inset-right));
    bottom: max(6px, env(safe-area-inset-bottom));
    z-index: 8;
    max-width: calc(100vw - 18px);
    color: rgba(34, 24, 20, 0.48);
    font-size: 10px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: 0;
    pointer-events: none;
    text-shadow: 0 1px 0 rgba(255, 248, 234, 0.54);
    user-select: none;
  }

  .name-gate {
    position: fixed;
    inset: 0;
    z-index: 40;
    display: grid;
    place-items: center;
    padding: 18px;
    background: rgba(231, 240, 208, 0.86);
    backdrop-filter: blur(2px);
  }

  .name-gate[hidden] {
    display: none;
  }

  .name-gate__panel {
    width: min(360px, 100%);
    padding: 18px;
    border: 3px solid var(--border);
    border-radius: var(--radius);
    background: var(--paper);
    box-shadow: 6px 6px 0 var(--shadow);
  }

  .name-gate__panel h2 {
    margin: 0 0 14px;
    font-size: 26px;
    line-height: 1.05;
  }

  .name-gate__panel label {
    display: grid;
    gap: 6px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
  }

  .name-gate__panel input {
    width: 100%;
    min-height: 42px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    color: var(--ink);
    font: inherit;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0;
    padding: 8px 10px;
  }

  .name-gate__panel .ghost-button {
    width: 100%;
    margin-top: 12px;
  }

  .name-gate__error {
    display: block;
    min-height: 18px;
    margin-top: 8px;
    color: #9b2f33;
    font-size: 12px;
    font-weight: 800;
  }

  .topbar {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 10px;
  }

  .topbar h1,
  .stage-toolbar h2,
  .block-heading h2 {
    margin: 0;
    line-height: 1.05;
  }

  .topbar h1 {
    font-size: 30px;
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .topbar__status,
  .stage-meta,
  .block-heading {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-pill,
  .stage-meta span,
  .block-heading > span,
  .shortcut-badge,
  .cooldown-chip {
    border: 2px solid var(--border);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
    color: var(--ink);
    font-size: 12px;
    font-weight: 800;
    line-height: 1;
  }

  .status-pill,
  .stage-meta span,
  .block-heading > span {
    padding: 7px 9px;
    border-radius: 999px;
  }

  .status-pill[data-mode="game-over"] {
    background: #3c2b20;
    color: #fff8ea;
  }

  .ghost-button {
    min-height: 34px;
    padding: 6px 10px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
    color: var(--ink);
    cursor: pointer;
    font-weight: 800;
  }

  .ghost-button:hover,
  .action-button:not(:disabled):hover,
  .battle-move-button:not(:disabled):hover,
  .battle-train-button:not(:disabled):hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--shadow);
  }

  .ghost-button.is-reset-pending {
    background: #ffd1d1;
    color: #7d2424;
  }

  .view-switch {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 4px;
    padding: 3px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
  }

  .view-switch__button {
    min-height: 28px;
    padding: 4px 8px;
    border: 0;
    border-radius: 5px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    font-weight: 900;
  }

  .view-switch__button[aria-pressed="true"] {
    background: var(--green);
    color: #fffdf7;
  }

  .game-grid {
    display: grid;
    grid-template-columns: minmax(420px, 1fr) minmax(320px, 374px);
    gap: 14px;
    align-items: start;
  }

  .stage-panel,
  .side-panel {
    border: 3px solid var(--border);
    border-radius: var(--radius);
    background: var(--paper);
    box-shadow: 6px 6px 0 var(--shadow);
  }

  .stage-panel {
    padding: 12px;
  }

  .side-panel {
    display: grid;
    gap: 9px;
    padding: 10px;
  }

  .stage-toolbar {
    display: flex;
    align-items: start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .stage-toolbar h2 {
    font-size: 22px;
  }

  .stage-meta {
    flex-wrap: wrap;
    justify-content: end;
  }

  .canvas-wrap {
    position: relative;
    width: 100%;
    max-width: 572px;
    margin: 0 auto;
    aspect-ratio: 1;
    border: 3px solid var(--border);
    border-radius: var(--radius);
    background: #ddefb8;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .message-panel {
    display: grid;
    gap: 3px;
    margin-top: 10px;
    min-height: 54px;
    padding: 8px 10px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
  }

  .message-panel strong {
    font-size: 15px;
  }

  .message-panel span {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.35;
  }

  .attention-chip {
    justify-self: start;
    padding: 4px 7px;
    border: 2px solid var(--border);
    border-radius: 999px;
    background: #fff2bf;
    color: var(--ink) !important;
    font-size: 11px !important;
    font-weight: 900;
    line-height: 1;
  }

  .attention-chip[data-severity="critical"] {
    background: #ffd1d1;
    color: #7d2424 !important;
  }

  .daily-plan-strip {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 7px;
    margin-top: 9px;
  }

  .daily-rhythm-strip {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 7px;
    margin-top: 9px;
  }

  .daily-rhythm-button {
    display: grid;
    gap: 3px;
    min-height: 54px;
    padding: 6px 7px;
    border: 2px solid rgba(60, 43, 32, 0.34);
    border-radius: 7px;
    background: rgba(255, 253, 247, 0.78);
    color: var(--ink);
    cursor: pointer;
    text-align: left;
  }

  .daily-rhythm-button--selected {
    border-color: rgba(64, 128, 64, 0.72);
    background: rgba(223, 242, 200, 0.9);
  }

  .daily-rhythm-button:disabled {
    cursor: default;
    filter: grayscale(0.25);
    opacity: 0.68;
  }

  .daily-rhythm-button strong,
  .daily-rhythm-button span {
    min-width: 0;
    overflow-wrap: anywhere;
    line-height: 1.12;
  }

  .daily-rhythm-button strong {
    font-size: 12px;
    font-weight: 900;
  }

  .daily-rhythm-button span {
    color: var(--muted);
    font-size: 10px;
    font-weight: 800;
  }

  .daily-goal {
    display: grid;
    gap: 3px;
    min-width: 0;
    min-height: 76px;
    padding: 7px;
    border: 2px solid rgba(60, 43, 32, 0.36);
    border-radius: 7px;
    background: rgba(255, 253, 247, 0.84);
  }

  .daily-goal--done {
    background: rgba(223, 242, 200, 0.88);
  }

  .daily-goal span,
  .daily-goal strong {
    min-width: 0;
    overflow-wrap: anywhere;
    line-height: 1.12;
  }

  .daily-goal span:first-child {
    color: var(--green-dark);
    font-size: 10px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .daily-goal strong {
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
  }

  .daily-goal span:last-child {
    color: var(--muted);
    font-size: 11px;
    font-weight: 800;
  }

  .panel-block {
    display: grid;
    gap: 8px;
    min-width: 0;
    padding: 9px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--panel);
  }

  .panel-block--compact {
    gap: 8px;
  }

  .panel-block--log {
    background: #fff4d7;
  }

  .panel-block--debug {
    background: #eef2d8;
  }

  .panel-block--arena {
    background: #eef2d8;
  }

  .panel-block--minigames {
    background: #eef2d8;
  }

  .panel-block--decorations,
  .panel-block--discoveries,
  .panel-block--history,
  .panel-block--backup {
    background: #fff4d7;
  }

  .panel-block--debug details {
    min-width: 0;
  }

  .panel-block--debug summary {
    cursor: pointer;
    font-size: 16px;
    font-weight: 900;
  }

  .debug-controls {
    display: grid;
    gap: 8px;
    margin-top: 8px;
  }

  .debug-controls label {
    display: grid;
    gap: 4px;
    min-width: 0;
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
  }

  .debug-toggle {
    display: flex !important;
    align-items: center;
    gap: 8px !important;
    color: var(--ink) !important;
  }

  .debug-row--split {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .debug-controls input,
  .debug-controls select {
    min-width: 0;
    min-height: 31px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: #fffdf7;
    color: var(--ink);
    font: inherit;
    font-size: 12px;
    font-weight: 800;
  }

  .debug-controls input[type="checkbox"] {
    width: 18px;
    min-width: 18px;
    height: 18px;
    min-height: 18px;
    margin: 0;
  }

  .debug-range {
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
  }

  .debug-range input {
    grid-column: 1 / -1;
    min-height: 24px;
  }

  .debug-range span {
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }

  .debug-stats {
    display: grid;
    gap: 6px;
  }

  .debug-stat-row {
    display: grid;
    grid-template-columns: 72px minmax(0, 1fr) 36px;
    gap: 7px;
    align-items: center;
    min-width: 0;
  }

  .debug-stat-row span {
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
  }

  .debug-actions {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 6px;
  }

  .debug-actions .ghost-button {
    min-height: 30px;
    padding: 4px 6px;
    font-size: 11px;
  }

  .block-heading {
    justify-content: space-between;
  }

  .block-heading h2 {
    font-size: 16px;
  }

  .stats-list {
    display: grid;
    gap: 6px;
  }

  .stat-row {
    display: grid;
    grid-template-columns: 98px 1fr 42px;
    gap: 8px;
    align-items: center;
    min-width: 0;
  }

  .stat-name,
  .stat-value {
    font-size: 13px;
    font-weight: 800;
  }

  .stat-track {
    height: 14px;
    border: 2px solid var(--border);
    border-radius: 999px;
    background: #fffdf7;
    overflow: hidden;
  }

  .stat-fill {
    width: 0%;
    height: 100%;
    background: var(--green);
    transition: width 180ms linear, background 180ms linear;
  }

  .stat-fill[data-level="low"] {
    background: var(--rose);
  }

  .stat-fill[data-level="medium"] {
    background: var(--amber);
  }

  .actions-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .battle-status,
  .battle-training,
  .battle-log {
    display: grid;
    gap: 6px;
  }

  .battle-meter-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto;
    gap: 8px;
    align-items: center;
    min-height: 32px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(60, 43, 32, 0.22);
  }

  .battle-meter-row span {
    min-width: 0;
    overflow: hidden;
    color: var(--muted);
    font-size: 13px;
    font-weight: 900;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .battle-meter-row strong,
  .arena-command-row span {
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
  }

  .arena-command-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
  }

  .battle-moves,
  .battle-training {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .battle-move-button,
  .battle-train-button {
    display: grid;
    gap: 3px;
    align-content: center;
    min-height: 48px;
    padding: 7px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
    color: var(--ink);
    cursor: pointer;
    text-align: left;
  }

  .battle-move-button:disabled,
  .battle-train-button:disabled {
    cursor: not-allowed;
    filter: grayscale(0.45);
    opacity: 0.62;
  }

  .battle-move-name,
  .battle-train-button span:first-child {
    min-width: 0;
    overflow: hidden;
    font-size: 12px;
    font-weight: 900;
    line-height: 1.12;
    text-overflow: clip;
    white-space: normal;
  }

  .battle-move-meta,
  .battle-train-button span:last-child {
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    line-height: 1.12;
  }

  .battle-log {
    min-height: 72px;
    max-height: 120px;
    margin: 0;
    padding: 0;
    list-style: none;
    overflow: auto;
  }

  .battle-log li {
    padding: 5px 0;
    border-bottom: 1px solid rgba(60, 43, 32, 0.2);
    color: var(--muted);
    font-size: 12px;
    line-height: 1.25;
  }

  .discovery-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
  }

  .discovery-group {
    display: grid;
    gap: 5px;
  }

  .discovery-group h3 {
    margin: 0;
    color: var(--green-dark);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .discovery-group__items {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
  }

  .discovery-item {
    appearance: none;
    -webkit-appearance: none;
    display: grid;
    gap: 2px;
    width: 100%;
    min-height: 42px;
    padding: 6px 7px;
    border: 2px solid rgba(60, 43, 32, 0.32);
    border-radius: 6px;
    background: #fffdf7;
    color: inherit;
    font: inherit;
    text-align: left;
    cursor: pointer;
    transition: background-color 140ms ease, border-color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
  }

  .discovery-item:hover,
  .discovery-item:focus-visible {
    border-color: rgba(54, 91, 54, 0.64);
    background: #fffaf0;
    box-shadow: 0 3px 0 rgba(60, 43, 32, 0.18);
    outline: none;
    transform: translateY(-1px);
  }

  .discovery-item strong,
  .discovery-item span {
    min-width: 0;
    overflow: hidden;
    overflow-wrap: anywhere;
    text-overflow: clip;
    white-space: normal;
  }

  .discovery-item strong {
    font-size: 12px;
    font-weight: 900;
  }

  .discovery-item span {
    color: var(--muted);
    font-size: 11px;
    font-weight: 850;
  }

  .discovery-item--locked {
    cursor: default;
    filter: grayscale(0.45);
    opacity: 0.66;
  }

  .discovery-item:disabled {
    color: inherit;
  }

  .discovery-item--locked:hover,
  .discovery-item--locked:focus-visible {
    border-color: rgba(60, 43, 32, 0.32);
    background: #fffdf7;
    box-shadow: none;
    transform: none;
  }

  .calendar-checklist {
    display: grid;
    gap: 7px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(60, 43, 32, 0.18);
  }

  .calendar-checklist__heading {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    color: var(--green-dark);
    font-size: 11px;
    font-weight: 900;
  }

  .calendar-checklist__heading span {
    color: var(--muted);
    text-align: right;
  }

  .calendar-checklist__list {
    display: grid;
    gap: 5px;
    max-height: 260px;
    overflow: auto;
    padding-right: 2px;
  }

  .calendar-checklist__teaser,
  .calendar-event {
    border: 2px solid rgba(60, 43, 32, 0.24);
    border-radius: 6px;
    background: rgba(255, 253, 247, 0.82);
  }

  .calendar-checklist__teaser {
    padding: 6px 8px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 850;
  }

  .calendar-event {
    display: grid;
    grid-template-columns: 18px minmax(0, 1fr);
    gap: 6px;
    min-height: 42px;
    padding: 6px 7px;
  }

  .calendar-event--active {
    border-color: rgba(223, 155, 54, 0.66);
    background: #fff8df;
  }

  .calendar-event--checked {
    border-color: rgba(76, 124, 62, 0.5);
  }

  .calendar-event__marker {
    display: grid;
    place-items: center;
    width: 18px;
    height: 18px;
    border-radius: 5px;
    background: rgba(76, 124, 62, 0.12);
    color: var(--green-dark);
    font-size: 12px;
    font-weight: 950;
  }

  .calendar-event__body {
    display: grid;
    gap: 2px;
    min-width: 0;
  }

  .calendar-event strong,
  .calendar-event span {
    min-width: 0;
    overflow-wrap: anywhere;
  }

  .calendar-event strong {
    font-size: 12px;
    font-weight: 900;
  }

  .calendar-event span {
    color: var(--muted);
    font-size: 11px;
    font-weight: 850;
  }

  .calendar-checklist--locked .calendar-event {
    filter: grayscale(0.25);
    opacity: 0.76;
  }

  .journal-tooltip {
    position: fixed;
    z-index: 50;
    max-width: min(280px, calc(100vw - 28px));
    padding: 8px 10px;
    border: 2px solid rgba(56, 42, 32, 0.72);
    border-radius: 7px;
    background: rgba(255, 253, 247, 0.96);
    box-shadow: 0 8px 18px rgba(43, 29, 18, 0.22);
    color: var(--ink);
    font-size: 12px;
    line-height: 1.35;
    pointer-events: none;
  }

  .journal-tooltip strong {
    display: block;
    margin-bottom: 2px;
    color: var(--green-dark);
    font-size: 12px;
    font-weight: 900;
  }

  .journal-tooltip span {
    display: block;
    color: var(--muted);
    font-weight: 800;
  }

  .journal-polaroid {
    position: fixed;
    z-index: 60;
    display: grid;
    grid-template-columns: 164px minmax(0, 1fr);
    gap: 11px;
    width: min(430px, calc(100vw - 24px));
    padding: 12px 34px 12px 12px;
    border: 2px solid rgba(61, 43, 31, 0.78);
    border-radius: 8px;
    background: #fffaf0;
    box-shadow: 0 18px 32px rgba(43, 29, 18, 0.28);
    color: var(--ink);
