<style>
  :root {
    color-scheme: light;
    --ink: #221814;
    --muted: #6c6259;
    --paper: #fff8ea;
    --panel: #f9eccd;
    --panel-strong: #edd296;
    --green: #4f8f39;
    --green-dark: #24582c;
    --moss: #b6d66f;
    --water: #317fb5;
    --rose: #d8646f;
    --amber: #b97924;
    --shadow: rgba(63, 39, 17, 0.22);
    --border: #3c2b20;
    --radius: 8px;
    --pixel-font: "Trebuchet MS", "Verdana", sans-serif;
    --instant-film-paper: #f7efdc;
    --instant-film-paper-deep: #eadfc8;
    --instant-film-ink: #4d443b;
    --instant-film-shadow: rgba(48, 35, 24, 0.28);
  }

  * {
    box-sizing: border-box;
  }

  [hidden] {
    display: none !important;
  }

  .visually-hidden {
    position: absolute !important;
    width: 1px !important;
    height: 1px !important;
    padding: 0 !important;
    margin: -1px !important;
    overflow: hidden !important;
    clip: rect(0 0 0 0) !important;
    clip-path: inset(50%) !important;
    border: 0 !important;
    white-space: nowrap !important;
  }

  html {
    min-height: 100%;
    background:
      linear-gradient(90deg, rgba(36, 88, 44, 0.05) 1px, transparent 1px),
      linear-gradient(rgba(36, 88, 44, 0.05) 1px, transparent 1px),
      #e7f0d0;
    background-size: 32px 32px;
  }

  body {
    min-height: 100%;
    margin: 0;
    color: var(--ink);
    font-family: var(--pixel-font);
    font-size: 16px;
    letter-spacing: 0;
  }

  html.is-name-gated,
  body.is-name-gated {
    overflow: hidden;
  }

  button {
    font: inherit;
    letter-spacing: 0;
  }

  .app {
    width: min(1208px, 100%);
    margin: 0 auto;
    padding:
      max(12px, env(safe-area-inset-top))
      max(14px, env(safe-area-inset-right))
      max(18px, env(safe-area-inset-bottom))
      max(14px, env(safe-area-inset-left));
  }

  .build-badge {
    position: fixed;
    right: max(8px, env(safe-area-inset-right));
    bottom: max(6px, env(safe-area-inset-bottom));
    z-index: 8;
    max-width: calc(100vw - 18px);
    color: rgba(34, 24, 20, 0.32);
    font-size: 9px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: 0;
    opacity: 0.78;
    pointer-events: none;
    text-shadow: 0 1px 0 rgba(255, 248, 234, 0.54);
    user-select: none;
  }

  .name-gate {
    position: fixed;
    inset: 0;
    z-index: 40;
    display: grid;
    place-items: center;
    padding:
      max(18px, env(safe-area-inset-top))
      max(18px, env(safe-area-inset-right))
      max(18px, env(safe-area-inset-bottom))
      max(18px, env(safe-area-inset-left));
    background: rgba(231, 240, 208, 0.86);
    backdrop-filter: blur(2px);
  }

  .name-gate[hidden] {
    display: none;
  }

  .name-gate__panel {
    width: min(360px, 100%);
    padding: 18px;
    border: 3px solid var(--border);
    border-radius: var(--radius);
    background: var(--paper);
    box-shadow: 6px 6px 0 var(--shadow);
  }

  .name-gate__panel h2 {
    margin: 0 0 14px;
    font-size: 26px;
    line-height: 1.05;
  }

  .name-gate__panel label {
    display: grid;
    gap: 6px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
  }

  .name-gate__panel input {
    width: 100%;
    min-height: 42px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    color: var(--ink);
    font: inherit;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0;
    padding: 8px 10px;
  }

  .name-gate__panel .ghost-button {
    width: 100%;
    margin-top: 12px;
  }

  .name-gate__error {
    display: block;
    min-height: 18px;
    margin-top: 8px;
    color: #9b2f33;
    font-size: 12px;
    font-weight: 800;
  }

  .topbar {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 10px;
  }

  .topbar h1,
  .stage-toolbar h2,
  .block-heading h2 {
    margin: 0;
    line-height: 1.05;
  }

  .topbar h1 {
    font-size: 30px;
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .topbar__status,
  .stage-meta,
  .block-heading {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-pill,
  .stage-meta span,
  .block-heading > span,
  .shortcut-badge,
  .cooldown-chip {
    border: 2px solid var(--border);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
    color: var(--ink);
    font-size: 12px;
    font-weight: 800;
    line-height: 1;
  }

  .status-pill,
  .stage-meta span,
  .block-heading > span {
    padding: 7px 9px;
    border-radius: 999px;
  }

  .status-pill[data-mode="game-over"] {
    background: #3c2b20;
    color: #fff8ea;
  }

  .ghost-button {
    min-height: 34px;
    padding: 6px 10px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
    color: var(--ink);
    cursor: pointer;
    font-weight: 800;
  }

  .ghost-button:hover,
  .action-button:not(:disabled):hover,
  .battle-move-button:not(:disabled):hover,
  .battle-train-button:not(:disabled):hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--shadow);
  }

  .ghost-button.is-reset-pending {
    background: #ffd1d1;
    color: #7d2424;
  }

  .view-switch {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 4px;
    padding: 3px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
  }

  .view-switch__button {
    min-height: 28px;
    padding: 4px 8px;
    border: 0;
    border-radius: 5px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    font-weight: 900;
  }

  .view-switch__button[aria-pressed="true"] {
    background: var(--green);
    color: #fffdf7;
  }

  .game-grid {
    display: grid;
    grid-template-columns: minmax(420px, 1fr) minmax(320px, 374px);
    gap: 14px;
    align-items: start;
  }

  .stage-panel,
  .side-panel {
    border: 3px solid var(--border);
    border-radius: var(--radius);
    background: var(--paper);
    box-shadow: 6px 6px 0 var(--shadow);
  }

  .stage-panel {
    padding: 12px;
  }

  .side-panel {
    display: grid;
    gap: 9px;
    padding: 10px;
  }

  .stage-toolbar {
    display: flex;
    align-items: start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .stage-toolbar h2 {
    font-size: 22px;
  }

  .stage-meta {
    flex-wrap: wrap;
    justify-content: end;
  }

  .canvas-wrap {
    position: relative;
    width: 100%;
    max-width: 572px;
    margin: 0 auto;
    aspect-ratio: 1;
    border: 3px solid var(--border);
    border-radius: var(--radius);
    background: #ddefb8;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    touch-action: auto;
  }

  #mushroomCanvas {
    touch-action: pan-y pinch-zoom;
  }

  .persistence-banner {
    position: relative;
    z-index: 12;
    max-width: 760px;
    margin: 8px auto;
    padding: 7px 10px;
    border: 2px solid var(--border);
    border-radius: 7px;
    background: #fff0b8;
    color: #4f3b24;
    font-size: 12px;
    font-weight: 900;
    line-height: 1.3;
  }

  .persistence-banner[data-tone="danger"] {
    background: #ffd5c9;
    color: #6c2f2d;
  }

  .message-panel {
    display: grid;
    gap: 3px;
    margin-top: 10px;
    min-height: 54px;
    padding: 8px 10px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
  }

  .message-panel strong {
    font-size: 15px;
  }

  .message-panel span {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.35;
  }

  .message-panel .game-over-reset {
    justify-self: start;
    margin-top: 5px;
  }

  .world-explore {
    position: relative;
    z-index: 9;
    display: grid;
    gap: 6px;
    width: min(100%, 512px);
    margin: 8px auto 0;
  }

  .world-explore__toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    min-height: 44px;
    justify-self: center;
    background: #eef4d4;
    color: #284f2b;
  }

  .world-explore__toggle[aria-expanded="true"] {
    border-color: var(--green-dark);
    background: #dff2c8;
  }

  .world-explore__toggle kbd {
    display: inline-grid;
    place-items: center;
    min-width: 24px;
    min-height: 24px;
    padding: 2px 5px;
    border: 1px solid currentColor;
    border-radius: 5px;
    background: rgba(255, 253, 247, 0.78);
    font: inherit;
    font-size: 11px;
    font-weight: 950;
    line-height: 1;
  }

  .world-explore__actions {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 6px;
    padding: 8px;
    border: 1px solid rgba(60, 43, 32, 0.42);
    border-left: 4px solid var(--green);
    border-radius: 7px;
    background: #fffdf7;
  }

  .world-explore__actions .ghost-button {
    min-width: 0;
    min-height: 44px;
    padding: 6px 7px;
    box-shadow: none;
    font-size: 12px;
    line-height: 1.15;
  }

  .world-explore__actions .ghost-button[aria-disabled="true"] {
    border-color: rgba(60, 43, 32, 0.34);
    background: #eee8dc;
    color: #5b524b;
    cursor: help;
  }

  .world-explore__status {
    grid-column: 1 / -1;
    margin: 0;
    color: #3f4937;
    font-size: 12px;
    font-weight: 800;
    line-height: 1.3;
  }

  .world-explore__status:empty {
    display: none;
  }

  .attention-chip {
    justify-self: start;
    padding: 4px 7px;
    border: 2px solid var(--border);
    border-radius: 999px;
    background: #fff2bf;
    color: var(--ink) !important;
    font-size: 11px !important;
    font-weight: 900;
    line-height: 1;
  }

  .attention-chip[data-severity="critical"] {
    background: #ffd1d1;
    color: #7d2424 !important;
  }

  .daily-plan-strip {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 7px;
    margin-top: 9px;
  }

  .daily-rhythm-strip {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 7px;
    margin-top: 9px;
  }

  .daily-rhythm-button {
    display: grid;
    gap: 3px;
    min-height: 54px;
    padding: 6px 7px;
    border: 2px solid rgba(60, 43, 32, 0.34);
    border-radius: 7px;
    background: rgba(255, 253, 247, 0.78);
    color: var(--ink);
    cursor: pointer;
    text-align: left;
  }

  .daily-rhythm-button--selected {
    border-color: rgba(64, 128, 64, 0.72);
    background: rgba(223, 242, 200, 0.9);
  }

  .daily-rhythm-button:disabled {
    cursor: default;
    filter: grayscale(0.25);
    opacity: 0.68;
  }

  .daily-rhythm-button strong,
  .daily-rhythm-button span {
    min-width: 0;
    overflow-wrap: anywhere;
    line-height: 1.12;
  }

  .daily-rhythm-button strong {
    font-size: 12px;
    font-weight: 900;
  }

  .daily-rhythm-button span {
    color: var(--muted);
    font-size: 10px;
    font-weight: 800;
  }

  .daily-goal {
    display: grid;
    gap: 3px;
    min-width: 0;
    min-height: 76px;
    padding: 7px;
    border: 2px solid rgba(60, 43, 32, 0.36);
    border-radius: 7px;
    background: rgba(255, 253, 247, 0.84);
  }

  .daily-goal--done {
    background: rgba(223, 242, 200, 0.88);
  }

  .daily-goal span,
  .daily-goal strong {
    min-width: 0;
    overflow-wrap: anywhere;
    line-height: 1.12;
  }

  .daily-goal span:first-child {
    color: var(--green-dark);
    font-size: 10px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .daily-goal strong {
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
  }

  .daily-goal span:last-child {
    color: var(--muted);
    font-size: 11px;
    font-weight: 800;
  }

  .panel-block {
    display: grid;
    gap: 8px;
    min-width: 0;
    padding: 9px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--panel);
  }

  .panel-block--compact {
    gap: 8px;
  }

  .panel-block--log {
    background: #fff4d7;
  }

  .panel-block--debug {
    background: #eef2d8;
  }

  .panel-block--arena {
    background: #eef2d8;
  }

  .panel-block--minigames {
    background: #eef2d8;
  }

  .panel-block--long-loop {
    background: #f7efd8;
  }

  .panel-block--decorations,
  .panel-block--discoveries,
  .panel-block--history,
  .panel-block--backup {
    background: #fff4d7;
  }

  .panel-block--debug details {
    min-width: 0;
  }

  .panel-block--debug summary {
    cursor: pointer;
    font-size: 16px;
    font-weight: 900;
  }

  .debug-controls {
    display: grid;
    gap: 8px;
    margin-top: 8px;
  }

  .debug-controls label {
    display: grid;
    gap: 4px;
    min-width: 0;
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
  }

  .debug-toggle {
    display: flex !important;
    align-items: center;
    gap: 8px !important;
    color: var(--ink) !important;
  }

  .debug-row--split {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .debug-controls input,
  .debug-controls select {
    min-width: 0;
    min-height: 31px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: #fffdf7;
    color: var(--ink);
    font: inherit;
    font-size: 12px;
    font-weight: 800;
  }

  .debug-controls input[type="checkbox"] {
    width: 18px;
    min-width: 18px;
    height: 18px;
    min-height: 18px;
    margin: 0;
  }

  .debug-range {
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
  }

  .debug-range input {
    grid-column: 1 / -1;
    min-height: 24px;
  }

  .debug-range span {
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }

  .debug-stats {
    display: grid;
    gap: 6px;
  }

  .debug-stat-row {
    display: grid;
    grid-template-columns: 72px minmax(0, 1fr) 36px;
    gap: 7px;
    align-items: center;
    min-width: 0;
  }

  .debug-stat-row span {
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
  }

  .debug-actions {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 6px;
  }

  .debug-actions .ghost-button {
    min-height: 30px;
    padding: 4px 6px;
    font-size: 11px;
  }

  .block-heading {
    justify-content: space-between;
  }

  .block-heading h2 {
    font-size: 16px;
  }

  .stats-list {
    display: grid;
    gap: 6px;
  }

  .stat-row {
    display: grid;
    grid-template-columns: 98px 1fr 42px;
    gap: 8px;
    align-items: center;
    min-width: 0;
  }

  .stat-name,
  .stat-value {
    font-size: 13px;
    font-weight: 800;
  }

  .stat-track {
    position: relative;
    height: 14px;
    border: 2px solid var(--border);
    border-radius: 999px;
    background: #f4e8cd;
    overflow: hidden;
  }

  .stat-fill {
    width: 0%;
    height: 100%;
    background: var(--green);
    transition: width 180ms linear, background 180ms linear;
  }

  .stat-fill[data-level="low"] {
    background: var(--rose);
  }

  .stat-fill[data-level="medium"] {
    background: var(--amber);
  }

  .stat-row[data-level="low"] .stat-name,
  .stat-row[data-level="low"] .stat-value {
    color: #8f2d35;
  }

  .stat-row[data-level="low"] .stat-track {
    border-color: #8f2d35;
    background: #ffe6da;
  }

  .stat-row[data-stat="growth"][data-value="0"] .stat-track::after {
    content: "Początek";
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    color: rgba(60, 43, 32, 0.58);
    font-size: 9px;
    font-weight: 900;
    line-height: 1;
  }

  .actions-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .battle-status,
  .battle-training,
  .battle-log,
  .legendary-hub,
  .legendary-game-grid,
  .legendary-album {
    display: grid;
    gap: 6px;
  }

  .battle-meter-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto;
    gap: 8px;
    align-items: center;
    min-height: 32px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(60, 43, 32, 0.22);
  }

  .battle-meter-row span {
    min-width: 0;
    overflow: hidden;
    color: var(--muted);
    font-size: 13px;
    font-weight: 900;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .battle-meter-row strong,
  .arena-command-row span {
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
  }

  .arena-command-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
  }

  .battle-moves,
  .battle-training {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .battle-move-button,
  .battle-train-button {
    display: grid;
    gap: 3px;
    align-content: center;
    min-height: 48px;
    padding: 7px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
    color: var(--ink);
    cursor: pointer;
    text-align: left;
  }

  .battle-move-button:disabled,
  .battle-train-button:disabled {
    cursor: not-allowed;
    filter: grayscale(0.45);
    opacity: 0.62;
  }

  .battle-move-name,
  .battle-train-button span:first-child {
    min-width: 0;
    overflow: hidden;
    font-size: 12px;
    font-weight: 900;
    line-height: 1.12;
    text-overflow: clip;
    white-space: normal;
  }

  .battle-move-meta,
  .battle-train-button span:last-child {
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    line-height: 1.12;
  }

  .battle-log {
    min-height: 72px;
    max-height: 120px;
    margin: 0;
    padding: 0;
    list-style: none;
    overflow: visible;
  }

  .battle-log li {
    padding: 5px 0;
    border-bottom: 1px solid rgba(60, 43, 32, 0.2);
    color: var(--muted);
    font-size: 12px;
    line-height: 1.25;
  }

  .legendary-status-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
    min-height: 28px;
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
  }

  .legendary-status-row span {
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .legendary-game-card {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
    min-height: 48px;
    padding: 7px;
    border: 1px solid rgba(60, 43, 32, 0.28);
    border-radius: 6px;
    background: rgba(255, 253, 247, 0.82);
  }

  .legendary-game-card.is-featured {
    border-color: rgba(141, 120, 196, 0.62);
    background: #f7f0da;
  }

  .legendary-game-card.is-active {
    border-color: rgba(79, 143, 57, 0.72);
  }

  .legendary-game-card > div {
    display: grid;
    gap: 2px;
    min-width: 0;
  }

  .legendary-game-card strong,

  .discovery-grid {

  .discovery-group {

  }

  .discovery-group h3 {
    margin: 0;
    color: var(--green-dark);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .discovery-group__items {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(144px, 1fr));
    align-items: start;
    gap: 10px;
  }

  .discovery-group__items:empty,
  .discovery-group__locked:empty {
    display: none;
  }

  .discovery-group__locked {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
  }

  .discovery-group__locked-heading {
    margin: 0;
    grid-column: 1 / -1;
    color: var(--muted);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.035em;
    text-transform: uppercase;
  }

  .discovery-item {
    appearance: none;
    -webkit-appearance: none;
    position: relative;
    display: grid;
    gap: 2px;
    width: 100%;
    min-height: 44px;
    padding: 6px 7px;
    border: 2px solid rgba(60, 43, 32, 0.32);
    border-radius: 6px;
    background: #fffdf7;
    color: inherit;
    font: inherit;
    text-align: left;
    cursor: pointer;
    transition: background-color 140ms ease, border-color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
  }

  .discovery-item--polaroid {
    --instant-film-edge: clamp(5px, 4%, 8px);
    --instant-stamp-ink: #607462;
    isolation: isolate;
    min-height: 0;
    aspect-ratio: 88.47 / 107.52;
    grid-template-rows: auto minmax(0, 1fr);
    gap: 0;
    padding: var(--instant-film-edge);
    overflow: hidden;
    border: 1px solid rgba(72, 57, 43, 0.22);
    border-radius: 2px;
    background:
      radial-gradient(circle at 18% 12%, rgba(255,255,255,0.54), transparent 30%),
      radial-gradient(circle at 84% 78%, rgba(173,143,103,0.08), transparent 34%),
      var(--instant-film-paper);
    box-shadow: 0 9px 16px var(--instant-film-shadow);
    transform: rotate(var(--journal-tilt, 0deg));
  }

  .discovery-item--polaroid::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: -1;
    background: repeating-linear-gradient(83deg, rgba(104,78,51,0.025) 0 1px, transparent 1px 7px);
    pointer-events: none;
  }

  .discovery-item__photo {
    position: relative;
    display: block;
    width: 100%;
    aspect-ratio: 1 / 1;
    margin: 0;
    overflow: hidden;
    border: 0;
    background: #d8dcc7;
    box-shadow: 0 0 0 1px rgba(78, 62, 46, 0.14);
  }

  .discovery-item__photo canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    transition: opacity 160ms ease;
  }

  .discovery-item__photo[data-journal-polaroid-photo-state="loading"]::after {
    content: "Wywołuję…";
    position: absolute;
    right: 5px;
    bottom: 5px;
    padding: 2px 4px;
    border-radius: 3px;
    background: rgba(255, 250, 240, 0.86);
    color: #554b43;
    font-size: 9px;
    font-weight: 900;
  }

  .discovery-item__photo[data-journal-polaroid-photo-state="loading"] canvas {
    opacity: 0.56;
  }

  .discovery-item:hover,
  .discovery-item:focus-visible {
    border-color: rgba(54, 91, 54, 0.64);
    background: #fffaf0;
    box-shadow: 0 3px 0 rgba(60, 43, 32, 0.18);
    outline: none;
    transform: translateY(-1px);
  }

  .discovery-item--polaroid:hover,
  .discovery-item--polaroid:focus-visible {
    border-color: rgba(72, 57, 43, 0.36);
    background:
      radial-gradient(circle at 18% 12%, rgba(255,255,255,0.54), transparent 30%),
      radial-gradient(circle at 84% 78%, rgba(173,143,103,0.08), transparent 34%),
      var(--instant-film-paper);
    box-shadow: 0 12px 20px rgba(48, 35, 24, 0.32);
    transform: translateY(-2px) rotate(var(--journal-tilt, 0deg));
  }

  .discovery-item strong,
  .discovery-item span {
    min-width: 0;
    overflow: hidden;
    overflow-wrap: anywhere;
    text-overflow: clip;
    white-space: normal;
  }

  .discovery-item strong {
    font-size: 13px;
    line-height: 1.2;
    font-weight: 900;
  }

  .discovery-item__print-footer {
    position: relative;
    z-index: 1;
    display: grid !important;
    align-content: center;
    min-width: 0;
    min-height: 0;
    gap: 1px;
    padding: 2px 2px 0;
    color: var(--instant-film-ink) !important;
    text-align: left;
  }

  .discovery-item__print-footer > strong {
    display: -webkit-box;
    overflow: hidden;
    color: var(--instant-film-ink);
    font-size: 10px;
    line-height: 1;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
  }

  .discovery-item span {
    color: var(--muted);
    font-size: 11.5px;
    font-weight: 850;
  }

  .discovery-item__print-footer > span {
    display: block;
    overflow: hidden;
    color: rgba(77, 68, 59, 0.72);
    font-size: 8px;
    font-weight: 850;
    line-height: 1;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .discovery-item--locked {
    cursor: help;
    filter: grayscale(0.45);
    opacity: 0.76;
  }

  .discovery-item:disabled {
    color: inherit;
  }

  .discovery-item--locked:hover,
  .discovery-item--locked:focus-visible {
    border-color: rgba(60, 43, 32, 0.32);
    background: #fffdf7;
    box-shadow: none;
    transform: none;
  }

  .calendar-checklist {
    display: grid;
    gap: 7px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(60, 43, 32, 0.18);
  }

  .calendar-checklist__heading {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    color: var(--green-dark);
    font-size: 11px;
    font-weight: 900;
  }

  .calendar-checklist__heading span {
    color: var(--muted);
    text-align: right;
  }

  .calendar-checklist__list {
    display: grid;
    gap: 5px;
    max-height: 260px;
    overflow: auto;
    padding-right: 2px;
  }

  .calendar-checklist__teaser,
  .calendar-checklist__reward,
  .calendar-event {
    border: 2px solid rgba(60, 43, 32, 0.24);
    border-radius: 6px;
    background: rgba(255, 253, 247, 0.82);
  }

  .calendar-checklist__teaser,
  .calendar-checklist__reward {
    display: grid;
    gap: 2px;
    padding: 6px 8px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 850;
  }

  .calendar-checklist__reward {
    border-color: rgba(76, 124, 62, 0.42);
    background: #f5f2df;
  }

  .calendar-checklist__reward strong {
    color: var(--green-dark);
    font-size: 12px;
    font-weight: 900;
  }

  .calendar-checklist__reward span {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.22;
  }

  .calendar-event {
    display: grid;
    grid-template-columns: 18px minmax(0, 1fr);
    gap: 6px;
    min-height: 42px;
    padding: 6px 7px;
  }

  .calendar-event--active {
    border-color: rgba(223, 155, 54, 0.66);
    background: #fff8df;
  }

  .calendar-event--checked {
    border-color: rgba(76, 124, 62, 0.5);
  }

  .calendar-event__marker {
    display: grid;
    place-items: center;
    width: 18px;
    height: 18px;
    border-radius: 5px;
    background: rgba(76, 124, 62, 0.12);
    color: var(--green-dark);
    font-size: 12px;
    font-weight: 950;
  }

  .calendar-event__body {
    display: grid;
    gap: 2px;
    min-width: 0;
  }

  .calendar-event strong,
  .calendar-event span {
    min-width: 0;
    overflow-wrap: anywhere;
  }

  .calendar-event strong {
    font-size: 12px;
    font-weight: 900;
  }

  .calendar-event span {
    color: var(--muted);
    font-size: 11px;
    font-weight: 850;
  }

  .calendar-checklist--locked .calendar-event {
    filter: grayscale(0.25);
    opacity: 0.76;
  }

  .journal-tooltip {
    position: fixed;
    z-index: 50;
    max-width: min(280px, calc(100vw - 28px));
    padding: 8px 10px;
    border: 2px solid rgba(56, 42, 32, 0.72);
    border-radius: 7px;
    background: rgba(255, 253, 247, 0.96);
    box-shadow: 0 8px 18px rgba(43, 29, 18, 0.22);
    color: var(--ink);
    font-size: 12px;
    line-height: 1.35;
    pointer-events: none;
  }

  .journal-tooltip strong {
    display: block;
    margin-bottom: 2px;
    color: var(--green-dark);
    font-size: 12px;
    font-weight: 900;
  }

  .journal-tooltip span {
    display: block;
    color: var(--muted);
    font-weight: 800;
  }

  .journal-polaroid {
    --instant-film-edge: clamp(12px, 4.1%, 18px);
    --instant-stamp-ink: #607462;
    position: fixed;
    z-index: 60;
    width: min(424px, calc(100vw - 24px));
    max-height: calc(100dvh - 16px);
    overflow: auto;
    padding: 30px 4px 4px;
    border: 0;
    background: transparent;
    box-shadow: none;
    color: var(--ink);
  }

  .journal-polaroid[hidden],
  .journal-tooltip[hidden] {
    display: none;
  }

  .journal-polaroid__photo {
    position: relative;
    display: grid;
    place-items: center;
    padding: 0;
    overflow: hidden;
    border: 0;
    background: #d8dcc7;
    box-shadow: 0 0 0 1px rgba(78, 62, 46, 0.14);
  }

  .journal-polaroid__sheet {
    position: relative;
    width: 100%;
    aspect-ratio: 88.47 / 107.52;
    max-height: calc(100dvh - 48px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    overflow-y: auto;
    border: 1px solid rgba(72, 57, 43, 0.26);
    border-radius: 2px;
    background:
      radial-gradient(circle at 18% 12%, rgba(255,255,255,0.54), transparent 30%),
      radial-gradient(circle at 84% 78%, rgba(173,143,103,0.09), transparent 34%),
      repeating-linear-gradient(83deg, rgba(104,78,51,0.025) 0 1px, transparent 1px 7px),
      var(--instant-film-paper);
    box-shadow: 0 24px 42px rgba(43, 29, 18, 0.38);
    perspective: 900px;
  }

  .journal-polaroid__face {
    width: 100%;
    min-height: 100%;
    color: var(--instant-film-ink);
    transform-origin: 50% 50%;
  }

  .journal-polaroid__face[data-flip-enter="true"] {
    animation: journal-polaroid-face-enter 280ms cubic-bezier(0.22, 0.72, 0.28, 1) both;
  }

  .journal-polaroid__face--front {
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    padding: var(--instant-film-edge);
  }

  .journal-polaroid__face--back {
    align-content: start;
    grid-template-rows: auto minmax(0, 1fr) auto;
    gap: 12px;
    padding: calc(var(--instant-film-edge) * 1.35);
    background:
      linear-gradient(84deg, transparent 0 48%, rgba(105,79,52,0.035) 49% 50%, transparent 51%),
      radial-gradient(circle at 72% 18%, rgba(171,137,89,0.09), transparent 26%);
  }

  .journal-polaroid__face--back:not([hidden]) {
    display: grid;
  }

  @keyframes journal-polaroid-face-enter {
    from {
      opacity: 0.28;
      transform: rotateY(-82deg) scale(0.985);
    }
    to {
      opacity: 1;
      transform: rotateY(0) scale(1);
    }
  }

  .journal-polaroid canvas {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 1 / 1;
    image-rendering: pixelated;
  }

  .journal-polaroid__loading {
    position: absolute;
    inset: auto 10px 10px;
    z-index: 2;
    padding: 6px 8px;
    border: 1px solid rgba(60, 43, 32, 0.22);
    border-radius: 4px;
    background: rgba(255, 250, 240, 0.92);
    color: #554b43;
    font-size: 11px;
    font-weight: 900;
    text-align: center;
    transition: opacity 160ms ease, visibility 160ms ease;
  }

  .journal-polaroid[data-photo-ready="true"] .journal-polaroid__loading {
    visibility: hidden;
    opacity: 0;
  }

  .journal-polaroid[data-photo-state="loading"] canvas {
    opacity: 0.62;
  }

  .journal-polaroid__body {
    display: grid;
    align-content: start;
    gap: 9px;
    min-width: 0;
    padding: 4px 0 0;
  }

  .journal-polaroid__print-footer {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 10px;
    min-width: 0;
    padding: 7px 2px 0;
  }

  .journal-polaroid__print-copy,
  .journal-polaroid__print-actions {
    display: grid;
    min-width: 0;
  }

  .journal-polaroid__print-copy {
    align-content: center;
    gap: 2px;
  }

  .journal-polaroid__print-actions {
    justify-items: end;
    gap: 4px;
  }

  .journal-polaroid__back-header {
    display: flex;
    align-items: start;
    justify-content: space-between;
    gap: 12px;
    padding-bottom: 9px;
    border-bottom: 1px dashed rgba(77, 68, 59, 0.28);
  }

  .journal-polaroid__eyebrow {
    margin: 0;
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.035em;
    text-transform: uppercase;
  }

  .journal-polaroid__tier {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 20px;
    padding: 1px 6px;
    border: 1px solid color-mix(in srgb, var(--instant-stamp-ink) 64%, transparent);
    border-radius: 2px;
    background: transparent;
    color: var(--instant-stamp-ink);
    font-size: 9px;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transform: rotate(-1.4deg);
    white-space: nowrap;
  }

  .journal-polaroid h3,
  .journal-polaroid p {
    margin: 0;
  }

  .journal-polaroid h3 {
    display: -webkit-box;
    overflow: hidden;
    color: var(--instant-film-ink);
    font-size: 17px;
    line-height: 1.08;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
  }

  .journal-polaroid p {
    font-size: 13px;
    font-weight: 760;
    line-height: 1.4;
    overflow-wrap: anywhere;
  }

  .journal-polaroid__caption {
    display: -webkit-box;
    overflow: hidden;
    color: #695e53;
    font-size: 11px !important;
    font-weight: 800 !important;
    line-height: 1.16 !important;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
  }

  .journal-polaroid__back-title {
    color: var(--instant-film-ink);
    font-size: 19px !important;
    font-weight: 950 !important;
    line-height: 1.15 !important;
  }

  .journal-polaroid__back-mark {
    max-width: 150px;
    color: rgba(77, 68, 59, 0.62);
    font-size: 9px !important;
    font-weight: 900 !important;
    letter-spacing: 0.055em;
    line-height: 1.25 !important;
    text-align: right;
    text-transform: uppercase;
  }

  .journal-polaroid__description {
    color: #4f473f;
  }

  .journal-polaroid__facts {
    padding-top: 7px;
    border-top: 1px solid rgba(60, 43, 32, 0.18);
    color: var(--muted);
    font-size: 11.5px !important;
    font-weight: 850 !important;
  }

  .journal-polaroid__details {
    border: 1px solid rgba(60, 43, 32, 0.18);
    border-radius: 2px;
    background: rgba(255, 252, 242, 0.34);
  }

  .journal-polaroid__details summary {
    padding: 7px 9px;
    color: var(--green-dark);

    font-size: 12px;
    font-weight: 900;
  }

  .journal-polaroid__note {
    padding: 0 9px 9px;
    color: var(--muted);
    font-size: 12px !important;
  }

  .journal-polaroid__flip-button {
    display: inline-grid;
    place-items: center;
    min-width: 62px;
    min-height: 44px;
    padding: 5px 8px;
    border: 1px solid rgba(77, 68, 59, 0.42);
    border-radius: 2px;
    background: rgba(255, 252, 242, 0.56);
    color: var(--instant-film-ink);
    cursor: pointer;
    font-size: 10px;
    font-weight: 950;
    letter-spacing: 0.025em;
    text-transform: uppercase;
  }

  .journal-polaroid__flip-button:hover,
  .journal-polaroid__flip-button:focus-visible {
    border-color: rgba(77, 68, 59, 0.72);
    background: rgba(255, 252, 242, 0.88);

    outline-offset: 2px;

  .journal-polaroid__flip-button--back {
    justify-self: end;
    min-width: 132px;

    border-radius: 50%;
    background: #fffaf0;

    font-weight: 900;

  .journal-polaroid[data-frame-tier="dew"] {

      width: calc(100vw - 16px - env(safe-area-inset-left) - env(safe-area-inset-right));

    gap: 7px;

    min-height: 40px;
    padding: 6px;

    border-radius: var(--radius);

    border-color: rgba(60, 43, 32, 0.48);
    background:
      repeating-linear-gradient(
        -45deg,
        rgba(60, 43, 32, 0.045) 0,
        rgba(60, 43, 32, 0.045) 5px,
        rgba(255, 253, 247, 0.62) 5px,
        rgba(255, 253, 247, 0.62) 10px

      #e6dccb;

  .action-icon {
    position: relative;
    display: grid;
    place-items: center;
    width: 34px;
    height: 30px;

    background: var(--moss);

  /* Scene-first workspace and accessibility layer. Keep this final so legacy
     compact-layout rules cannot reintroduce undersized or top-docked controls. */
  :root {
    --green: #39752f;
    --rose: #a43b47;
    --amber: #8a5316;
    --touch-target: 44px;
    --care-action-target: 48px;
    --action-tray-height: 0px;
    --focus-ring: #24582c;
  }

  .sr-live {
    position: fixed;
    width: 1px;
    height: 1px;
    margin: -1px;
    padding: 0;
    overflow: hidden;
    clip: rect(0 0 0 0);
    clip-path: inset(50%);
    border: 0;
    white-space: nowrap;
  }

  .skip-link {
    position: fixed;
    top: 8px;
    left: 8px;
    z-index: 200;
    padding: 9px 12px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
    transform: translateY(-160%);
  }

  .skip-link:focus {
    transform: translateY(0);
  }

  .runtime-alert {
    position: relative;
    z-index: 14;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    max-width: 760px;
    margin: 8px auto;
    padding: 10px 12px;
    border: 2px solid #7d2424;
    border-radius: var(--radius);
    background: #ffd5c9;
    color: #622025;
    font-size: 14px;
    font-weight: 900;
  }

  .name-gate__help {
    display: block;
    margin-top: 7px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    line-height: 1.3;
  }

  :where(
    button,
    input,
    select,
    textarea,
    [role="button"],
    [role="tab"]
  ):focus-visible {
    outline: 3px solid var(--focus-ring);
    outline-offset: 3px;
    box-shadow: 0 0 0 2px #fffdf7, 3px 3px 0 var(--shadow);
  }

  .ghost-button,
  .view-switch__button,
  .workspace-tab,
  .battle-move-button,
  .battle-train-button,
  .journal-polaroid__close,
  .app-dialog__close {
    min-height: var(--touch-target);
    font-size: max(12px, 0.75rem);
  }

  .battle-move-button,

    padding: 6px;

    font-weight: 950;
    overflow-wrap: anywhere;

  .minigame-recap > p,
  .settings-sensory > p {

    color: #554b43;

    font-weight: 760;

    overflow-wrap: anywhere;
  }

  .minigame-recap [data-minigame-recap-unlocks] {

  .settings-sensory,

    background: rgba(223, 242, 200, 0.5);

  .settings-preferences h3,
  .settings-preferences p {

    gap: 4px;

  .settings-preferences p {

    font-size: 12px;
    font-weight: 760;
    line-height: 1.3;
  }

  .settings-preferences__controls {
    display: grid;
    gap: 6px;
  }

  .settings-preference {

    grid-template-columns: minmax(0, 1fr) minmax(132px, 0.45fr);

    align-items: center;
    min-width: 0;
    padding: 7px 0;
    border-top: 1px solid rgba(60, 43, 32, 0.18);

  .settings-preference:first-child {
    border-top: 0;
  }

  .settings-preference > span {
    display: grid;
    gap: 2px;
    min-width: 0;
  }

  .settings-preference strong,
  .settings-preference small {
    min-width: 0;
    overflow-wrap: anywhere;
    line-height: 1.25;
  }

  .settings-preference strong {
    color: var(--ink);
    font-size: 13px;
  }

  .settings-preference small {
    color: #554b43;
    font-size: 11px;
    font-weight: 760;
  }

  .settings-preference input[type="range"],
  .settings-preference .ghost-button {

    min-width: 0;
    min-height: 44px;
  }

  .settings-preference select {
    padding: 6px 8px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    color: var(--ink);
    font: inherit;
    font-size: 13px;
    font-weight: 800;
  }

  .settings-preference input[type="range"] {
    accent-color: var(--green-dark);
  }

  .settings-preference [aria-pressed="true"] {
    border-color: var(--green-dark);
    background: #dff2c8;
    color: #204b27;
  }

  .settings-sensory__controls {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
  }

  .minigame-return {
    position: fixed;
    right: max(14px, env(safe-area-inset-right));
    bottom: max(14px, env(safe-area-inset-bottom));

    background: #e5f4ca;
    box-shadow: 4px 4px 0 rgba(31, 23, 16, 0.34);
  }

  .app-dialog {
    width: min(560px, calc(100vw - 28px - env(safe-area-inset-left) - env(safe-area-inset-right)));
    max-width: none;
    max-height: min(84dvh, calc(100dvh - 16px - env(safe-area-inset-top) - env(safe-area-inset-bottom)), 760px);

    padding: 0;

    color: var(--ink);

  }

  .app-dialog__surface {
    display: grid;
    gap: 12px;
    max-height: min(84dvh, calc(100dvh - 16px - env(safe-area-inset-top) - env(safe-area-inset-bottom)), 760px);
    padding: 16px;
    overflow: auto;
    border: 3px solid var(--border);

  .app-dialog__surface--compact {

  .app-dialog__surface h2,
  .app-dialog__surface h3,
  .app-dialog__surface p {

  .app-dialog__header,
  .app-dialog__actions,
  .rename-form__row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .app-dialog__header {
    align-items: start;
    justify-content: space-between;
  }

  .app-dialog__close {
    display: grid;
    place-items: center;

    padding: 4px;
    border: 2px solid var(--border);

    color: var(--ink);

    font-size: 22px;
    font-weight: 900;

  .app-dialog__actions {

    flex-wrap: wrap;

  .settings-dialog__content {

    gap: 10px;
  }

  .rename-form,
  .settings-danger-zone,
  .import-preview-summary {

    gap: 7px;
    padding: 10px;

  }

  .rename-form label {
    color: #554b43;
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .rename-form input {

    min-height: var(--touch-target);
    flex: 1;
    padding: 7px 9px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    color: var(--ink);
    font: inherit;
    font-size: 16px;
    font-weight: 800;
  }

  .settings-danger-zone {
    border-color: rgba(125, 36, 36, 0.48);

  }

  .ghost-button--danger {
    border-color: #7d2424;
    background: #ffd5c9;
    color: #6a2025;
  }

  .journal-polaroid[open] {

    left: 50% !important;
    top: 50% !important;
    width: min(424px, calc(100vw - 24px));

    max-height: min(92dvh, 820px);

    padding: 32px 4px 4px;

    transform: translate(-50%, -50%);

  .journal-polaroid[open] .journal-polaroid__close {
    top: 0;
    right: 0;

    .app {
      width: min(100% - 24px, 760px);

    .game-grid {
      grid-template-columns: 1fr;
    }

    .side-panel {
      padding: 10px;
      border: 3px solid var(--border);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: 5px 5px 0 var(--shadow);

  }

  @media (max-width: 640px) {
    .app[data-action-tray-visible="true"] {
      padding-bottom: calc(var(--action-tray-height) + env(safe-area-inset-bottom) + 16px);

      min-height: var(--touch-target);

    .topbar__status {
      flex-wrap: wrap;
    }

    .topbar__menu {
      min-width: 60px;
    }

    .canvas-wrap {
      max-width: min(100%, 320px);
    }

    .daily-rhythm-button {
      min-height: var(--touch-target);
    }

    .daily-rhythm-button span {
      display: block;
      font-size: 12px;
      line-height: 1.2;
    }

    .workspace-tabs {
      position: static;
      gap: 3px;
      padding: 3px;
    }

    .workspace-tab {
      min-height: var(--touch-target);
      padding-inline: 4px;
      font-size: 12px;
    }

    .panel-block--actions.is-adaptive-docked {
      position: fixed;
      top: auto !important;
      right: max(8px, env(safe-area-inset-right));
      bottom: calc(8px + env(safe-area-inset-bottom));
      left: max(8px, env(safe-area-inset-left)) !important;
      width: auto !important;
      max-width: none;
      z-index: 72;
      overflow: visible;

    .panel-block--actions.is-mobile-tray-hidden {
      display: none !important;
    }

    .panel-block--actions:not(.is-adaptive-docked) .action-more-button {
      display: grid;
      grid-column: 1 / -1;
      grid-template-columns: auto auto;
      place-content: center;
      gap: 7px;
      min-height: var(--care-action-target);
      padding: 6px 8px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: #fffdf7;
      color: var(--ink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 900;
    }

    .panel-block--actions:not(.is-adaptive-docked) .action-more-button.is-expanded {
      background: #dff2c8;
    }

    .panel-block--actions:not(.is-adaptive-docked) .actions-overflow {
      grid-column: 1 / -1;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .panel-block--actions:not(.is-adaptive-docked) .actions-overflow:not([hidden]) {
      display: grid;
    }

    .panel-block--actions.is-adaptive-docked.actions-dock--bottom .actions-grid {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 5px;
      width: 100%;
    }

    .panel-block--actions.is-adaptive-docked .actions-primary {
      display: grid;
      grid-template-columns: repeat(var(--action-primary-count, 5), minmax(0, 1fr));
      gap: 5px;
      min-width: 0;
    }

    .panel-block--actions.is-adaptive-docked .action-more-button {
      display: grid;
      grid-template-rows: auto auto;
      place-items: center;
      gap: 1px;
      min-width: 48px;
      min-height: var(--care-action-target);
      padding: 4px 3px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: #fffdf7;
      color: var(--ink);
      cursor: pointer;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
    }

    .panel-block--actions.is-adaptive-docked .action-more-button.is-expanded {
      background: #dff2c8;
    }

    .panel-block--actions.is-adaptive-docked .actions-overflow {
      position: absolute;
      right: 0;
      bottom: calc(100% + 9px);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      width: min(318px, calc(100vw - 32px));
      padding: 8px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255, 248, 234, 0.99);
      box-shadow: 0 -5px 0 rgba(63, 39, 17, 0.15), 0 -12px 24px rgba(43, 29, 18, 0.2);

    .panel-block--actions.is-adaptive-docked .actions-overflow[hidden] {
      display: none;

    .panel-block--actions.is-adaptive-docked .action-button {
      min-height: var(--care-action-target);
    }

    .panel-block--actions.is-adaptive-docked .action-label,
    .panel-block--actions.is-adaptive-docked .cooldown-chip {
      font-size: 12px;
    }

    .panel-block--actions.is-adaptive-docked .action-icon {
      width: 28px;
      height: 25px;
    }

    .recovery-checklist__heading {
      display: grid;
    }

    .recovery-checklist__heading span {
      text-align: left;
    }

    .app-dialog {
      width: calc(100vw - 16px - env(safe-area-inset-left) - env(safe-area-inset-right));
      max-height: calc(100dvh - 16px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    }

    .app-dialog__surface {
      max-height: calc(100dvh - 16px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      padding: 12px;
    }

    .rename-form__row {
      align-items: stretch;
      flex-direction: column;
    }

    .journal-polaroid[open] {
      top: auto !important;
      bottom: max(8px, env(safe-area-inset-bottom)) !important;
      left: max(8px, env(safe-area-inset-left)) !important;
      right: max(8px, env(safe-area-inset-right)) !important;
      width: auto;
      max-height: calc(100dvh - max(8px, env(safe-area-inset-top)) - max(8px, env(safe-area-inset-bottom)));
      transform: none;
    }

  @media (hover: none), (max-width: 640px) {
    .discovery-item--polaroid,
    .discovery-item--polaroid:hover,
    .discovery-item--polaroid:focus-visible {
      transform: none;
    }

      max-width: min(100%, 288px);

  }

  @media (max-width: 339px) {

      max-width: min(100%, 256px);

      font-size: 11px;

    .spore-pop-canvas,
    .compost-sort-canvas,
    .rhythm-hum-canvas,
    .legendary-game-canvas {
      width: min(100%, 300px);
      height: auto;
    }
