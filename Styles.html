<style>
  :root {
    color-scheme: light;
    --ink: #221814;
    --muted: #6c6259;
    --paper: #fff8ea;
    --panel: #f9eccd;
    --panel-strong: #edd296;
    --green: #4f8f39;
    --green-dark: #24582c;
    --moss: #b6d66f;
    --water: #317fb5;
    --rose: #d8646f;
    --amber: #b97924;
    --shadow: rgba(63, 39, 17, 0.22);
    --border: #3c2b20;
    --radius: 8px;
    --pixel-font: "Trebuchet MS", "Verdana", sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  html {
    min-height: 100%;
    background:
      linear-gradient(90deg, rgba(36, 88, 44, 0.05) 1px, transparent 1px),
      linear-gradient(rgba(36, 88, 44, 0.05) 1px, transparent 1px),
      #e7f0d0;
    background-size: 32px 32px;
  }

  body {
    min-height: 100%;
    margin: 0;
    color: var(--ink);
    font-family: var(--pixel-font);
    font-size: 16px;
    letter-spacing: 0;
  }

  button {
    font: inherit;
    letter-spacing: 0;
  }

  .app {
    width: min(1180px, calc(100% - 28px));
    margin: 0 auto;
    padding: 12px 0 18px;
  }

  .topbar {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 10px;
  }

  .topbar h1,
  .stage-toolbar h2,
  .block-heading h2 {
    margin: 0;
    line-height: 1.05;
  }

  .topbar h1 {
    font-size: 30px;
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .topbar__status,
  .stage-meta,
  .block-heading,
  .inventory-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-pill,
  .stage-meta span,
  .block-heading > span,
  .shortcut-badge,
  .cooldown-chip {
    border: 2px solid var(--border);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
    color: var(--ink);
    font-size: 12px;
    font-weight: 800;
    line-height: 1;
  }

  .status-pill,
  .stage-meta span,
  .block-heading > span {
    padding: 7px 9px;
    border-radius: 999px;
  }

  .ghost-button {
    min-height: 34px;
    padding: 6px 10px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
    color: var(--ink);
    cursor: pointer;
    font-weight: 800;
  }

  .ghost-button:hover,
  .action-button:not(:disabled):hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--shadow);
  }

  .game-grid {
    display: grid;
    grid-template-columns: minmax(420px, 1fr) minmax(320px, 374px);
    gap: 14px;
    align-items: start;
  }

  .stage-panel,
  .side-panel {
    border: 3px solid var(--border);
    border-radius: var(--radius);
    background: var(--paper);
    box-shadow: 6px 6px 0 var(--shadow);
  }

  .stage-panel {
    padding: 12px;
  }

  .side-panel {
    display: grid;
    gap: 9px;
    padding: 10px;
  }

  .stage-toolbar {
    display: flex;
    align-items: start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .stage-toolbar h2 {
    font-size: 22px;
  }

  .stage-meta {
    flex-wrap: wrap;
    justify-content: end;
  }

  .canvas-wrap {
    position: relative;
    width: 100%;
    max-width: 572px;
    margin: 0 auto;
    aspect-ratio: 1;
    border: 3px solid var(--border);
    border-radius: var(--radius);
    background: #ddefb8;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .message-panel {
    display: grid;
    gap: 3px;
    margin-top: 10px;
    min-height: 54px;
    padding: 8px 10px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
  }

  .message-panel strong {
    font-size: 15px;
  }

  .message-panel span {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.35;
  }

  .panel-block {
    display: grid;
    gap: 8px;
    min-width: 0;
    padding: 9px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--panel);
  }

  .panel-block--compact {
    gap: 8px;
  }

  .panel-block--log {
    background: #fff4d7;
  }

  .block-heading {
    justify-content: space-between;
  }

  .block-heading h2 {
    font-size: 16px;
  }

  .stats-list {
    display: grid;
    gap: 6px;
  }

  .stat-row {
    display: grid;
    grid-template-columns: 98px 1fr 42px;
    gap: 8px;
    align-items: center;
    min-width: 0;
  }

  .stat-name,
  .stat-value,
  .inventory-item {
    font-size: 13px;
    font-weight: 800;
  }

  .stat-track {
    height: 14px;
    border: 2px solid var(--border);
    border-radius: 999px;
    background: #fffdf7;
    overflow: hidden;
  }

  .stat-fill {
    width: 0%;
    height: 100%;
    background: var(--green);
    transition: width 180ms linear, background 180ms linear;
  }

  .stat-fill[data-level="low"] {
    background: var(--rose);
  }

  .stat-fill[data-level="medium"] {
    background: var(--amber);
  }

  .actions-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .action-button {
    position: relative;
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr) 26px;
    gap: 7px;
    align-items: center;
    min-height: 40px;
    padding: 6px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: #fffdf7;
    box-shadow: 2px 2px 0 var(--shadow);
    color: var(--ink);
    cursor: pointer;
    text-align: left;
  }

  .action-button:disabled {
    cursor: not-allowed;
    filter: grayscale(0.55);
    opacity: 0.62;
  }

  .action-button.is-flashing {
    animation: button-flash 260ms steps(2, end);
  }

  .action-icon {
    display: grid;
    place-items: center;
    width: 34px;
    height: 30px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: var(--moss);
    font-size: 10px;
    font-weight: 900;
  }

  .action-label {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 13px;
    font-weight: 900;
  }

  .shortcut-badge,
  .cooldown-chip {
    display: inline-grid;
    place-items: center;
    min-width: 24px;
    min-height: 24px;
    padding: 4px;
    border-radius: 6px;
  }

  .cooldown-chip {
    position: absolute;
    right: 6px;
    bottom: 5px;
    min-width: 38px;
    min-height: 18px;
    padding: 2px 4px;
    background: #fffdf7;
    border: 1px solid rgba(60, 43, 32, 0.35);
    color: var(--rose);
    font-size: 10px;
  }

  .inventory-row {
    flex-wrap: wrap;
  }

  .inventory-item {
    padding: 5px 7px;
    border: 2px solid var(--border);
    border-radius: 999px;
    background: #fffdf7;
  }

  .event-log {
    display: grid;
    gap: 5px;
    min-height: 72px;
    max-height: 108px;
    margin: 0;
    padding: 0;
    list-style: none;
    overflow: auto;
  }

  .event-log li {
    padding: 6px 7px;
    border: 2px solid rgba(60, 43, 32, 0.3);
    border-radius: 6px;
    background: rgba(255, 253, 247, 0.74);
    color: var(--muted);
    font-size: 13px;
    line-height: 1.25;
  }

  @keyframes button-flash {
    0%,
    100% {
      background: #fffdf7;
    }

    50% {
      background: #d8f2a3;
    }
  }

  @media (max-width: 880px) {
    .app {
      width: min(100% - 18px, 620px);
      padding-top: 12px;
    }

    .topbar {
      align-items: start;
      flex-direction: column;
    }

    .topbar__status {
      width: 100%;
      justify-content: space-between;
    }

    .game-grid {
      grid-template-columns: 1fr;
    }

    .stage-panel,
    .side-panel {
      box-shadow: 4px 4px 0 var(--shadow);
    }
  }

  @media (max-width: 480px) {
    .topbar h1 {
      font-size: 25px;
    }

    .stage-panel,
    .side-panel {
      padding: 9px;
    }

    .stage-toolbar {
      align-items: stretch;
      flex-direction: column;
    }

    .stage-meta {
      justify-content: start;
    }

    .actions-grid {
      grid-template-columns: 1fr;
    }

    .stat-row {
      grid-template-columns: 88px 1fr 38px;
      gap: 6px;
    }
  }
</style>
