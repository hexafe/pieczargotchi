  function normalizeMushroomNameValue(value) {
    return String(value || '')
      .replace(/\s+/g, ' ')
      .trim()
      .slice(0, mushroomNameMaxLength);
  }

  function getMushroomName(state) {
    return normalizeMushroomNameValue(state && state.mushroomName) || defaultMushroomName;
  }

  function hasNamedMushroom(state) {
    if (!state) {
      return false;
    }

    const name = normalizeMushroomNameValue(state.mushroomName);
    const flags = state.flags || {};
    return Boolean(name && (flags.nameConfirmed || name !== defaultMushroomName));
  }

  function formatMushroomText(value, state) {
    const text = String(value || '');
    if (!text || text.indexOf('{name}') === -1) {
      return text;
    }

    const currentState = state || runtime.state;
    const name = hasNamedMushroom(currentState)
      ? getMushroomName(currentState)
      : defaultMushroomName;
    return text.replace(/\{name\}/g, name);
  }

  function isRuntimeReadOnly() {
    const status = runtime.persistenceStatus || {};
    return Boolean(status.readOnly || status.futureVersion || status.mode === 'readOnly');
  }

  function getActiveExclusiveSessionDescriptor(state, now) {
    const timestamp = Number(now) || Date.now();
    const normalizeLeaseUntil = function(value) {
      const leaseUntil = Number(value);
      return Number.isFinite(leaseUntil)
        && leaseUntil >= 0
        && leaseUntil <= timestamp + 10 * 60000
        ? leaseUntil
        : 0;
    };
    const activeMinigame = state && state.minigames && state.minigames.active;
    const activeBattle = state && state.battle && state.battle.activeBattle;
    const runningBattle = activeBattle && ['victory', 'defeat'].indexOf(activeBattle.mode) === -1;
    if (!activeMinigame && !runningBattle) {
      return null;
    }
    const ownershipRecords = [];
    if (activeMinigame) {
      ownershipRecords.push({
        ownerWriterId: String(activeMinigame.ownerWriterId || ''),
        ownerLeaseUntil: normalizeLeaseUntil(activeMinigame.ownerLeaseUntil)
      });
    }
    if (runningBattle) {
      ownershipRecords.push({
        ownerWriterId: String(activeBattle.ownerWriterId || ''),
        ownerLeaseUntil: normalizeLeaseUntil(activeBattle.ownerLeaseUntil)
      });
    }
    const firstOwner = ownershipRecords[0] && ownershipRecords[0].ownerWriterId || '';
    const ownersAgree = ownershipRecords.every(function(record) {
      return record.ownerWriterId === firstOwner;
    });
    return {
      kind: activeMinigame && runningBattle ? 'conflict' : activeMinigame ? 'minigame' : 'battle',
      minigameId: activeMinigame ? String(activeMinigame.id || '') : '',
      battleId: runningBattle ? String(activeBattle.id || '') : '',
      minigameStartedAt: activeMinigame ? Math.max(0, Number(activeMinigame.startedAt) || 0) : 0,
      minigameUntil: activeMinigame ? Math.max(0, Number(activeMinigame.until) || 0) : 0,
      ownerWriterId: ownersAgree ? firstOwner : '__multiple_owners__',
      ownerLeaseUntil: ownershipRecords.reduce(function(maximum, record) {
        return Math.max(maximum, record.ownerLeaseUntil);
      }, 0)
    };
  }

  function getCurrentPersistenceWriterId() {
    const status = typeof getPersistenceStatus === 'function'
      ? getPersistenceStatus()
      : runtime.persistenceStatus || {};
    return String(status.tabId || '').slice(0, 80);
  }

  function getExclusiveOwnershipNow() {
    return Date.now();
  }

  function inspectExclusiveSessionOwnership(state, now) {
    const descriptor = getActiveExclusiveSessionDescriptor(state, now);
    if (!descriptor) {
      return { mode: 'none', descriptor: null };
    }
    const writerId = getCurrentPersistenceWriterId();
    const leaseIsLive = Boolean(descriptor.ownerWriterId)
      && Number(descriptor.ownerLeaseUntil) > Number(now);
    if (leaseIsLive && writerId && descriptor.ownerWriterId === writerId) {
      return { mode: 'owned', descriptor: descriptor, writerId: writerId };
    }
    if (leaseIsLive) {
      return { mode: 'foreign', descriptor: descriptor, writerId: writerId };
    }
    return { mode: 'claimable', descriptor: descriptor, writerId: writerId };
  }

  function assignExclusiveSessionOwnership(state, now, writerId) {
    const descriptor = getActiveExclusiveSessionDescriptor(state, now);
    const ownerWriterId = String(writerId || getCurrentPersistenceWriterId()).slice(0, 80);
    if (!descriptor || !ownerWriterId) {
      return null;
    }
    let leaseUntil = Number(now) + exclusiveOwnershipConfig.battleLeaseMs;
    if (descriptor.minigameId) {
      const minigameDuration = Math.max(0, Number(descriptor.minigameUntil) - Number(descriptor.minigameStartedAt));
      leaseUntil = Math.max(
        Number(now) + exclusiveOwnershipConfig.minigameGraceMs,
        Number(now) + minigameDuration + exclusiveOwnershipConfig.minigameGraceMs,
        descriptor.battleId ? leaseUntil : 0
      );
    }
    if (descriptor.minigameId && state.minigames && state.minigames.active) {
      state.minigames.active.ownerWriterId = ownerWriterId;
      state.minigames.active.ownerLeaseUntil = leaseUntil;
    }
    if (descriptor.battleId && state.battle && state.battle.activeBattle) {
      state.battle.activeBattle.ownerWriterId = ownerWriterId;
      state.battle.activeBattle.ownerLeaseUntil = leaseUntil;
    }
    return Object.assign({}, descriptor, {
      ownerWriterId: ownerWriterId,
      ownerLeaseUntil: leaseUntil
    });
  }

  function claimExclusiveSessionOwnership(state, now) {
    const ownership = inspectExclusiveSessionOwnership(state, now);
    if (ownership.mode === 'none' || ownership.mode === 'owned') {
      return { ok: true, state: state, ownership: ownership, claimed: false };
    }
    if (ownership.mode === 'foreign') {
      return { ok: false, reason: 'leaseActive', state: state, ownership: ownership };
    }
    if (!ownership.writerId || typeof saveReplacementState !== 'function') {
      return { ok: false, reason: 'ownershipUnavailable', state: state, ownership: ownership };
    }
    const previous = deepClone(state);
    const candidate = deepClone(state);
    const descriptor = assignExclusiveSessionOwnership(candidate, now, ownership.writerId);
    if (!descriptor) {
      return { ok: false, reason: 'ownershipUnavailable', state: state, ownership: ownership };
    }
    let result;
    try {
      result = saveReplacementState(candidate, previous);
    } catch (error) {
      result = { ok: false, reason: 'storageUnavailable' };
    }
    if (!result || !result.ok) {
      return Object.assign({ ok: false, state: state, ownership: ownership }, result || { reason: 'ownershipUnavailable' });
    }
    return {
      ok: true,
      state: candidate,
      ownership: { mode: 'owned', descriptor: descriptor, writerId: ownership.writerId },
      claimed: true,
      revision: result.revision,
      mode: result.mode
    };
  }

  function clearExclusiveOwnershipClaimSchedule() {
    if (runtime.exclusiveOwnershipClaimTimer) {
      window.clearTimeout(runtime.exclusiveOwnershipClaimTimer);
      runtime.exclusiveOwnershipClaimTimer = null;
    }
    runtime.exclusiveOwnershipClaimAttempts = 0;
  }

  function scheduleExclusiveOwnershipClaim(attemptAt, attempt) {
    const claimAttempt = Math.max(0, Math.floor(Number(attempt) || 0));
    if (claimAttempt >= exclusiveOwnershipConfig.maxClaimAttempts || isRuntimeReadOnly()) {
      return;
    }
    if (runtime.exclusiveOwnershipClaimTimer) {
      window.clearTimeout(runtime.exclusiveOwnershipClaimTimer);
    }
    runtime.exclusiveOwnershipClaimAttempts = claimAttempt;
    const currentTime = getExclusiveOwnershipNow();
    const boundedAttemptAt = Math.min(
      Number(attemptAt) || currentTime + exclusiveOwnershipConfig.retryDelayMs,
      currentTime + exclusiveOwnershipConfig.maxAcceptedLeaseMs
    );
    const delay = Math.max(50, boundedAttemptAt - currentTime + 25);
    runtime.exclusiveOwnershipClaimTimer = window.setTimeout(function() {
      runtime.exclusiveOwnershipClaimTimer = null;
      attemptScheduledExclusiveOwnershipClaim(claimAttempt);
    }, Number.isFinite(delay) ? delay : exclusiveOwnershipConfig.retryDelayMs);
  }

  function markForeignExclusiveOwnership(ownership, claimPending) {
    const descriptor = ownership && ownership.descriptor;
    runtime.foreignExclusiveSession = descriptor
      ? Object.assign({}, descriptor, {
        claimPending: Boolean(claimPending),
        revision: Math.max(0, Number(runtime.state && runtime.state.saveRevision) || 0)
      })
      : null;
  }

  function initializeLoadedExclusiveSessionOwnership(now) {
    const ownership = inspectExclusiveSessionOwnership(runtime.state, now);
    if (ownership.mode === 'none' || ownership.mode === 'owned') {
      clearExclusiveOwnershipClaimSchedule();
      runtime.foreignExclusiveSession = null;
      return true;
    }
    if (ownership.mode === 'foreign') {
      markForeignExclusiveOwnership(ownership, false);
      scheduleExclusiveOwnershipClaim(ownership.descriptor.ownerLeaseUntil, 0);
      renderPersistenceStatus({ reason: 'foreignExclusive' });
      return false;
    }

    const claimed = claimExclusiveSessionOwnership(runtime.state, now);
    if (claimed.ok) {
      runtime.state = claimed.state;
      runtime.foreignExclusiveSession = null;
      clearExclusiveOwnershipClaimSchedule();
      if (Number.isFinite(Number(claimed.revision)) && typeof acknowledgePersistenceRevision === 'function') {
        acknowledgePersistenceRevision(Number(claimed.revision));
      }
      runtime.persistenceStatus = typeof getPersistenceStatus === 'function'
        ? getPersistenceStatus()
        : runtime.persistenceStatus;
      return true;
    }

    if (claimed.reason === 'conflict') {
      runtime.state = loadState();
    }
    const latestOwnership = inspectExclusiveSessionOwnership(runtime.state, now);
    if (latestOwnership.mode === 'none' || latestOwnership.mode === 'owned') {
      clearExclusiveOwnershipClaimSchedule();
      runtime.foreignExclusiveSession = null;
      return true;
    }
    markForeignExclusiveOwnership(latestOwnership, latestOwnership.mode !== 'foreign');
    const retryAt = latestOwnership.mode === 'foreign'
      ? latestOwnership.descriptor.ownerLeaseUntil
      : Number(now) + exclusiveOwnershipConfig.retryDelayMs;
    scheduleExclusiveOwnershipClaim(retryAt, 0);
    renderPersistenceStatus({ reason: latestOwnership.mode === 'foreign' ? 'foreignExclusive' : 'ownershipPending' });
    return false;
  }

  function attemptScheduledExclusiveOwnershipClaim(attempt) {
    if (isRuntimeReadOnly()) {
      return;
    }
    const now = getExclusiveOwnershipNow();
    const ownership = inspectExclusiveSessionOwnership(runtime.state, now);
    if (ownership.mode === 'none') {
      clearExclusiveOwnershipClaimSchedule();
      runtime.foreignExclusiveSession = null;
      renderUi();
      renderPersistenceStatus({ reason: 'externalUpdate' });
      return;
    }
    if (ownership.mode === 'owned') {
      clearExclusiveOwnershipClaimSchedule();
      runtime.foreignExclusiveSession = null;
      activateClaimedExclusiveSession(now);
      return;
    }
    if (ownership.mode === 'foreign') {
      markForeignExclusiveOwnership(ownership, false);
      scheduleExclusiveOwnershipClaim(ownership.descriptor.ownerLeaseUntil, 0);
      renderUi();
      renderPersistenceStatus({ reason: 'foreignExclusive' });
      return;
    }

    const claimed = claimExclusiveSessionOwnership(runtime.state, now);
    if (claimed.ok) {
      runtime.state = claimed.state;
      runtime.foreignExclusiveSession = null;
      clearExclusiveOwnershipClaimSchedule();
      if (Number.isFinite(Number(claimed.revision)) && typeof acknowledgePersistenceRevision === 'function') {
        acknowledgePersistenceRevision(Number(claimed.revision));
      }
      runtime.persistenceStatus = typeof getPersistenceStatus === 'function'
        ? getPersistenceStatus()
        : runtime.persistenceStatus;
      activateClaimedExclusiveSession(now);
      return;
    }

    if (claimed.reason === 'conflict') {
      runtime.state = loadState();
    }
    const latestOwnership = inspectExclusiveSessionOwnership(runtime.state, now);
    if (latestOwnership.mode === 'none') {
      clearExclusiveOwnershipClaimSchedule();
      runtime.foreignExclusiveSession = null;
      reconcileExclusiveRuntimeSession(getRuntimeNow());
      renderUi();
      renderPersistenceStatus({ reason: 'externalUpdate' });
      return;
    }
    if (latestOwnership.mode === 'owned') {
      clearExclusiveOwnershipClaimSchedule();
      runtime.foreignExclusiveSession = null;
      activateClaimedExclusiveSession(now);
      return;
    }
    if (latestOwnership.mode === 'foreign') {
      markForeignExclusiveOwnership(latestOwnership, false);
      scheduleExclusiveOwnershipClaim(latestOwnership.descriptor.ownerLeaseUntil, 0);
    } else {
      const nextAttempt = Math.max(0, Number(attempt) || 0) + 1;
      markForeignExclusiveOwnership(latestOwnership, true);
      scheduleExclusiveOwnershipClaim(now + exclusiveOwnershipConfig.retryDelayMs, nextAttempt);
    }
    renderUi();
    renderPersistenceStatus({ reason: latestOwnership.mode === 'foreign' ? 'foreignExclusive' : 'ownershipPending' });
  }

  function activateClaimedExclusiveSession() {
    const runtimeNow = getRuntimeNow();
    runtime.state = applyElapsedTime(runtime.state, runtimeNow);
    reconcileExclusiveRuntimeSession(runtimeNow);
    const persisted = persistRuntimeState(runtime.state);
    renderUi();
    if (!persisted || persisted.reason !== 'conflict') {
      resumeMinigameIfActive();
    }
  }

  function refreshOwnedBattleSessionLease(now) {
    if (isRuntimeReadOnly() || runtime.pendingExclusiveStart) {
      return;
    }
    let ownership = inspectExclusiveSessionOwnership(runtime.state, now);
    if (!ownership.descriptor || !ownership.descriptor.battleId) {
      return;
    }
    if (ownership.mode !== 'owned') {
      markForeignExclusiveOwnership(ownership, ownership.mode === 'claimable');
      runtime.exclusiveSession = null;
      scheduleExclusiveOwnershipClaim(
        ownership.mode === 'foreign'
          ? ownership.descriptor.ownerLeaseUntil
          : Number(now) + exclusiveOwnershipConfig.retryDelayMs,
        0
      );
      renderPersistenceStatus({ reason: ownership.mode === 'foreign' ? 'foreignExclusive' : 'ownershipPending' });
      return;
    }
    if (Number(ownership.descriptor.ownerLeaseUntil) - Number(now) > exclusiveOwnershipConfig.battleRefreshBeforeMs) {
      return;
    }

    const previous = deepClone(runtime.state);
    const candidate = deepClone(runtime.state);
    assignExclusiveSessionOwnership(candidate, now, ownership.writerId);
    let result;
    try {
      result = saveReplacementState(candidate, previous);
    } catch (error) {
      result = { ok: false, reason: 'storageUnavailable' };
    }
    if (result && result.ok) {
      runtime.state = candidate;
      if (Number.isFinite(Number(result.revision)) && typeof acknowledgePersistenceRevision === 'function') {
        acknowledgePersistenceRevision(Number(result.revision));
      }
      runtime.persistenceStatus = typeof getPersistenceStatus === 'function'
        ? getPersistenceStatus()
        : runtime.persistenceStatus;
      return;
    }

    if (result && result.reason === 'conflict') {
      runtime.state = loadState();
      ownership = inspectExclusiveSessionOwnership(runtime.state, now);
      if (ownership.mode === 'none') {
        clearExclusiveOwnershipClaimSchedule();
        runtime.foreignExclusiveSession = null;
        runtime.exclusiveSession = null;
        reconcileExclusiveRuntimeSession(getRuntimeNow());
        renderUi();
        renderPersistenceStatus({ reason: 'externalUpdate' });
        return;
      }
      if (ownership.mode === 'owned') {
        return;
      }
      markForeignExclusiveOwnership(ownership, ownership.mode === 'claimable');
      runtime.exclusiveSession = null;
      scheduleExclusiveOwnershipClaim(
        ownership.mode === 'foreign'
          ? ownership.descriptor.ownerLeaseUntil
          : Number(now) + exclusiveOwnershipConfig.retryDelayMs,
        0
      );
      renderUi();
      renderPersistenceStatus({ reason: ownership.mode === 'foreign' ? 'foreignExclusive' : 'ownershipPending' });
    }
  }

  function isForeignExclusiveSessionActive(kind) {
    const session = runtime.foreignExclusiveSession;
    if (!session) {
      return false;
    }
    if (!kind) {
      return true;
    }
    return session.kind === kind
      || session.kind === 'conflict' && Boolean(kind === 'minigame' ? session.minigameId : session.battleId);
  }

  function isRuntimeMutationBlocked() {
    return isRuntimeReadOnly() || isForeignExclusiveSessionActive();
  }

  function createReadOnlyStateView(rawState) {
    const snapshot = rawState && typeof rawState === 'object' ? deepClone(rawState) : {};
    const base = createDefaultState();
    const merged = typeof mergeState === 'function' ? mergeState(base, snapshot) : Object.assign(base, snapshot);
    const view = typeof normalizeState === 'function' ? normalizeState(merged) : merged;
    view.version = Number(snapshot.version) || view.version;
    view.saveRevision = Math.max(0, Math.floor(Number(snapshot.saveRevision) || 0));
    view.saveWriterId = snapshot.saveWriterId || null;
    return view;
  }

  function initializeRuntimePersistenceSync() {
    runtime.persistenceStatus = typeof getPersistenceStatus === 'function'
      ? getPersistenceStatus()
      : { mode: 'local', ok: true };
    if (typeof initializePersistenceSync === 'function' && !runtime.persistenceUnsubscribe) {
      try {
        runtime.persistenceUnsubscribe = initializePersistenceSync(handleExternalPersistenceUpdate) || function() {};
      } catch (error) {
        runtime.persistenceStatus = { mode: 'memory', ok: false, reason: 'storageUnavailable' };
      }
    }
    renderPersistenceStatus();
  }

  function handleExternalPersistenceUpdate(update) {
    const payload = update || {};
    cancelPendingExclusiveStart();
    runtime.minigameLastOutcome = null;
    runtime.persistenceStatus = typeof getPersistenceStatus === 'function'
      ? getPersistenceStatus()
      : Object.assign({}, runtime.persistenceStatus || {}, payload);
    if (payload.futureVersion) {
      if (typeof stopMinigameRuntime === 'function') {
        stopMinigameRuntime();
      }
      runtime.exclusiveSession = null;
      runtime.foreignExclusiveSession = null;
      clearExclusiveOwnershipClaimSchedule();
      runtime.persistenceStatus = Object.assign({}, runtime.persistenceStatus || {}, {
        mode: 'readOnly',
        readOnly: true,
        futureVersion: Number(payload.state && payload.state.version) || true,
        reason: 'futureVersion'
      });
      runtime.futureStateRaw = deepClone(payload.state || {});
      runtime.state = createReadOnlyStateView(runtime.futureStateRaw);
      renderUi();
      renderPersistenceStatus(runtime.persistenceStatus);
      return;
    }
    if (!payload.state) {
      renderPersistenceStatus(payload);
      return;
    }

    if (typeof stopMinigameRuntime === 'function') {
      stopMinigameRuntime();
    }
    runtime.exclusiveSession = null;
    runtime.state = typeof migrateState === 'function' ? migrateState(payload.state) : payload.state;
    if (typeof acknowledgePersistenceRevision === 'function' && Number.isFinite(Number(payload.revision))) {
      acknowledgePersistenceRevision(Number(payload.revision));
    }
    runtime.persistenceStatus = typeof getPersistenceStatus === 'function'
      ? getPersistenceStatus()
      : runtime.persistenceStatus;
    const ownershipNow = getExclusiveOwnershipNow();
    const ownership = inspectExclusiveSessionOwnership(runtime.state, ownershipNow);
    if (ownership.mode === 'foreign' || ownership.mode === 'claimable') {
      markForeignExclusiveOwnership(ownership, ownership.mode === 'claimable');
      scheduleExclusiveOwnershipClaim(
        ownership.mode === 'foreign'
          ? ownership.descriptor.ownerLeaseUntil
          : ownershipNow + 50,
        0
      );
      renderUi();
      renderPersistenceStatus({ reason: ownership.mode === 'foreign' ? 'foreignExclusive' : 'ownershipPending' });
      return;
    }
    clearExclusiveOwnershipClaimSchedule();
    runtime.foreignExclusiveSession = null;
    reconcileExclusiveRuntimeSession(getRuntimeNow());
    renderUi();
    resumeMinigameIfActive();
    renderPersistenceStatus(Object.assign({}, payload, { reason: 'externalUpdate' }));
  }

  function persistRuntimeState(state, retryAttempt) {
    if (isForeignExclusiveSessionActive()) {
      const passiveResult = {
        ok: false,
        reason: 'foreignExclusive',
        mode: runtime.persistenceStatus && runtime.persistenceStatus.mode,
        passive: true
      };
      renderPersistenceStatus(passiveResult);
      return passiveResult;
    }
    if (typeof saveState !== 'function') {
      return { ok: false, reason: 'unavailable', mode: 'memory' };
    }
    let result;
    try {
      result = saveStateForRuntime(state);
    } catch (error) {
      result = { ok: false, reason: 'storageUnavailable', mode: 'memory' };
    }
    if (!result || typeof result !== 'object') {
      return { ok: true, mode: 'local' };
    }

    runtime.persistenceStatus = typeof getPersistenceStatus === 'function'
      ? getPersistenceStatus()
      : result;
    if (result.ok && runtime.persistenceRetryTimer) {
      window.clearTimeout(runtime.persistenceRetryTimer);
      runtime.persistenceRetryTimer = null;
    }
    if (result.ok && Number.isFinite(Number(result.revision)) && typeof acknowledgePersistenceRevision === 'function') {
      acknowledgePersistenceRevision(Number(result.revision));
    }
    if (!result.ok && result.reason === 'conflict') {
      schedulePersistenceConflictResolution();
    }
    if (!result.ok && result.reason === 'storageBusy' && !isRuntimeReadOnly()) {
      const attempt = Math.max(0, Number(retryAttempt) || 0);
      if (!runtime.persistenceRetryTimer && attempt < 4) {
        runtime.persistenceRetryTimer = window.setTimeout(function() {
          runtime.persistenceRetryTimer = null;
          persistRuntimeState(runtime.state, attempt + 1);
        }, 750);
      } else if (attempt >= 4) {
        runtime.state = loadState();
        const ownershipNow = getExclusiveOwnershipNow();
        const reloadedOwnership = inspectExclusiveSessionOwnership(runtime.state, ownershipNow);
        if (reloadedOwnership.mode === 'foreign' || reloadedOwnership.mode === 'claimable') {
          markForeignExclusiveOwnership(reloadedOwnership, reloadedOwnership.mode === 'claimable');
          scheduleExclusiveOwnershipClaim(
            reloadedOwnership.mode === 'foreign'
              ? reloadedOwnership.descriptor.ownerLeaseUntil
              : ownershipNow + exclusiveOwnershipConfig.retryDelayMs,
            0
          );
        } else {
          clearExclusiveOwnershipClaimSchedule();
          runtime.foreignExclusiveSession = null;
          reconcileExclusiveRuntimeSession(getRuntimeNow());
        }
        renderUi();
        renderPersistenceStatus({ reason: 'conflict' });
      }
    }
    renderPersistenceStatus(result);
    return result;
  }

  function schedulePersistenceConflictResolution() {
    if (runtime.persistenceConflictTimer) {
      return;
    }
    runtime.persistenceConflictTimer = window.setTimeout(function() {
      runtime.persistenceConflictTimer = null;
      resolvePersistenceConflict();
    }, 0);
  }

  function resolvePersistenceConflict() {
    const latest = loadState();
    if (!latest) {
      return;
    }
    if (typeof stopMinigameRuntime === 'function') {
      stopMinigameRuntime();
    }
    runtime.exclusiveSession = null;
    runtime.state = latest;
    const ownershipNow = getExclusiveOwnershipNow();
    const latestOwnership = inspectExclusiveSessionOwnership(runtime.state, ownershipNow);
    if (latestOwnership.mode === 'foreign' || latestOwnership.mode === 'claimable') {
      markForeignExclusiveOwnership(latestOwnership, latestOwnership.mode === 'claimable');
      scheduleExclusiveOwnershipClaim(
        latestOwnership.mode === 'foreign'
          ? latestOwnership.descriptor.ownerLeaseUntil
          : ownershipNow + exclusiveOwnershipConfig.retryDelayMs,
        0
      );
    } else {
      clearExclusiveOwnershipClaimSchedule();
      runtime.foreignExclusiveSession = null;
    }
    runtime.minigameLastOutcome = null;
    renderUi();
    if (!isForeignExclusiveSessionActive()) {
      resumeMinigameIfActive();
    }
  }

  function persistExclusiveStartCandidate(candidate, baseState, pending, onComplete) {
    if (isForeignExclusiveSessionActive()) {
      const passiveResult = { ok: false, reason: 'foreignExclusive', passive: true };
      renderPersistenceStatus(passiveResult);
      onComplete(passiveResult, baseState);
      return;
    }
    const baseFingerprint = JSON.stringify(baseState || {});
    let attempt = 0;

    function finish(result) {
      if (!runtime.pendingExclusiveStart || runtime.pendingExclusiveStart.token !== pending.token) {
        return;
      }
      runtime.pendingExclusiveStart = null;
      if (result && result.ok && Number.isFinite(Number(result.revision)) && typeof acknowledgePersistenceRevision === 'function') {
        acknowledgePersistenceRevision(Number(result.revision));
      }
      runtime.persistenceStatus = typeof getPersistenceStatus === 'function' ? getPersistenceStatus() : result;
      renderPersistenceStatus(result);
      onComplete(result || { ok: false, reason: 'unavailable' }, candidate);
    }

    function tryWrite() {
      if (!runtime.pendingExclusiveStart || runtime.pendingExclusiveStart.token !== pending.token) {
        return;
      }
      if (JSON.stringify(runtime.state || {}) !== baseFingerprint) {
        finish({ ok: false, reason: 'stateChanged', mode: runtime.persistenceStatus && runtime.persistenceStatus.mode });
        return;
      }

      if (pending.phase === 'start' && attempt > 0 && candidate.minigames && candidate.minigames.active) {
        const active = candidate.minigames.active;
        const duration = Math.max(1000, Number(active.until) - Number(active.startedAt));
        const restartedAt = getRuntimeNow();
        const launchDelayMs = Math.max(0, Number(pending.launchDelayMs) || 0);
        active.startedAt = restartedAt + launchDelayMs;
        active.until = active.startedAt + duration;
        candidate.lastUpdatedAt = new Date(restartedAt).toISOString();
        assignExclusiveSessionOwnership(candidate, getExclusiveOwnershipNow());
      }

      let result;
      try {
        result = saveStateForRuntime(candidate);
      } catch (error) {
        result = { ok: false, reason: 'storageUnavailable', mode: 'memory' };
      }
      if (result && result.reason === 'storageBusy' && attempt < 3) {
        attempt += 1;
        renderPersistenceStatus(result);
        pending.timer = window.setTimeout(tryWrite, 750);
        return;
      }
      if (result && result.reason === 'conflict') {
        runtime.state = loadState();
      } else if (result && result.reason === 'storageBusy') {
        runtime.state = loadState();
        renderPersistenceStatus({ reason: 'conflict' });
      }
      if (result && (result.reason === 'conflict' || result.reason === 'storageBusy')) {
        const ownershipNow = getExclusiveOwnershipNow();
        const reloadedOwnership = inspectExclusiveSessionOwnership(runtime.state, ownershipNow);
        if (reloadedOwnership.mode === 'foreign' || reloadedOwnership.mode === 'claimable') {
          markForeignExclusiveOwnership(reloadedOwnership, reloadedOwnership.mode === 'claimable');
          scheduleExclusiveOwnershipClaim(
            reloadedOwnership.mode === 'foreign'
              ? reloadedOwnership.descriptor.ownerLeaseUntil
              : ownershipNow + exclusiveOwnershipConfig.retryDelayMs,
            0
          );
        } else {
          clearExclusiveOwnershipClaimSchedule();
          runtime.foreignExclusiveSession = null;
        }
      }
      finish(result);
    }

    runtime.pendingExclusiveStart = pending;
    if (typeof renderActionStates === 'function') {
      renderActionStates();
    }
    if (typeof renderMinigameOpportunities === 'function') {
      renderMinigameOpportunities();
    }
    if (typeof renderMinigames === 'function') {
      renderMinigames();
    }
    if (typeof renderLegendaryGames === 'function') {
      renderLegendaryGames();
    }
    if (typeof renderBattleUi === 'function') {
      renderBattleUi();
    }
    tryWrite();
  }

  function cancelPendingExclusiveStart() {
    const pending = runtime.pendingExclusiveStart;
    if (pending && pending.timer) {
      window.clearTimeout(pending.timer);
    }
    runtime.pendingExclusiveStart = null;
  }

  function renderPersistenceStatus(override) {
    if (!dom.persistenceStatus) {
      return;
    }
    const status = Object.assign({}, runtime.persistenceStatus || {}, override || {});
    const mode = String(status.mode || 'local');
    const reason = String(status.reason || '');
    let text = '';
    let tone = 'warning';
    if (status.futureVersion || mode === 'readOnly' || reason === 'futureVersion') {
      text = 'Ten zapis pochodzi z nowszej wersji gry. Działa tylko podgląd — niczego nie nadpiszemy.';
      tone = 'danger';
    } else if (reason === 'corruptRecovered') {
      text = 'Wykryto uszkodzony zapis. Gra uruchomiła bezpieczny nowy stan, a kopia starego zapisu została zachowana do odzyskania.';
      tone = 'danger';
    } else if (reason === 'ownershipPending'
      || runtime.foreignExclusiveSession && runtime.foreignExclusiveSession.claimPending) {
      text = 'Poprzednia karta nie odnawia już sesji. Trwa bezpieczna próba przejęcia zapisu.';
    } else if (isForeignExclusiveSessionActive() || reason === 'foreignExclusive') {
      text = 'Minigra lub walka trwa w innej karcie. Tutaj działa bezpieczny podgląd bez zapisywania.';
    } else if (reason === 'conflict') {
      text = 'Inna karta zapisała nowszy stan. Wczytano najświeższą wersję, aby nie utracić postępu.';
      tone = 'danger';
    } else if (reason === 'externalUpdate') {
      text = 'Wczytano nowszy stan zapisany w innej karcie.';
    } else if (reason === 'storageBusy') {
      text = 'Inna karta właśnie zapisuje grę. Ponowimy zapis za chwilę.';
    } else if (mode === 'memory') {
      text = 'Pamięć przeglądarki jest niedostępna. Ta sesja działa tymczasowo i zniknie po zamknięciu karty.';
    }
    dom.persistenceStatus.textContent = text;
    dom.persistenceStatus.hidden = !text;

  function renderBuildBadge() {
    if (!dom.buildBadge) {
      return;
    }

    const build = config.build || {};
    const label = String(build.label || formatBuildLabel(build)).trim();
    dom.buildBadge.textContent = label;
    dom.buildBadge.hidden = !label;
    if (label) {
      const source = build.sourceHash ? 'source ' + build.sourceHash : '';
      const revision = build.revision ? 'commit ' + build.revision : '';
      dom.buildBadge.title = [label, source, revision].filter(Boolean).join(' · ');
    }
  }

  function formatBuildLabel(build) {
    const version = String((build && build.version) || config.appVersion || '').trim();
    const id = String(build && build.id || '').trim();
    if (version && id) {
      return 'v' + version + '+' + id;
    }
    return version ? 'v' + version : id;
  }

  function setupCanvas() {
    runtime.canvas = document.getElementById('mushroomCanvas');
    if (!runtime.canvas || typeof runtime.canvas.getContext !== 'function') {
      return;
    }
    runtime.canvas.width = canvasSize;
    runtime.canvas.height = canvasSize;
    runtime.ctx = runtime.canvas.getContext('2d');
    if (!runtime.ctx) {
      return;
    }
    runtime.ctx.imageSmoothingEnabled = false;
    drawSceneLoadingPlaceholder('Ładowanie sceny');
    markClientBootSeen();
  }

  function markClientBootSeen() {
    window.__pieczargotchiBootSeen = true;

  function handleRuntimeRetry() {
    if (runtime.state && typeof persistRuntimeState === 'function' && !isRuntimeMutationBlocked()) {
      persistRuntimeState(runtime.state);
    }
    window.location.reload();
  }

  function blockReadOnlyMutation(event) {
    if (!isRuntimeMutationBlocked()) {
      return;
    }
    const target = event.target && event.target.closest
      ? event.target.closest('button, input, select, textarea, [data-discovery-id]')
      : null;
    if (!target) {
      return;
    }
    const allowed = target.matches(
      '[data-view-care], [data-view-arena], [data-discovery-id], [data-journal-polaroid-close], [data-export-button], '
      + '[data-settings-open], [data-settings-close], [data-import-cancel], [data-reset-cancel], '
      + '[data-rename-cancel], [data-minigame-return], [data-runtime-retry], '
      + '[data-world-explore-toggle], [data-world-explore-action]'
    );
    if (!allowed) {
      event.preventDefault();
      event.stopImmediatePropagation();
      renderPersistenceStatus();
    }
  }

  function trapNameGateFocus(event) {
    if (event.key !== 'Tab' || !dom.nameGate || dom.nameGate.hidden) {
      return;
    }
    const focusable = Array.from(dom.nameGate.querySelectorAll('input, button, [tabindex]:not([tabindex="-1"])')).filter(function(node) {
      return !node.disabled && !node.hidden;
    });
    if (!focusable.length) {
      return;
    }
    const first = focusable[0];
    const last = focusable[focusable.length - 1];
    if (event.shiftKey && document.activeElement === first) {
      event.preventDefault();
      last.focus();
    } else if (!event.shiftKey && document.activeElement === last) {
      event.preventDefault();
      first.focus();
    }
  }

  function handleResetButtonClick() {
    if (isRuntimeMutationBlocked()) {
      renderPersistenceStatus();
      return;
    }
    if (dom.resetDialog) {
      openResetDialog();
      return;
    }
    const now = getRuntimeNow();
    if (Number(runtime.resetConfirmUntil) > now) {
      performGameReset();
      return;
    }

    armResetConfirmation(now);
  }

  function armResetConfirmation(now) {
    runtime.resetConfirmUntil = now + resetConfirmWindowMs;
    if (runtime.resetConfirmTimer) {
      window.clearTimeout(runtime.resetConfirmTimer);
    }
    runtime.resetConfirmTimer = window.setTimeout(clearResetConfirmation, resetConfirmWindowMs);
    setResetButtonPending(true);
  }

  function clearResetConfirmation() {
    runtime.resetConfirmUntil = 0;
    if (runtime.resetConfirmTimer) {
      window.clearTimeout(runtime.resetConfirmTimer);
      runtime.resetConfirmTimer = null;
    }
    setResetButtonPending(false);
  }

  function setResetButtonPending(pending) {
    if (!dom.resetButton) {
      return;
    }

    dom.resetButton.textContent = pending ? 'Potwierdź' : 'Od nowa';
    dom.resetButton.title = pending
      ? 'Kliknij jeszcze raz, żeby wyczyścić zapis gry'
      : 'Wyczyść zapis gry';
    dom.resetButton.setAttribute('aria-label', pending
      ? 'Potwierdź rozpoczęcie od nowa'
      : 'Rozpocznij od nowa');
    dom.resetButton.classList.toggle('is-reset-pending', Boolean(pending));
  }

  function performGameReset() {
    if (isRuntimeMutationBlocked()) {
      renderPersistenceStatus();
      return;
    }
    if (guardNonSessionMutation('Od nowa')) {
      return;
    }
    clearResetConfirmation();
    closeResetDialog();
    const previous = deepClone(runtime.state || {});
    abortExclusiveRuntimeSession('reset');
    runtime.state = createDefaultState();
    runtime.state.saveRevision = Number(previous.saveRevision) || 0;
    runtime.state.saveWriterId = previous.saveWriterId || null;
    addLog(runtime.state, 'Nowa grzybnia jest gotowa.', getRuntimeNow());
    if (typeof saveReplacementState === 'function') {
      const result = saveReplacementState(runtime.state, previous);
      runtime.persistenceStatus = typeof getPersistenceStatus === 'function' ? getPersistenceStatus() : result;
      renderPersistenceStatus(result);
      if (!result || result.ok === false) {
        runtime.state = loadState() || previous;
        reconcileExclusiveRuntimeSession(getRuntimeNow());
        renderUi();
        resumeMinigameIfActive();
        return;
      }
    } else {
      const result = persistRuntimeState(runtime.state);
      if (result && result.ok === false) {
        runtime.state = previous;
        reconcileExclusiveRuntimeSession(getRuntimeNow());
        renderUi();
        resumeMinigameIfActive();
        return;
      }
    }
    runtime.minigameLastOutcome = null;
    renderUi();
    focusNameInputIfNeeded();
    triggerEffect('clean');
  }

  function handleNameFormSubmit(event) {
    event.preventDefault();
    if (isRuntimeMutationBlocked()) {
      renderPersistenceStatus();
      return;
    }
    const name = normalizeMushroomNameValue(dom.nameInput && dom.nameInput.value);
    if (!name) {
      if (dom.nameError) {
        dom.nameError.textContent = 'Wpisz imię.';
      }
      if (dom.nameInput) {
        dom.nameInput.focus();
      }
      return;
    }

    const now = getRuntimeNow();
    runtime.state.mushroomName = name;
    runtime.state.flags = Object.assign({}, runtime.state.flags || {}, { nameConfirmed: true });
    runtime.state.lastUpdatedAt = new Date(now).toISOString();
    addLog(runtime.state, name + ' trafia do miękkiej grzybni.', now);
    persistRuntimeState(runtime.state);
    if (dom.nameError) {
      dom.nameError.textContent = '';
    }
    renderUi();
  }

  function openRuntimeDialog(dialog, focusTarget, modalId, returnFocus) {
    if (!dialog) {
      return false;
    }
    if (typeof openSceneFirstDialog === 'function') {
      openSceneFirstDialog(dialog, modalId, returnFocus || document.activeElement);
      window.setTimeout(function() {
        const target = focusTarget || dialog.querySelector('button, input, [tabindex]:not([tabindex="-1"])');
        if (target && typeof target.focus === 'function') {
          target.focus({ preventScroll: true });
        }
      }, 0);
      return true;
    }
    if (runtime.ui) {
      runtime.ui.activeModal = modalId || dialog.dataset.dialog || null;
    }
    dialog.hidden = false;
    dialog.removeAttribute('aria-hidden');
    if (typeof dialog.showModal === 'function' && !dialog.open) {
      dialog.showModal();
    } else if (!dialog.hasAttribute('open')) {
      dialog.setAttribute('open', '');
    }
    window.setTimeout(function() {
      const target = focusTarget || dialog.querySelector('button, input, [tabindex]:not([tabindex="-1"])');
      if (target && typeof target.focus === 'function') {
        target.focus();
      }
    }, 0);
    return true;
  }

  function closeRuntimeDialog(dialog, returnFocus, restoreFocus) {
    if (!dialog) {
      return;
    }
    if (typeof closeSceneFirstDialog === 'function') {
      const wasOpen = Boolean(dialog.open || dialog.hasAttribute('open'));
      if (wasOpen && returnFocus && !dialog.__pieczargotchiReturnFocus) {
        dialog.__pieczargotchiReturnFocus = returnFocus;
      }
      closeSceneFirstDialog(dialog, { restoreFocus: restoreFocus !== false });
      dialog.hidden = true;
      dialog.setAttribute('aria-hidden', 'true');
      return;
    }
    if (typeof dialog.close === 'function' && dialog.open) {
      dialog.close();
    } else {
      dialog.removeAttribute('open');
    }
    dialog.hidden = true;
    dialog.setAttribute('aria-hidden', 'true');
    if (runtime.ui) {
      runtime.ui.activeModal = null;
    }
    if (restoreFocus !== false && returnFocus && returnFocus.isConnected && typeof returnFocus.focus === 'function') {
      window.setTimeout(function() {
        returnFocus.focus();
      }, 0);
    }
  }

  function openResetDialog() {
    if (isRuntimeMutationBlocked()) {
      renderPersistenceStatus();
      return;

    runtime.resetDialogReturnFocus = document.activeElement;
    openRuntimeDialog(dom.resetDialog, dom.resetCancel || dom.resetConfirm, 'reset', runtime.resetDialogReturnFocus);

    runtime.resetDialogReturnFocus = null;

  function openRenameDialog() {
    if (isRuntimeMutationBlocked()) {
      renderPersistenceStatus();
      return;
    }
    if (isMinigameActive() || isBattleSessionActive()) {
      setTransientMessage('Imię', 'Zmień imię po zakończeniu aktywnej rozgrywki.');
      return;
    }
    runtime.renameDialogReturnFocus = document.activeElement;
    if (dom.renameInput) {
      dom.renameInput.value = getMushroomName(runtime.state);
    }
    if (dom.renameError) {
      dom.renameError.textContent = '';
    }
    openRuntimeDialog(dom.renameDialog, dom.renameInput, 'rename', runtime.renameDialogReturnFocus);
  }

  function closeRenameDialog() {
    const returnFocus = runtime.renameDialogReturnFocus;
    runtime.renameDialogReturnFocus = null;
    closeRuntimeDialog(dom.renameDialog, returnFocus);
  }

  function handleRenameFormSubmit(event) {
    if (event) {
      event.preventDefault();
    }
    if (isRuntimeMutationBlocked()) {
      renderPersistenceStatus();
      return;
    }
    if (isMinigameActive() || isBattleSessionActive()) {
      if (dom.renameError) {
        dom.renameError.textContent = 'Zakończ aktywną rozgrywkę przed zmianą imienia.';
      }
      return;
    }
    const name = normalizeMushroomNameValue(dom.renameInput && dom.renameInput.value);
    if (!name) {
      if (dom.renameError) {
        dom.renameError.textContent = 'Wpisz imię.';
      }
      if (dom.renameInput) {
        dom.renameInput.focus();
      }
      return;
    }
    const previousName = getMushroomName(runtime.state);
    if (name === previousName) {
      closeRenameDialog();
      return;
    }
    const now = getRuntimeNow();
    runtime.state.mushroomName = name;
    runtime.state.flags = Object.assign({}, runtime.state.flags || {}, { nameConfirmed: true });
    runtime.state.lastUpdatedAt = new Date(now).toISOString();
    addLog(runtime.state, previousName + ' od teraz ma na imię ' + name + '.', now);
    const result = persistRuntimeState(runtime.state);
    if (result && result.ok === false) {
      if (dom.renameError) {
        dom.renameError.textContent = 'Nie udało się zapisać nowego imienia. Spróbuj ponownie.';
      }
      return;
    }
    closeRenameDialog();
    renderUi();
  }

  function focusNameInputIfNeeded() {
    if (!isRuntimeMutationBlocked() && !hasNamedMushroom(runtime.state) && dom.nameInput) {
      window.setTimeout(function() {
        dom.nameInput.focus();
      }, 0);
    }
  }

  function bindKeyboardShortcuts() {
    document.addEventListener('keydown', function(event) {
      if (event.defaultPrevented
        || event.ctrlKey
        || event.metaKey
        || event.altKey
        || event.isComposing
        || event.repeat
        || shouldIgnoreShortcut(event.target)) {
        return;
      }
      if (isUiInputModalActive() || getExclusiveGameplaySession()) {
        return;
      }

      const key = event.key.toUpperCase();
      if (key === 'E' && typeof toggleWorldExplorationPanel === 'function') {
        event.preventDefault();
        toggleWorldExplorationPanel(undefined, 'keyboard');
        return;
      }
      const action = actions.find(function(candidate) {
        return candidate.shortcut === key;
      });

      if (!action) {
        return;
      }

      event.preventDefault();
      handleAction(action.id, 'keyboard');
      flashActionButton(action.id);
    });
  }

  function shouldIgnoreShortcut(target) {
    if (!target) {
      return false;
    }

    const tagName = target.tagName ? target.tagName.toLowerCase() : '';
    return tagName === 'input' || tagName === 'textarea' || tagName === 'select' || target.isContentEditable;
  }
