  function setupCanvas() {
    runtime.canvas = document.getElementById('mushroomCanvas');
    runtime.canvas.width = canvasSize;
    runtime.canvas.height = canvasSize;
    runtime.ctx = runtime.canvas.getContext('2d');
    runtime.ctx.imageSmoothingEnabled = false;
  }

  function bindControls() {
    dom.resetButton.addEventListener('click', function() {
      if (!window.confirm('Zresetować Pieczargotchi i wyczyścić zapis gry?')) {
        return;
      }

      runtime.state = createDefaultState();
      addLog(runtime.state, 'Nowa grzybnia jest gotowa.', getRuntimeNow());
      saveState(runtime.state);
      renderUi();
      triggerEffect('clean');
    });

    bindDebugControls();
  }

  function bindKeyboardShortcuts() {
    document.addEventListener('keydown', function(event) {
      if (event.defaultPrevented || shouldIgnoreShortcut(event.target)) {
        return;
      }

      const key = event.key.toUpperCase();
      const action = actions.find(function(candidate) {
        return candidate.shortcut === key;
      });

      if (!action) {
        return;
      }

      event.preventDefault();
      handleAction(action.id, 'keyboard');
      flashActionButton(action.id);
    });
  }

  function shouldIgnoreShortcut(target) {
    if (!target) {
      return false;
    }

    const tagName = target.tagName ? target.tagName.toLowerCase() : '';
    return tagName === 'input' || tagName === 'textarea' || tagName === 'select' || target.isContentEditable;
  }
