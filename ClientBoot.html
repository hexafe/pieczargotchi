  function init() {
    bindDom();
    setupCanvas();
    applyRuntimeVisibility();
    if (runtimeOptions.exposeRuntime) {
      window.__pieczargotchiRuntime = runtime;
    }
    runtime.debug = loadDebugSettings();
    loadAssets();
    const weatherReady = initWeatherScene();
    finishInit();
    weatherReady.then(renderUi).catch(renderUi);
  }

  function handleBootError(error) {
    const message = error && error.message ? error.message : String(error || 'Nieznany błąd startu');
    runtime.bootError = message;
    runtime.assetStatus = 'Awaryjny start sceny';
    if (window.console && typeof window.console.error === 'function') {
      window.console.error('Błąd startu Pieczargotchi:', error);
    }

    if (!runtime.canvas || !runtime.ctx) {
      try {
        runtime.canvas = document.getElementById('mushroomCanvas');
        if (runtime.canvas && typeof runtime.canvas.getContext === 'function') {
          runtime.canvas.width = canvasSize;
          runtime.canvas.height = canvasSize;
          runtime.ctx = runtime.canvas.getContext('2d');
        }
      } catch (canvasError) {
        if (window.console && typeof window.console.error === 'function') {
          window.console.error('Nie udało się przygotować awaryjnego canvasa:', canvasError);
        }
      }
    }

    drawEmergencyCanvasFallback('Awaryjny start');
    markClientBootSeen();
    try {
      if (!dom.assetStatus) {
        dom.assetStatus = document.querySelector('[data-asset-status]');
      }
      renderAssetStatus();
    } catch (statusError) {
      if (window.console && typeof window.console.error === 'function') {
        window.console.error('Nie udało się pokazać statusu awaryjnego:', statusError);
      }
    }
  }

  function finishInit() {
    if (runtime.booted) {
      return;
    }

    runtime.booted = true;
    markClientBootSeen();
    runtime.state = loadState();
    runtime.state = applyElapsedTime(runtime.state, getRuntimeNow());
    saveState(runtime.state);

    renderActions();
    renderDebugControls();
    bindControls();
    bindImmersionInput();
    bindKeyboardShortcuts();
    renderUi();
    resumeMinigameIfActive();
    startTimers();
    startRenderLoop();
  }

  function setupCanvas() {
    runtime.canvas = document.getElementById('mushroomCanvas');
    if (!runtime.canvas || typeof runtime.canvas.getContext !== 'function') {
      return;
    }
    runtime.canvas.width = canvasSize;
    runtime.canvas.height = canvasSize;
    runtime.ctx = runtime.canvas.getContext('2d');
    if (!runtime.ctx) {
      return;
    }
    runtime.ctx.imageSmoothingEnabled = false;
    drawEmergencyCanvasFallback('Ładowanie sceny');
    markClientBootSeen();
  }

  function markClientBootSeen() {
    window.__pieczargotchiBootSeen = true;
  }

  function bindControls() {
    dom.resetButton.addEventListener('click', function() {
      if (!window.confirm('Zresetować Pieczargotchi i wyczyścić zapis gry?')) {
        return;
      }

      runtime.state = createDefaultState();
      addLog(runtime.state, 'Nowa grzybnia jest gotowa.', getRuntimeNow());
      saveState(runtime.state);
      renderUi();
      triggerEffect('clean');
    });

    dom.viewCare.addEventListener('click', function() {
      setViewMode('care');
    });

    dom.viewArena.addEventListener('click', function() {
      setViewMode('arena');
    });

    dom.battleStart.addEventListener('click', handleBattleStart);
    dom.minigameStartButtons.forEach(function(button) {
      button.addEventListener('click', function() {
        handleMinigameStart(button.dataset.minigameStart);
      });
    });
    if (dom.minigameEnd) {
      dom.minigameEnd.addEventListener('click', function() {
        handleMinigameEnd('manual');
      });
    }
    if (dom.dewCatchCanvas) {
      dom.dewCatchCanvas.addEventListener('pointerdown', handleDewCatchPointer);
    }
    if (dom.sporePopCanvas) {
      dom.sporePopCanvas.addEventListener('pointerdown', handleSporePopPointer);
    }
    if (dom.exportButton) {
      dom.exportButton.addEventListener('click', handleExportState);
    }
    if (dom.importButton) {
      dom.importButton.addEventListener('click', handleImportClick);
    }
    if (dom.importInput) {
      dom.importInput.addEventListener('change', handleImportFile);
    }
    bindDebugControls();
  }

  function bindKeyboardShortcuts() {
    document.addEventListener('keydown', function(event) {
      if (event.defaultPrevented || shouldIgnoreShortcut(event.target)) {
        return;
      }
      if (isMinigameActive()) {
        return;
      }

      const key = event.key.toUpperCase();
      const action = actions.find(function(candidate) {
        return candidate.shortcut === key;
      });

      if (!action) {
        return;
      }

      event.preventDefault();
      handleAction(action.id, 'keyboard');
      flashActionButton(action.id);
    });
  }

  function shouldIgnoreShortcut(target) {
    if (!target) {
      return false;
    }

    const tagName = target.tagName ? target.tagName.toLowerCase() : '';
    return tagName === 'input' || tagName === 'textarea' || tagName === 'select' || target.isContentEditable;
  }
