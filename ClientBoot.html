  function normalizeMushroomNameValue(value) {
    return String(value || '')
      .replace(/\s+/g, ' ')
      .trim()
      .slice(0, mushroomNameMaxLength);
  }

  function getMushroomName(state) {
    return normalizeMushroomNameValue(state && state.mushroomName) || defaultMushroomName;
  }

  function hasNamedMushroom(state) {
    if (!state) {
      return false;
    }

    const name = normalizeMushroomNameValue(state.mushroomName);
    const flags = state.flags || {};
    return Boolean(name && (flags.nameConfirmed || name !== defaultMushroomName));
  }

  function formatMushroomText(value, state) {
    const text = String(value || '');
    if (!text || !hasNamedMushroom(state || runtime.state)) {
      return text;
    }

    const name = getMushroomName(state || runtime.state);
    const letters = 'A-Za-zĄĆĘŁŃÓŚŹŻąćęłńóśźż';
    const pattern = new RegExp('(^|[^' + letters + '])(Pieczarka|Pieczarkę|Pieczarki|Pieczarce|Pieczarką)(?=$|[^' + letters + '])', 'g');
    return text.replace(pattern, function(match, prefix) {
      return prefix + name;
    });
  }

    try {

  function init() {
    bindDom();

      window.__pieczargotchiRuntime = runtime;
    }
    runtime.debug = loadDebugSettings();
    loadAssets();
    const weatherReady = initWeatherScene();
    finishInit();
    weatherReady.then(renderUi).catch(renderUi);
  }

  function handleBootError(error) {
    const message = error && error.message ? error.message : String(error || 'Nieznany błąd startu');
    runtime.bootError = message;
    runtime.assetStatus = 'Awaryjny start sceny';
    if (window.console && typeof window.console.error === 'function') {
      window.console.error('Błąd startu Pieczargotchi:', error);
    }

    if (!runtime.canvas || !runtime.ctx) {
      try {
        runtime.canvas = document.getElementById('mushroomCanvas');
        if (runtime.canvas && typeof runtime.canvas.getContext === 'function') {
          runtime.canvas.width = canvasSize;
          runtime.canvas.height = canvasSize;
          runtime.ctx = runtime.canvas.getContext('2d');
        }
      } catch (canvasError) {
        if (window.console && typeof window.console.error === 'function') {
          window.console.error('Nie udało się przygotować awaryjnego canvasa:', canvasError);
        }
      }
    }

    drawEmergencyCanvasFallback('Awaryjny start');
    markClientBootSeen();
    try {
      if (!dom.assetStatus) {
        dom.assetStatus = document.querySelector('[data-asset-status]');
      }
      renderAssetStatus();
    } catch (statusError) {
      if (window.console && typeof window.console.error === 'function') {
        window.console.error('Nie udało się pokazać statusu awaryjnego:', statusError);
      }
    }
  }

  function finishInit() {
    if (runtime.booted) {
      return;
    }

    runtime.booted = true;
    markClientBootSeen();
    runtime.state = loadState();
    runtime.state = applyElapsedTime(runtime.state, getRuntimeNow());

    renderActions();

    renderDebugControls();
    bindControls();
    bindImmersionInput();
    bindKeyboardShortcuts();
    renderUi();
    focusNameInputIfNeeded();
    resumeMinigameIfActive();
    startTimers();
    startRenderLoop();
  }

  function renderBuildBadge() {
    if (!dom.buildBadge) {
      return;
    }

    const build = config.build || {};
    const label = String(build.label || formatBuildLabel(build)).trim();
    dom.buildBadge.textContent = label;
    dom.buildBadge.hidden = !label;
    if (label) {
      const source = build.sourceHash ? 'source ' + build.sourceHash : '';
      const revision = build.revision ? 'commit ' + build.revision : '';
      dom.buildBadge.title = [label, source, revision].filter(Boolean).join(' · ');
    }
  }

  function formatBuildLabel(build) {
    const version = String((build && build.version) || config.appVersion || '').trim();
    const id = String(build && build.id || '').trim();
    if (version && id) {
      return 'v' + version + '+' + id;
    }
    return version ? 'v' + version : id;
  }

    runtime.canvas.height = canvasSize;

    runtime.ctx.imageSmoothingEnabled = false;
    drawSceneLoadingPlaceholder('Ładowanie sceny');
    markClientBootSeen();
  }

  function markClientBootSeen() {
    window.__pieczargotchiBootSeen = true;
  }

  function bindControls() {
    dom.resetButton.addEventListener('click', handleResetButtonClick);
    if (dom.nameForm) {
      dom.nameForm.addEventListener('submit', handleNameFormSubmit);
    }

    dom.viewCare.addEventListener('click', function() {
      setViewMode('care');
    });

    dom.viewArena.addEventListener('click', function() {
      setViewMode('arena');
    });

    dom.battleStart.addEventListener('click', handleBattleStart);
    dom.minigameStartButtons.forEach(function(button) {
      button.addEventListener('click', function() {
        handleMinigameStart(button.dataset.minigameStart);
      });
    });
    if (dom.minigameEnd) {
      dom.minigameEnd.addEventListener('click', function() {
        handleMinigameEnd('manual');
      });
    }
    if (dom.dewCatchCanvas) {
      dom.dewCatchCanvas.addEventListener('pointerdown', handleDewCatchPointer);
      dom.dewCatchCanvas.addEventListener('pointermove', handleDewCatchPointer);
    }
    if (dom.sporePopCanvas) {
      dom.sporePopCanvas.addEventListener('pointerdown', handleSporePopPointer);
    }
    if (dom.compostSortCanvas) {
      dom.compostSortCanvas.addEventListener('pointerdown', handleCompostSortPointer);
      dom.compostSortCanvas.addEventListener('pointermove', handleCompostSortPointer);
      dom.compostSortCanvas.addEventListener('pointerup', handleCompostSortPointer);
      dom.compostSortCanvas.addEventListener('pointercancel', handleCompostSortPointer);
    }
    if (dom.rhythmHumCanvas) {
      dom.rhythmHumCanvas.addEventListener('pointerdown', handleRhythmHumPointer);
    }
    if (dom.legendaryGameCanvas) {
      dom.legendaryGameCanvas.addEventListener('pointerdown', handleLegendaryGamePointer);
    }
    if (dom.legendaryMinigameEnd) {
      dom.legendaryMinigameEnd.addEventListener('click', function() {
        handleMinigameEnd('manual');
      });
    }
    if (dom.exportButton) {
      dom.exportButton.addEventListener('click', handleExportState);
    }
    if (dom.importButton) {
      dom.importButton.addEventListener('click', handleImportClick);
    }
    if (dom.importInput) {
      dom.importInput.addEventListener('change', handleImportFile);
    }
    if (typeof bindWorldJournalInteractions === 'function') {
      bindWorldJournalInteractions();
    }
    bindDebugControls();
  }

  function handleResetButtonClick() {
    const now = getRuntimeNow();
    if (Number(runtime.resetConfirmUntil) > now) {
      performGameReset();
      return;
    }

    armResetConfirmation(now);
  }

  function armResetConfirmation(now) {
    runtime.resetConfirmUntil = now + resetConfirmWindowMs;
    if (runtime.resetConfirmTimer) {
      window.clearTimeout(runtime.resetConfirmTimer);
    }
    runtime.resetConfirmTimer = window.setTimeout(clearResetConfirmation, resetConfirmWindowMs);
    setResetButtonPending(true);
  }

  function clearResetConfirmation() {
    runtime.resetConfirmUntil = 0;
    if (runtime.resetConfirmTimer) {
      window.clearTimeout(runtime.resetConfirmTimer);
      runtime.resetConfirmTimer = null;
    }
    setResetButtonPending(false);
  }

  function setResetButtonPending(pending) {
    if (!dom.resetButton) {
      return;
    }

    dom.resetButton.textContent = pending ? 'Potwierdź' : 'Od nowa';
    dom.resetButton.title = pending
      ? 'Kliknij jeszcze raz, żeby wyczyścić zapis gry'
      : 'Wyczyść zapis gry';
    dom.resetButton.setAttribute('aria-label', pending
      ? 'Potwierdź rozpoczęcie od nowa'
      : 'Rozpocznij od nowa');
    dom.resetButton.classList.toggle('is-reset-pending', Boolean(pending));
  }

  function performGameReset() {
    clearResetConfirmation();
    runtime.state = createDefaultState();
    addLog(runtime.state, 'Nowa grzybnia jest gotowa.', getRuntimeNow());
    saveState(runtime.state);
    renderUi();
    focusNameInputIfNeeded();
    triggerEffect('clean');
  }

  function handleNameFormSubmit(event) {
    event.preventDefault();
    const name = normalizeMushroomNameValue(dom.nameInput && dom.nameInput.value);
    if (!name) {
      if (dom.nameError) {
        dom.nameError.textContent = 'Wpisz imię.';
      }
      if (dom.nameInput) {
        dom.nameInput.focus();
      }
      return;
    }

    const now = getRuntimeNow();
    runtime.state.mushroomName = name;
    runtime.state.flags = Object.assign({}, runtime.state.flags || {}, { nameConfirmed: true });
    runtime.state.lastUpdatedAt = new Date(now).toISOString();
    addLog(runtime.state, name + ' trafia do miękkiej grzybni.', now);
    saveState(runtime.state);
    if (dom.nameError) {
      dom.nameError.textContent = '';
    }
    renderUi();
  }

  function focusNameInputIfNeeded() {
    if (!hasNamedMushroom(runtime.state) && dom.nameInput) {
      window.setTimeout(function() {
        dom.nameInput.focus();
      }, 0);
    }
  }

  function bindKeyboardShortcuts() {
    document.addEventListener('keydown', function(event) {
      if (event.defaultPrevented || shouldIgnoreShortcut(event.target)) {
        return;
      }
      if (isMinigameActive()) {
        return;
      }

      const key = event.key.toUpperCase();
      const action = actions.find(function(candidate) {
        return candidate.shortcut === key;
      });

      if (!action) {
        return;
      }

      event.preventDefault();
      handleAction(action.id, 'keyboard');
      flashActionButton(action.id);
    });
  }

  function shouldIgnoreShortcut(target) {
    if (!target) {
      return false;
    }

    const tagName = target.tagName ? target.tagName.toLowerCase() : '';
    return tagName === 'input' || tagName === 'textarea' || tagName === 'select' || target.isContentEditable;
  }
