name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex-*'
      - 'codex/**'

permissions:
  contents: read

concurrency:
  group: pieczargotchi-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Deterministic QA
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install pinned Node tooling
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-qa.txt

      - name: Install pinned sprite audit dependencies
        run: python -m pip install -r requirements-qa.txt

      - name: Verify runner browser
        run: test -x /usr/bin/google-chrome

      - name: Run full QA, including browser smoke
        env:
          TZ: Europe/Warsaw
          CHROMIUM_BIN: /usr/bin/google-chrome
          PIECZARGOTCHI_BROWSER_SMOKE_OUTPUT_DIR: ${{ github.workspace }}/qa-artifacts/browser-smoke
        run: npm run qa

      - name: Upload failed browser-smoke evidence
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: browser-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: qa-artifacts/browser-smoke
          if-no-files-found: ignore
          retention-days: 14

  windows-preview-smoke:
    name: Windows preview smoke
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Validate lockfile on Windows
        run: npm ci

      - name: Check Windows preview bootstrap
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File scripts\run-local-windows.ps1 -CheckOnly -ValidateAssets
