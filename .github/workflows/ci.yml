name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex-*

jobs:
  local-checks:
    name: Local checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install sprite audit dependencies
        run: python -m pip install Pillow

      - name: Check client partial syntax
        run: node scripts/check-client-syntax.mjs

      - name: Run client core tests
        run: node scripts/test-client-core.mjs

      - name: Check capture scripts
        run: |
          node --check scripts/capture-app-render.mjs
          node --check scripts/capture-life-motion.mjs
          node --check scripts/capture-weather-matrix.mjs

      - name: Check Apps Script syntax
        run: |
          node -e "const fs=require('fs'); for (const f of ['Code.gs','Config.gs','AnimationConfig.gs','AssetService.gs','StateModel.gs','GameRules.gs','Actions.gs']) { new Function(fs.readFileSync(f,'utf8')); console.log(f + ' syntax ok'); }"

      - name: Check Python helper syntax
        run: python -m py_compile scripts/build-imagegen-sprites.py scripts/generate-pixel-assets.py scripts/audit-spore-sprites.py scripts/audit-sprite-consistency.py

      - name: Validate assets
        run: node scripts/validate-assets.mjs

      - name: Audit sprite consistency
        run: python scripts/audit-sprite-consistency.py

      - name: Audit spore sprites
        run: python scripts/audit-spore-sprites.py

      - name: Check local preview bootstrap
        run: bash scripts/run-local-linux.sh --check-only

  windows-preview-smoke:
    name: Windows preview smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Windows preview bootstrap
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File scripts\run-local-windows.ps1 -CheckOnly
