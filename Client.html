    ctx.save();
    ctx.globalAlpha = 0.34;
    ctx.fillStyle = '#d8e9d2';
    constellation.lines.forEach(function(line) {
      drawPixelConstellationLine(ctx, line[0], line[1], '#d8e9d2');
    });

    constellation.stars.forEach(function(star, index) {
      const pulse = 0.80 + Math.sin(now / 420 + index * 1.7) * 0.14;
      const starSize = star.mag < 1 ? 5 : star.mag < 2.2 ? 4 : 3;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = star.mag < 1.5 ? '#fff6d4' : '#d8e9d2';
      ctx.fillRect(Math.round(star.x - starSize / 2), Math.round(star.y - starSize / 2), starSize, starSize);
      if (star.mag < 1.5) {
        ctx.globalAlpha = pulse * 0.45;
        ctx.fillRect(Math.round(star.x - 1), Math.round(star.y - 4), 2, 8);
        ctx.fillRect(Math.round(star.x - 4), Math.round(star.y - 1), 8, 2);
      }
    });
    ctx.restore();
  }

  function selectVisibleConstellation(scene, date) {
    const observer = getSceneObserver(scene);
    let best = null;

    constellationCatalog.forEach(function(constellation) {
      const visibleStars = [];
      const byId = new Map();

      constellation.stars.forEach(function(star) {
        const horizontal = getHorizontalCoordinates(date, observer.latitude, observer.longitude, {
          rightAscension: star.ra,
          declination: star.dec
        });
        const screen = projectConstellationStarToSky(horizontal);
        if (!screen) {
          return;
        }

        const projected = Object.assign({}, star, screen, { altitude: horizontal.altitude });
        visibleStars.push(projected);
        byId.set(star.id, projected);
      });

      if (visibleStars.length < (constellation.minStars || 4)) {
        return;
      }

      const visibleLines = constellation.lines.map(function(line) {
        const start = byId.get(line[0]);
        const end = byId.get(line[1]);
        return start && end ? [start, end] : null;
      }).filter(Boolean);
      if (visibleLines.length < 3) {
        return;
      }

      const bounds = getPointBounds(visibleStars);
      const widthPenalty = Math.max(0, bounds.width - 250) * 0.18;
      const heightPenalty = Math.max(0, bounds.height - 170) * 0.25;
      const compactPenalty = Math.max(0, 70 - Math.max(bounds.width, bounds.height)) * 0.22;
      const readableSpread = Math.min(170, Math.max(bounds.width, bounds.height)) * 0.08;
      const averageAltitude = visibleStars.reduce(function(total, star) {
        return total + star.altitude;
      }, 0) / visibleStars.length;
      const score = visibleStars.length * 8 + visibleLines.length * 4 + averageAltitude + readableSpread
        - widthPenalty - heightPenalty - compactPenalty;
      if (!best || score > best.score) {
        const fittedStars = fitConstellationForDisplay(visibleStars, bounds);
        const fittedById = new Map(fittedStars.map(function(star) {
          return [star.id, star];
        }));
        best = {
          id: constellation.id,
          stars: fittedStars,
          lines: visibleLines.map(function(line) {
            return [fittedById.get(line[0].id), fittedById.get(line[1].id)];
          }),
          score: score
        };
      }
    });

    return best;
  }

  function fitConstellationForDisplay(stars, bounds) {
    const longestSide = Math.max(bounds.width, bounds.height);
    if (longestSide >= 72) {
      return stars;
    }

    const scale = Math.min(1.65, 72 / Math.max(1, longestSide));
    const centerX = (bounds.left + bounds.right) / 2;
    const centerY = (bounds.top + bounds.bottom) / 2;
    return stars.map(function(star) {
      return Object.assign({}, star, {
        x: clamp(centerX + (star.x - centerX) * scale, 34, 478, star.x),
        y: clamp(centerY + (star.y - centerY) * scale, 30, 286, star.y)
      });
    });
  }

  function projectConstellationStarToSky(horizontal) {
    if (!horizontal || horizontal.altitude < 7) {
      return null;
    }

    const altitude = clamp(horizontal.altitude, 7, 82, 7);
    const altitudeProgress = clamp((altitude - 7) / 75, 0, 1, 0);
    const altitudeEase = Math.sin(altitudeProgress * Math.PI / 2);
    const azimuthSpread = 222 * Math.cos(toRadians(clamp(altitude, 0, 82, 0)));
    const x = 256 + Math.sin(toRadians(horizontal.azimuth - 180)) * azimuthSpread;
    const y = 292 - altitudeEase * 238;
    if (x < 28 || x > 484 || y < 26 || y > 292) {
      return null;
    }

    return { x: x, y: y };
  }

  function drawPixelConstellationLine(ctx, start, end, color) {
    const dx = end.x - start.x;
    const dy = end.y - start.y;
    const steps = Math.max(1, Math.ceil(Math.max(Math.abs(dx), Math.abs(dy)) / 5));
    ctx.fillStyle = color;

    for (let index = 0; index <= steps; index += 1) {
      const progress = index / steps;
      const x = Math.round(start.x + dx * progress);
      const y = Math.round(start.y + dy * progress);
      ctx.fillRect(x, y, 2, 2);
    }
  }

  function getPointBounds(points) {
    return points.reduce(function(bounds, point) {
      return {
        left: Math.min(bounds.left, point.x),
        right: Math.max(bounds.right, point.x),
        top: Math.min(bounds.top, point.y),
        bottom: Math.max(bounds.bottom, point.y),
        width: Math.max(bounds.right, point.x) - Math.min(bounds.left, point.x),
        height: Math.max(bounds.bottom, point.y) - Math.min(bounds.top, point.y)
      };
    }, {
      left: Infinity,
      right: -Infinity,
      top: Infinity,
      bottom: -Infinity,
      width: 0,
      height: 0
    });
  }

  function getSunPosition(scene, date) {
    const observer = getSceneObserver(scene);
    const coordinates = getSolarCoordinates(date);
    const horizontal = getHorizontalCoordinates(date, observer.latitude, observer.longitude, coordinates);
    const altitudeFactor = clamp((horizontal.altitude + 2) / 74, 0, 1, 0);
    const size = 40 + Math.round(altitudeFactor * 6);
    const screen = projectCelestialToSky(horizontal, size, -3);
    if (!screen) {
      return null;
    }

    const coreInset = Math.max(8, Math.round(size * 0.23));
    return {
      x: screen.x,
      y: screen.y,
      size: size,
      coreInset: coreInset,
      coreSize: size - coreInset * 2,
      altitude: horizontal.altitude,
      azimuth: horizontal.azimuth,
      alpha: screen.alpha
    };
  }

  function getSunTimesForScene(scene, date) {
    const sunrise = parseWeatherLocalTime(scene.sunriseAt);
    const sunset = parseWeatherLocalTime(scene.sunsetAt);
    if (sunrise && sunset && isSameLocalDate(date, sunrise)) {
      return { sunrise: sunrise, sunset: sunset };
    }

    return calculateSunTimes(date, scene.latitude, scene.longitude);
  }

  function getMoonPosition(scene, date) {
    const observer = getSceneObserver(scene);
    const coordinates = getLunarCoordinates(date);
    const horizontal = getHorizontalCoordinates(date, observer.latitude, observer.longitude, coordinates);
    const phase = getMoonPhase(date, coordinates);
    if (phase.illumination < 0.025) {
      return null;
    }

    const altitudeFactor = clamp((horizontal.altitude + 2) / 74, 0, 1, 0);
    const size = Math.round(28 + phase.illumination * 9 + altitudeFactor * 4);
    const screen = projectCelestialToSky(horizontal, size, -2.5);
    if (!screen) {
      return null;
    }

    return {
      x: screen.x,
      y: screen.y,
      size: size,
      phase: phase,
      altitude: horizontal.altitude,
      azimuth: horizontal.azimuth,
      alpha: screen.alpha * (0.35 + phase.illumination * 0.65)
    };
  }

  function getSceneObserver(scene) {
    const latitude = Number(scene.latitude);
    const longitude = Number(scene.longitude);
    return {
      latitude: Number.isFinite(latitude) ? latitude : defaultWeatherLocation.latitude,
      longitude: Number.isFinite(longitude) ? longitude : defaultWeatherLocation.longitude
    };
  }

  function projectCelestialToSky(horizontal, size, minimumAltitude) {
    if (!horizontal || horizontal.altitude < minimumAltitude) {
      return null;
    }

    const visibleAltitude = clamp(horizontal.altitude, minimumAltitude, 82, 0);
    const altitudeProgress = clamp((visibleAltitude - minimumAltitude) / (82 - minimumAltitude), 0, 1, 0);
    const altitudeEase = Math.sin(altitudeProgress * Math.PI / 2);
    const azimuthSpread = 226 * Math.cos(toRadians(clamp(visibleAltitude, 0, 80, 0)));
    const azimuthOffset = Math.sin(toRadians(horizontal.azimuth - 180));
    const x = clamp(256 + azimuthOffset * azimuthSpread - size / 2, 26, 486 - size, 256 - size / 2);
    const y = clamp(292 - altitudeEase * 246 - size / 2, 30, 292 - size / 2, 292 - size / 2);
    const alpha = clamp((horizontal.altitude - minimumAltitude) / 8, 0, 1, 0);

    return {
      x: Math.round(x),
      y: Math.round(y),
      alpha: alpha
    };
  }

  function getSolarCoordinates(date) {
    const days = getJulianDate(date) - 2451545.0;
    const meanAnomaly = normalizeDegrees(357.5291 + 0.98560028 * days);
    const equationOfCenter = 1.9148 * sinDeg(meanAnomaly)
      + 0.0200 * sinDeg(2 * meanAnomaly)
      + 0.0003 * sinDeg(3 * meanAnomaly);
    const eclipticLongitude = normalizeDegrees(meanAnomaly + equationOfCenter + 102.9372 + 180);
    const obliquity = getObliquity(days);
    return Object.assign(eclipticToEquatorial(eclipticLongitude, 0, obliquity), {
      eclipticLongitude: eclipticLongitude,
      eclipticLatitude: 0
    });
  }

  function getLunarCoordinates(date) {
    const days = getJulianDate(date) - 2451543.5;
    const ascendingNode = normalizeDegrees(125.1228 - 0.0529538083 * days);
    const inclination = 5.1454;
    const argumentOfPerigee = normalizeDegrees(318.0634 + 0.1643573223 * days);
    const meanAnomaly = normalizeDegrees(115.3654 + 13.0649929509 * days);
    const eccentricity = 0.054900;
    const semiMajorAxis = 60.2666;
    const eccentricAnomaly = toRadians(meanAnomaly
      + eccentricity * toDegrees(Math.sin(toRadians(meanAnomaly))) * (1 + eccentricity * cosDeg(meanAnomaly)));
    const xv = semiMajorAxis * (Math.cos(eccentricAnomaly) - eccentricity);
    const yv = semiMajorAxis * Math.sqrt(1 - eccentricity * eccentricity) * Math.sin(eccentricAnomaly);
    const trueAnomaly = toDegrees(Math.atan2(yv, xv));
    const distance = Math.sqrt(xv * xv + yv * yv);
    const argument = trueAnomaly + argumentOfPerigee;
    const xh = distance * (cosDeg(ascendingNode) * cosDeg(argument)
      - sinDeg(ascendingNode) * sinDeg(argument) * cosDeg(inclination));
    const yh = distance * (sinDeg(ascendingNode) * cosDeg(argument)
      + cosDeg(ascendingNode) * sinDeg(argument) * cosDeg(inclination));
    const zh = distance * sinDeg(argument) * sinDeg(inclination);
    let eclipticLongitude = normalizeDegrees(toDegrees(Math.atan2(yh, xh)));
    let eclipticLatitude = toDegrees(Math.atan2(zh, Math.sqrt(xh * xh + yh * yh)));

    const sunMeanAnomaly = normalizeDegrees(356.0470 + 0.9856002585 * days);
    const sunMeanLongitude = normalizeDegrees(280.460 + 0.9856474 * days);
    const moonMeanLongitude = normalizeDegrees(ascendingNode + argumentOfPerigee + meanAnomaly);
    const elongation = normalizeDegrees(moonMeanLongitude - sunMeanLongitude);
    const argumentOfLatitude = normalizeDegrees(moonMeanLongitude - ascendingNode);

    eclipticLongitude = normalizeDegrees(eclipticLongitude
      - 1.274 * sinDeg(meanAnomaly - 2 * elongation)
      + 0.658 * sinDeg(2 * elongation)
      - 0.186 * sinDeg(sunMeanAnomaly)
      - 0.059 * sinDeg(2 * meanAnomaly - 2 * elongation)
      - 0.057 * sinDeg(meanAnomaly - 2 * elongation + sunMeanAnomaly)
      + 0.053 * sinDeg(meanAnomaly + 2 * elongation)
      + 0.046 * sinDeg(2 * elongation - sunMeanAnomaly)
      + 0.041 * sinDeg(meanAnomaly - sunMeanAnomaly)
      - 0.035 * sinDeg(elongation)
      - 0.031 * sinDeg(meanAnomaly + sunMeanAnomaly));

    eclipticLatitude += -0.173 * sinDeg(argumentOfLatitude - 2 * elongation)
      - 0.055 * sinDeg(meanAnomaly - argumentOfLatitude - 2 * elongation)
      - 0.046 * sinDeg(meanAnomaly + argumentOfLatitude - 2 * elongation)
      + 0.033 * sinDeg(argumentOfLatitude + 2 * elongation)
      + 0.017 * sinDeg(2 * meanAnomaly + argumentOfLatitude);

    const obliquity = getObliquity(days);
    return Object.assign(eclipticToEquatorial(eclipticLongitude, eclipticLatitude, obliquity), {
      eclipticLongitude: eclipticLongitude,
      eclipticLatitude: eclipticLatitude,
      distance: distance
    });
  }

  function getMoonPhase(date, lunarCoordinates) {
    const moon = lunarCoordinates || getLunarCoordinates(date);
    const sun = getSolarCoordinates(date);
    const fraction = normalizeDegrees(moon.eclipticLongitude - sun.eclipticLongitude) / 360;
    const illumination = (1 - Math.cos(fraction * Math.PI * 2)) / 2;

    return {
      fraction: fraction,
      illumination: illumination,
      waxing: fraction < 0.5
    };
  }

  function drawPixelMoon(ctx, moon) {
    const block = Math.max(3, Math.round(moon.size / 9));
    const radius = moon.size / 2;
    const center = moon.size / 2;

    for (let y = 0; y < moon.size; y += block) {
      for (let x = 0; x < moon.size; x += block) {
        const centerX = x + block / 2;
        const centerY = y + block / 2;
        const dx = centerX - center;
        const dy = centerY - center;
        if (dx * dx + dy * dy > radius * radius) {
          continue;
        }

        const normalizedX = dx / radius;
        const normalizedY = dy / radius;
        const lit = isMoonBlockLit(normalizedX, normalizedY, moon.phase);
        if (!lit) {
          continue;
        }

        ctx.fillStyle = getMoonLightColor(moon.phase.illumination);
        ctx.fillRect(moon.x + x, moon.y + y, block, block);
      }
    }
  }

  function isMoonBlockLit(normalizedX, normalizedY, phase) {
    const illumination = phase.illumination;
    if (illumination >= 0.97) {
      return true;
    }
    if (illumination <= 0.03) {
      return false;
    }

    const surfaceDepth = Math.sqrt(Math.max(0, 1 - normalizedX * normalizedX - normalizedY * normalizedY));
    const phaseAngle = phase.fraction * Math.PI * 2;
    return normalizedX * Math.sin(phaseAngle) - surfaceDepth * Math.cos(phaseAngle) > 0;
  }

  function getMoonLightColor(illumination) {
    if (illumination > 0.82) {
      return '#fff6d4';
    }
    if (illumination > 0.45) {
      return '#f5f0c8';
    }
    return '#d9dfbc';
  }

  function getHorizontalCoordinates(date, latitude, longitude, coordinates) {
    const localSiderealTime = normalizeDegrees(getGreenwichSiderealTime(date) + longitude);
    const hourAngle = normalizeDegrees(localSiderealTime - coordinates.rightAscension);
    const hourAngleRad = toRadians(hourAngle);
    const latitudeRad = toRadians(latitude);
    const declinationRad = toRadians(coordinates.declination);
    const altitude = toDegrees(Math.asin(
      Math.sin(latitudeRad) * Math.sin(declinationRad)
      + Math.cos(latitudeRad) * Math.cos(declinationRad) * Math.cos(hourAngleRad)
    ));
    const azimuth = normalizeDegrees(toDegrees(Math.atan2(
      Math.sin(hourAngleRad),
      Math.cos(hourAngleRad) * Math.sin(latitudeRad) - Math.tan(declinationRad) * Math.cos(latitudeRad)
    )) + 180);

    return {
      altitude: altitude,
      azimuth: azimuth
    };
  }

  function eclipticToEquatorial(longitude, latitude, obliquity) {
    const longitudeRad = toRadians(longitude);
    const latitudeRad = toRadians(latitude);
    const obliquityRad = toRadians(obliquity);
    const x = Math.cos(longitudeRad) * Math.cos(latitudeRad);
    const y = Math.sin(longitudeRad) * Math.cos(latitudeRad);
    const z = Math.sin(latitudeRad);
    const equatorialY = y * Math.cos(obliquityRad) - z * Math.sin(obliquityRad);
    const equatorialZ = y * Math.sin(obliquityRad) + z * Math.cos(obliquityRad);

    return {
      rightAscension: normalizeDegrees(toDegrees(Math.atan2(equatorialY, x))),
      declination: toDegrees(Math.atan2(equatorialZ, Math.sqrt(x * x + equatorialY * equatorialY)))
    };
  }

  function getGreenwichSiderealTime(date) {
    const julianDate = getJulianDate(date);
    const centuries = (julianDate - 2451545.0) / 36525;
    return normalizeDegrees(
      280.46061837
      + 360.98564736629 * (julianDate - 2451545.0)
      + 0.000387933 * centuries * centuries
      - centuries * centuries * centuries / 38710000
    );
  }

  function getJulianDate(date) {
    return date.getTime() / 86400000 + 2440587.5;
  }

  function getObliquity(days) {
    return 23.439291 - 0.00000036 * days;
  }

  function sinDeg(value) {
    return Math.sin(toRadians(value));
  }

  function cosDeg(value) {
    return Math.cos(toRadians(value));
  }

  function drawCloudLayer(ctx, scene, palette, now) {
    const cloudBase = scene.condition === 'clear' ? scene.cloudCover : Math.max(scene.cloudCover, 58);
    const cloudCount = Math.min(5, Math.max(0, Math.round(cloudBase / 24)));

    for (let index = 0; index < cloudCount; index += 1) {
      const x = positiveModulo(index * 128 + Math.floor(now / (110 + index * 20)), 620) - 96;
      const y = 62 + (index % 3) * 48;
      drawPixelCloud(ctx, x, y, palette.cloud, palette.cloudLight);
    }

    if (scene.condition === 'fog') {
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = '#f3f8e6';
      ctx.fillRect(0, 210, 512, 22);
      ctx.fillRect(36, 268, 440, 18);
      ctx.restore();
    }
  }

  function drawPixelCloud(ctx, x, y, color, lightColor) {
    ctx.save();
    ctx.fillStyle = color;
    ctx.fillRect(x, y + 18, 92, 22);
    ctx.fillRect(x + 18, y + 4, 38, 24);
    ctx.fillRect(x + 52, y + 10, 54, 26);
    ctx.fillStyle = lightColor;
    ctx.fillRect(x + 16, y + 20, 32, 8);
    ctx.fillRect(x + 58, y + 18, 34, 8);
    ctx.restore();
  }

  function drawWeatherLayer(ctx, scene, now) {
    if (scene.condition === 'rain' || scene.condition === 'storm') {
      ctx.save();
      ctx.globalAlpha = scene.condition === 'storm' ? 0.62 : 0.48;
      ctx.fillStyle = '#6aa8e8';
      for (let index = 0; index < 34; index += 1) {
        const x = positiveModulo(index * 43 + Math.floor(now / 30), 560) - 24;
        const y = positiveModulo(index * 61 + Math.floor(now / 18), 330);
        ctx.fillRect(x, y, 4, 14);
        ctx.fillRect(x - 3, y + 10, 4, 8);
      }
      if (scene.condition === 'storm' && Math.floor(now / 1700) % 5 === 0) {
        ctx.globalAlpha = 0.22;
        ctx.fillStyle = '#fff6b8';
        ctx.fillRect(0, 0, 512, 512);
      }
      ctx.restore();
    } else if (scene.condition === 'snow') {
      ctx.save();
      ctx.globalAlpha = 0.68;
      ctx.fillStyle = '#fffdf7';
      for (let index = 0; index < 28; index += 1) {
        const x = positiveModulo(index * 47 + Math.floor(now / 80), 548) - 18;
        const y = positiveModulo(index * 53 + Math.floor(now / 45), 350);
        const size = index % 3 === 0 ? 5 : 3;
        ctx.fillRect(x, y, size, size);
      }
      ctx.restore();
    }
  }

  function drawLowGround(ctx, palette, now) {
    const groundTop = 444;
    ctx.fillStyle = palette.ground;
    ctx.fillRect(0, groundTop, 512, 68);
    ctx.fillStyle = palette.groundLight;
    ctx.fillRect(0, groundTop, 512, 8);
    ctx.fillStyle = palette.blade;

    for (let x = -8; x < 520; x += 16) {
      const bladeHeight = 10 + ((x * 7 + Math.floor(now / 700)) % 16);
      ctx.fillRect(x, groundTop - bladeHeight, 8, bladeHeight);
    }
  }

  function drawSleepingSprite(ctx, now) {
    const sheet = runtime.assets.sleepingSheet;
    const frameCount = rules.sleepingFrameCount || 4;
    const fps = rules.sleepingFps || 3;
    const frame = Math.floor((now / 1000) * fps) % frameCount;

    if (sheet) {
      ctx.drawImage(sheet, frame * 512, 0, 512, 512, 0, 0, 512, 512);
      return;
    }

    drawFallbackMushroom(ctx, 'sleeping');
  }

  function drawAwakeSprite(ctx, now) {
    const image = runtime.assets.awake;
    const bob = Math.round(Math.sin(now / 950) * 1.5);

    if (image) {
      ctx.drawImage(image, 0, bob, 512, 512);
      return;
    }

    drawFallbackMushroom(ctx, 'awake');
  }

  function drawAwakeIdleDetails(ctx, now) {
    const thinkingPhase = now % 9000;

    if (thinkingPhase > 6200 && thinkingPhase < 8200 && !runtime.state.attention.activeNeed) {
      drawThoughtBubble(ctx, now, '?');
    }
  }

  function drawBlink(ctx) {
    ctx.fillStyle = '#fcd8a0';
    ctx.fillRect(202, 270, 32, 24);
    ctx.fillRect(286, 270, 32, 24);
    ctx.fillStyle = '#2b211b';
    ctx.fillRect(207, 282, 22, 5);
    ctx.fillRect(291, 282, 22, 5);
  }

  function drawNeedOverlay(ctx, now) {
    const need = getStrongestNeed(runtime.state);
    const pulse = 0.5 + Math.sin(now / 220) * 0.5;

    if (!need) {
      if (runtime.state.patch.quality > 82 && runtime.state.stats.happiness > 72) {
        drawSparkles(ctx, now, '#fff6b8');
      }
      return;
    }

    if (need.id === 'hydration') {
      drawDryCue(ctx, pulse, need.severity);
    } else if (need.id === 'nutrients') {
      drawThoughtBubble(ctx, now, 'NPK');
    } else if (need.id === 'happiness') {
      drawThoughtBubble(ctx, now, '...');
    } else if (need.id === 'cleanliness') {
      drawDirtCue(ctx, now, need.severity);
    } else if (need.id === 'energy') {
      drawTiredCue(ctx, now, need.severity);
    } else if (need.id === 'health') {
      drawSickCue(ctx, now, need.severity);
    }

    if (need.severity === 'critical') {
      drawAttentionAlarm(ctx, pulse);
    }
  }

  function drawDryCue(ctx, pulse, severity) {
    ctx.save();
    ctx.globalAlpha = severity === 'critical' ? 0.75 + pulse * 0.25 : 0.55;
    ctx.strokeStyle = '#a56b32';
    ctx.lineWidth = severity === 'critical' ? 5 : 3;
    ctx.beginPath();
    ctx.moveTo(96, 418);
    ctx.lineTo(132, 438);
    ctx.lineTo(166, 420);
    ctx.moveTo(336, 426);
    ctx.lineTo(372, 444);
    ctx.lineTo(416, 422);
    ctx.stroke();
    ctx.restore();
  }

  function drawDirtCue(ctx, now, severity) {
    ctx.save();
    ctx.fillStyle = severity === 'critical' ? '#5b4634' : '#7b6245';
    for (let index = 0; index < (severity === 'critical' ? 7 : 4); index += 1) {
      const x = 122 + index * 44 + Math.sin(now / 300 + index) * 4;
      const y = 374 + (index % 2) * 24;
      ctx.fillRect(x, y, 12, 8);
      ctx.fillRect(x + 16, y + 8, 8, 6);
    }
    ctx.restore();
  }

  function drawTiredCue(ctx, now, severity) {
    drawBlink(ctx);
    const anchor = getStageEffectAnchor();
    ctx.save();
    ctx.globalAlpha = severity === 'critical' ? 0.9 : 0.65;
    ctx.fillStyle = '#2f4f35';
    ctx.font = 'bold 24px sans-serif';
    ctx.fillText('Z', anchor.tiredZ[0] + Math.sin(now / 400) * 6, anchor.tiredZ[1]);
    ctx.font = 'bold 15px sans-serif';
    ctx.fillText('z', anchor.tiredSmallZ[0] + Math.sin(now / 500) * 6, anchor.tiredSmallZ[1]);
    ctx.restore();
  }

  function drawSickCue(ctx, now, severity) {
    ctx.save();
    ctx.globalAlpha = severity === 'critical' ? 0.32 : 0.18;
    ctx.fillStyle = '#8ddf9e';
    ctx.fillRect(114, 82, 286, 260);
    ctx.globalAlpha = 0.85;
    ctx.strokeStyle = '#4d8c56';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(176 + Math.sin(now / 280) * 6, 174, 18, 0, Math.PI * 1.5);
    ctx.arc(348 + Math.cos(now / 320) * 6, 190, 14, 0, Math.PI * 1.5);
    ctx.stroke();
    ctx.restore();
  }

  function drawAttentionAlarm(ctx, pulse) {
    const anchor = getStageEffectAnchor();
    ctx.save();
    ctx.globalAlpha = 0.72 + pulse * 0.28;
    ctx.fillStyle = '#d8646f';
    ctx.fillRect(anchor.alarmX, anchor.alarmY, 24, 72);
    ctx.fillRect(anchor.alarmX, anchor.alarmY + 86, 24, 24);
    ctx.fillStyle = '#fffdf7';
    ctx.fillRect(anchor.alarmX + 7, anchor.alarmY + 8, 10, 56);
    ctx.fillRect(anchor.alarmX + 7, anchor.alarmY + 93, 10, 10);
    ctx.restore();
  }

  function drawThoughtBubble(ctx, now, label) {
    const anchor = getStageEffectAnchor();
    const y = anchor.bubbleY + Math.sin(now / 500) * 4;
    const x = anchor.bubbleX;
    ctx.save();
    ctx.fillStyle = 'rgba(255, 253, 247, 0.9)';
    ctx.fillRect(x, y + 16, 86, 44);
    ctx.fillRect(x + 18, y, 52, 24);
    ctx.fillRect(x - 22, y + 52, 18, 14);
    ctx.fillStyle = '#2f4f35';
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText(label, x + (label.length > 2 ? 18 : 32), y + 44);
    ctx.restore();
  }

  function drawSparkles(ctx, now, color) {
    const anchor = getStageEffectAnchor();
    ctx.save();
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.55 + Math.sin(now / 350) * 0.25;
    anchor.sparkles.forEach(function(point, index) {
      const size = 7 + (index % 2) * 3;
      ctx.fillRect(point[0], point[1], size, 4);
      ctx.fillRect(point[0] + Math.floor(size / 3), point[1] - Math.floor(size / 3), 4, size);
    });
    ctx.restore();
  }

  function drawFallbackMushroom(ctx, mode) {
    ctx.fillStyle = '#26662f';
    ctx.fillRect(78, 365, 356, 48);
    ctx.fillStyle = '#79b845';
    ctx.fillRect(96, 330, 320, 58);
    ctx.fillStyle = '#f8d39b';
    ctx.fillRect(196, 200, 120, 160);
    ctx.fillStyle = '#fff0c9';
    ctx.fillRect(116, 118, 280, 96);
    ctx.fillRect(140, 86, 232, 70);
    ctx.fillStyle = '#7b4f2f';
    ctx.fillRect(132, 202, 248, 34);

    if (mode === 'sleeping') {
      ctx.fillStyle = '#37261d';
      ctx.fillRect(220, 277, 32, 6);
      ctx.fillRect(284, 277, 32, 6);
      ctx.fillRect(256, 306, 26, 6);
      return;
    }

    ctx.fillStyle = '#2e211a';
    ctx.fillRect(216, 260, 24, 32);
    ctx.fillRect(296, 260, 24, 32);
    ctx.fillRect(246, 310, 42, 8);
  }

  function drawWakeSurpriseFace(ctx) {
    drawSkinPatch(ctx, 178, 238, 78, 88);
    drawSkinPatch(ctx, 270, 238, 78, 88);
    drawSkinPatch(ctx, 238, 294, 60, 44);

    drawBlockyEye(ctx, 188, 248);
    drawBlockyEye(ctx, 282, 248);

    ctx.fillStyle = '#2c1d17';
    ctx.fillRect(256, 302, 14, 14);
    ctx.fillRect(260, 298, 6, 22);
  }

  function drawSkinPatch(ctx, x, y, width, height) {
    ctx.fillStyle = 'rgba(248, 202, 149, 0.92)';
    ctx.fillRect(x + 10, y, width - 20, height);
    ctx.fillRect(x, y + 12, width, height - 24);
  }

  function drawBlockyEye(ctx, x, y) {
    ctx.fillStyle = '#fffaf0';
    ctx.fillRect(x + 12, y, 38, 64);
    ctx.fillRect(x, y + 12, 62, 40);
    ctx.fillStyle = '#2c1d17';
    ctx.fillRect(x + 28, y + 30, 10, 14);
  }

  function drawSleepAmbient(ctx, now) {
    const anchor = getStageEffectAnchor();
    const cycle = (now / 1000) % 2;
    ctx.fillStyle = 'rgba(255, 253, 247, 0.82)';
    ctx.fillRect(anchor.sleepCloudX, anchor.sleepCloudY + 16, 42, 28);
    ctx.fillRect(anchor.sleepCloudX + 22, anchor.sleepCloudY, 28, 18);
    ctx.fillStyle = '#2f4f35';
    ctx.font = 'bold 26px sans-serif';
    ctx.fillText('Z', anchor.sleepZ[0] + cycle * 10, anchor.sleepZ[1] - cycle * (anchor.sleepLargeRise || 12));
    ctx.font = 'bold 18px sans-serif';
    ctx.fillText('z', anchor.sleepSmallZ[0] + cycle * 8, anchor.sleepSmallZ[1] - cycle * (anchor.sleepSmallRise || 10));
  }

  function drawEffects(ctx, now) {
    const liveEffects = [];

    runtime.effects.forEach(function(effect) {
      const progress = (now - effect.createdAt) / effect.duration;
      if (progress >= 1) {
        return;
      }

      liveEffects.push(effect);
      drawEffect(ctx, effect, progress);
    });

    runtime.effects = liveEffects;
  }

  function drawEffect(ctx, effect, progress) {
    if (effect.type === 'water') {
      drawParticleSet(ctx, effect, progress, '#317fb5', 'drop');
    } else if (effect.type === 'clean') {
      drawParticleSet(ctx, effect, progress, '#fffdf7', 'spark');
    } else if (effect.type === 'hearts' || effect.type === 'play') {
      drawParticleSet(ctx, effect, progress, '#d8646f', 'heart');
    } else if (effect.type === 'music' || effect.type === 'instrument' || effect.type === 'sing') {
      drawParticleSet(ctx, effect, progress, '#674ea7', 'note');
    } else if (effect.type === 'spores') {
      drawParticleSet(ctx, effect, progress, '#f5e58b', 'spore');
    } else if (effect.type === 'wake') {
      drawWakeBurst(ctx, progress);
    } else if (effect.type === 'attention') {
      drawAttentionAlarm(ctx, 1 - progress);
    }
  }

  function drawParticleSet(ctx, effect, progress, color, shape) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - progress);
    ctx.fillStyle = color;
    ctx.strokeStyle = color;
    ctx.lineWidth = 4;

    effect.particles.forEach(function(particle, index) {
      const x = particle.x + particle.dx * progress + Math.sin(progress * 8 + particle.phase) * 8;
      const y = particle.y + particle.dy * progress;
      const size = particle.size;

      if (shape === 'drop') {
        ctx.fillRect(x, y, size * 0.55, size);
        ctx.fillRect(x - size * 0.18, y + size * 0.42, size * 0.9, size * 0.55);
      } else if (shape === 'spark') {
        ctx.fillRect(x, y, size, 4);
        ctx.fillRect(x + size * 0.35, y - size * 0.35, 4, size);
      } else if (shape === 'heart') {
        ctx.fillRect(x, y, size, size);
        ctx.fillRect(x - size * 0.6, y, size, size);
        ctx.fillRect(x - size * 0.3, y + size * 0.55, size, size);
      } else if (shape === 'note') {
        ctx.fillRect(x, y, 5, size * 1.6);
        ctx.fillRect(x + 5, y, size, 5);
        ctx.fillRect(x - 5, y + size * 1.35, size, size * 0.6);
      } else if (shape === 'spore') {
        ctx.fillRect(x, y, size, size);
      }

      if (index % 3 === 0) {
        ctx.globalAlpha = Math.max(0, 0.65 - progress);
      }
    });

    ctx.restore();
  }

  function drawWakeBurst(ctx, progress) {
    const anchor = getStageEffectAnchor();
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - progress);
    ctx.strokeStyle = '#fffdf7';
    ctx.lineWidth = 8;

    for (let index = 0; index < 8; index += 1) {
      const angle = (Math.PI * 2 * index) / 8;
      const inner = anchor.wakeInner + progress * 18;
      const outer = anchor.wakeOuter + progress * 34;
      const centerX = anchor.wakeCenterX;
      const centerY = anchor.wakeCenterY;

      ctx.beginPath();
      ctx.moveTo(centerX + Math.cos(angle) * inner, centerY + Math.sin(angle) * inner);
      ctx.lineTo(centerX + Math.cos(angle) * outer, centerY + Math.sin(angle) * outer);
      ctx.stroke();
    }

    ctx.restore();
  }
})();
</script>
