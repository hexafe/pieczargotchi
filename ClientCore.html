<script>
(function(global) {
  'use strict';

  const defaultWeatherBalance = {
    maxElapsedHours: 2,
    rainHydrationPerHour: 8,
    stormHydrationPerHour: 5,
    snowHydrationPerHour: 1.5,
    highHumidityHydrationPerHour: 1.2,
    windDryingPerHour: -3,
    heatDryingPerHour: -2,
    stormHappinessPerHour: -2,
    stormCleanlinessPerHour: -1.5
  };

  function calculateWeatherStatDeltas(scene, elapsedHours, config) {
    const balance = Object.assign({}, defaultWeatherBalance, config || {});
    const hours = clampNumber(Number(elapsedHours), 0, balance.maxElapsedHours, 0);
    if (!hours || !scene) {
      return {};
    }

    const rainAmount = Math.max(0, Number(scene.rain) || 0, Number(scene.showers) || 0);
    const precipitation = Math.max(0, Number(scene.precipitation) || 0, rainAmount, Number(scene.snowfall) || 0);
    const rainIntensity = clampNumber(Number(scene.rainIntensity), 0, 1, clampNumber(rainAmount / 7, 0, 1, 0));
    const snowIntensity = clampNumber(Number(scene.snowIntensity), 0, 1, clampNumber(Number(scene.snowfall) / 4, 0, 1, 0));
    const stormIntensity = clampNumber(Number(scene.stormIntensity), 0, 1, scene.condition === 'storm' ? 0.45 : 0);
    const windLevel = clampNumber(Number(scene.windLevel), 0, 1, clampNumber(Number(scene.windSpeed) / 82, 0, 1, 0));
    const humidity = clampNumber(Number(scene.humidity), 0, 100, 60);
    const temperature = Number(scene.apparentTemperature ?? scene.temperature);
    const heatLevel = Number.isFinite(temperature) ? clampNumber((temperature - 24) / 12, 0, 1, 0) : 0;

    const deltas = {};
    const rainHydration = rainIntensity * balance.rainHydrationPerHour;
    const stormHydration = stormIntensity * balance.stormHydrationPerHour;
    const snowHydration = snowIntensity * balance.snowHydrationPerHour;
    const humidityHydration = clampNumber((humidity - 78) / 22, 0, 1, 0) * balance.highHumidityHydrationPerHour;
    const windDrying = windLevel * balance.windDryingPerHour;
    const heatDrying = heatLevel * balance.heatDryingPerHour;
    const precipitationBoost = precipitation > 0 && scene.condition === 'rain'
      ? Math.min(1.5, precipitation * 0.12)
      : 0;

    deltas.hydration = roundStatDelta((
      rainHydration
      + stormHydration
      + snowHydration
      + humidityHydration
      + windDrying
      + heatDrying
      + precipitationBoost
    ) * hours);

    if (stormIntensity > 0) {
      deltas.happiness = roundStatDelta(stormIntensity * balance.stormHappinessPerHour * hours);
      deltas.cleanliness = roundStatDelta(stormIntensity * balance.stormCleanlinessPerHour * hours);
    }

    return removeZeroDeltas(deltas);
  }

  function classifyWeatherCondition(code, precipitation, cloudCover, snowfall) {
    const numericCode = Number(code);
    const precipitationAmount = Math.max(0, Number(precipitation) || 0);
    const snowAmount = Math.max(0, Number(snowfall) || 0);
    const cloudAmount = clampNumber(Number(cloudCover), 0, 100, 0);

    if ([95, 96, 99].includes(numericCode)) {
      return 'storm';
    }

    if ((numericCode >= 71 && numericCode <= 77) || numericCode === 85 || numericCode === 86 || snowAmount > 0.05) {
      return 'snow';
    }

    if ((numericCode >= 51 && numericCode <= 67) || (numericCode >= 80 && numericCode <= 82) || precipitationAmount > 0.05) {
      return 'rain';
    }

    if (numericCode === 45 || numericCode === 48) {
      return 'fog';
    }

    if ((numericCode >= 1 && numericCode <= 3) || cloudAmount > 62) {
      return 'cloudy';
    }

    return 'clear';
  }

  function calculateAmbientLife(scene, dateInput) {
    const source = isPlainObject(scene) ? scene : {};
    const date = normalizeDate(dateInput);
    const ecologicalMonth = getEcologicalMonth(date, source.latitude);
    const condition = source.condition || 'clear';
    const seasonFactor = getInsectSeasonFactor(ecologicalMonth, date.getDate());
    const weatherFactor = getInsectWeatherFactor(condition, source);
    const temperatureFactor = getInsectTemperatureFactor(source);
    const windFactor = getInsectWindFactor(source);
    const dayFactor = getInsectDayFactor(source.dayPhase, date);
    const fireflySeasonFactor = getFireflySeasonFactor(ecologicalMonth, date.getDate());
    const fireflyTimeFactor = getFireflyTimeFactor(source.dayPhase, date);
    const fireflyWeatherFactor = getFireflyWeatherFactor(condition, source);
    const fireflyTemperatureFactor = getFireflyTemperatureFactor(source);
    const fireflyHumidityFactor = getFireflyHumidityFactor(source);
    const baseIntensity = clampNumber(
      seasonFactor * weatherFactor * temperatureFactor * windFactor,
      0,
      1,
      0
    );

    return {
      seasonFactor: roundAmbientLife(seasonFactor),
      weatherFactor: roundAmbientLife(weatherFactor),
      dayFactor: roundAmbientLife(dayFactor),
      generalIntensity: roundAmbientLife(baseIntensity * dayFactor),
      butterflyIntensity: roundAmbientLife(baseIntensity * getButterflyDayFactor(source.dayPhase, date)),
      flyingInsectIntensity: roundAmbientLife(baseIntensity * Math.max(dayFactor * 0.72, fireflyTimeFactor * 0.38)),
      crawlerIntensity: roundAmbientLife(baseIntensity * Math.max(0.28, dayFactor * 0.82)),
      fireflyIntensity: roundAmbientLife(
        fireflySeasonFactor
          * fireflyTimeFactor
          * fireflyWeatherFactor
          * fireflyTemperatureFactor
          * fireflyHumidityFactor
          * windFactor
      )
    };
  }

  function normalizeDate(value) {
    const date = value instanceof Date ? value : new Date(value);
    if (Number.isNaN(date.getTime())) {
      return new Date();
    }

    return date;
  }

  function getEcologicalMonth(date, latitude) {
    const month = date.getMonth();
    const numericLatitude = Number(latitude);
    if (Number.isFinite(numericLatitude) && numericLatitude < -5) {
      return (month + 6) % 12;
    }

    return month;
  }

  function getInsectSeasonFactor(month, day) {
    const factors = [0.02, 0.03, 0.16, 0.42, 0.78, 1, 0.96, 0.86, 0.48, 0.18, 0.06, 0.03];
    let factor = factors[month] || 0;
    if (month === 2 && day < 15) {
      factor *= 0.55;
    } else if (month === 4 && day > 20) {
      factor = Math.max(factor, 0.88);
    } else if (month === 8 && day > 20) {
      factor *= 0.72;
    }

    return clampNumber(factor, 0, 1, 0);
  }

  function getFireflySeasonFactor(month, day) {
    if (month === 4) {
      return day >= 20 ? 0.34 : 0;
    }
    if (month === 5) {
      return 1;
    }
    if (month === 6) {
      return 0.96;
    }
    if (month === 7) {
      return day <= 20 ? 0.56 : 0.28;
    }
    if (month === 8) {
      return day <= 10 ? 0.12 : 0;
    }

    return 0;
  }

  function getInsectWeatherFactor(condition, scene) {
    const precipitation = Math.max(0, Number(scene.precipitation) || 0, Number(scene.rain) || 0, Number(scene.snowfall) || 0);
    const precipitationPenalty = clampNumber(1 - precipitation / 3.2, 0, 1, 1);
    if (condition === 'snow') {
      return 0;
    }
    if (condition === 'storm') {
      return 0.03 * precipitationPenalty;
    }
    if (condition === 'rain') {
      return 0.14 * precipitationPenalty;
    }
    if (condition === 'fog') {
      return 0.28;
    }
    if (condition === 'cloudy') {
      return 0.74;
    }

    return 1;
  }

  function getFireflyWeatherFactor(condition, scene) {
    const precipitation = Math.max(0, Number(scene.precipitation) || 0, Number(scene.rain) || 0, Number(scene.snowfall) || 0);
    if (precipitation > 0.04 || condition === 'rain' || condition === 'storm' || condition === 'snow') {
      return 0;
    }
    if (condition === 'fog') {
      return 0.42;
    }
    if (condition === 'cloudy') {
      return 0.84;
    }

    return 1;
  }

  function getInsectTemperatureFactor(scene) {
    const temperature = readAmbientTemperature(scene);
    if (temperature === null) {
      return 0.84;
    }
    if (temperature <= 4) {
      return 0.02;
    }
    if (temperature < 10) {
      return 0.08 + (temperature - 4) / 6 * 0.28;
    }
    if (temperature < 17) {
      return 0.36 + (temperature - 10) / 7 * 0.45;
    }
    if (temperature <= 29) {
      return 1;
    }
    if (temperature <= 35) {
      return 1 - (temperature - 29) / 6 * 0.34;
    }

    return 0.48;
  }

  function getFireflyTemperatureFactor(scene) {
    const temperature = readAmbientTemperature(scene);
    if (temperature === null) {
      return 0.86;
    }
    if (temperature < 12) {
      return 0;
    }
    if (temperature < 17) {
      return (temperature - 12) / 5;
    }
    if (temperature <= 29) {
      return 1;
    }
    if (temperature <= 34) {
      return 1 - (temperature - 29) / 5 * 0.34;
    }

    return 0.46;
  }

  function getInsectWindFactor(scene) {
    const windLevel = clampNumber(Number(scene.windLevel), 0, 1, clampNumber(Number(scene.windSpeed) / 82, 0, 1, 0));
    const gustLevel = clampNumber(Number(scene.gustLevel), 0, 1, 0);
    return clampNumber(1 - windLevel * 0.58 - gustLevel * 0.18, 0.12, 1, 1);
  }

  function readAmbientTemperature(scene) {
    const apparent = scene ? scene.apparentTemperature : null;
    if (apparent !== null && apparent !== '' && typeof apparent !== 'undefined') {
      const apparentNumber = Number(apparent);
      if (Number.isFinite(apparentNumber)) {
        return apparentNumber;
      }
    }

    const temperature = scene ? scene.temperature : null;
    if (temperature !== null && temperature !== '' && typeof temperature !== 'undefined') {
      const temperatureNumber = Number(temperature);
      if (Number.isFinite(temperatureNumber)) {
        return temperatureNumber;
      }
    }

    return null;
  }

  function getFireflyHumidityFactor(scene) {
    const humidity = clampNumber(Number(scene.humidity), 0, 100, 68);
    return clampNumber(0.44 + humidity / 100 * 0.62, 0.44, 1, 0.86);
  }

  function getInsectDayFactor(dayPhase, date) {
    const phaseFactors = {
      sunrise: 0.34,
      morning: 0.84,
      noon: 1,
      afternoon: 0.92,
      evening: 0.58,
      sunset: 0.32,
      night: 0.06
    };

    if (dayPhase && Object.prototype.hasOwnProperty.call(phaseFactors, dayPhase)) {
      return phaseFactors[dayPhase];
    }

    const hour = date.getHours() + date.getMinutes() / 60;
    if (hour >= 10 && hour < 17) {
      return 1;
    }
    if (hour >= 7 && hour < 10) {
      return 0.78;
    }
    if (hour >= 17 && hour < 20.5) {
      return 0.48;
    }
    if (hour >= 5 && hour < 7) {
      return 0.32;
    }

    return 0.06;
  }

  function getButterflyDayFactor(dayPhase, date) {
    const phaseFactors = {
      sunrise: 0.1,
      morning: 0.78,
      noon: 1,
      afternoon: 0.86,
      evening: 0.22,
      sunset: 0.06,
      night: 0
    };

    if (dayPhase && Object.prototype.hasOwnProperty.call(phaseFactors, dayPhase)) {
      return phaseFactors[dayPhase];
    }

    const hour = date.getHours() + date.getMinutes() / 60;
    if (hour >= 10 && hour < 17) {
      return 1;
    }
    if (hour >= 8 && hour < 10) {
      return 0.62;
    }
    if (hour >= 17 && hour < 19) {
      return 0.3;
    }

    return 0;
  }

  function getFireflyTimeFactor(dayPhase, date) {
    const hour = date.getHours() + date.getMinutes() / 60;
    if (dayPhase === 'sunset') {
      return 0.92;
    }
    if (dayPhase === 'evening') {
      return hour >= 18.3 ? 0.62 : 0.28;
    }
    if (dayPhase === 'night') {
      if (hour >= 20.5 && hour < 24) {
        return 1;
      }
      if (hour >= 0 && hour < 1.5) {
        return 0.58;
      }
      return 0.12;
    }

    if (hour >= 20.5 && hour < 24) {
      return 1;
    }
    if (hour >= 19 && hour < 20.5) {
      return 0.72;
    }
    if (hour >= 18 && hour < 19) {
      return 0.34;
    }

    return 0;
  }

  function roundAmbientLife(value) {
    return Math.round(clampNumber(value, 0, 1, 0) * 1000) / 1000;
  }

  function createDefaultBattleState() {
    return {
      version: 1,
      mode: 'idle',
      unlockedAt: null,
      training: {
        strength: 0,
        defense: 0,
        speed: 0,
        focus: 0
      },
      activeBattle: null,
      rewards: {
        wins: 0,
        losses: 0,
        trophies: 0
      },
      log: []
    };
  }

  function migrateStateVersion(rawState, targetVersion) {
    const state = isPlainObject(rawState) ? deepClone(rawState) : {};
    const version = Math.max(1, Math.floor(Number(state.version) || 1));
    const nextVersion = Math.max(version, Number(targetVersion) || version);

    if (version < 3 || !isPlainObject(state.battle)) {
      state.battle = normalizeBattleState(state.battle);
    }

    state.version = nextVersion;
    return state;
  }

  function normalizeBattleState(rawBattle) {
    const base = createDefaultBattleState();
    const battle = isPlainObject(rawBattle) ? rawBattle : {};
    const training = isPlainObject(battle.training) ? battle.training : {};
    const rewards = isPlainObject(battle.rewards) ? battle.rewards : {};
    const validModes = ['idle', 'training', 'matchSetup', 'choosingMove', 'resolvingTurn', 'animatingEvents', 'victory', 'defeat', 'rewards'];

    return {
      version: 1,
      mode: validModes.includes(battle.mode) ? battle.mode : base.mode,
      unlockedAt: battle.unlockedAt || null,
      training: {
        strength: clampInteger(training.strength, 0, 99, 0),
        defense: clampInteger(training.defense, 0, 99, 0),
        speed: clampInteger(training.speed, 0, 99, 0),
        focus: clampInteger(training.focus, 0, 99, 0)
      },
      activeBattle: isPlainObject(battle.activeBattle) ? deepClone(battle.activeBattle) : null,
      rewards: {
        wins: clampInteger(rewards.wins, 0, 9999, 0),
        losses: clampInteger(rewards.losses, 0, 9999, 0),
        trophies: clampInteger(rewards.trophies, 0, 9999, 0)
      },
      log: Array.isArray(battle.log) ? battle.log.slice(0, 8) : []
    };
  }

  function isArenaUnlocked(state, rules) {
    if (!isPlainObject(state)) {
      return false;
    }

    const battleRules = rules && rules.battle ? rules.battle : {};
    const unlockStage = battleRules.unlockStage || 'legendary';
    const currentStage = state.stage || '';
    if (currentStage === unlockStage) {
      return true;
    }

    const thresholds = Array.isArray(rules && rules.stageThresholds) ? rules.stageThresholds : [];
    const stageOrder = thresholds.map(function(stage) {
      return stage.id;
    });
    const currentIndex = stageOrder.indexOf(currentStage);
    const unlockIndex = stageOrder.indexOf(unlockStage);
    return currentIndex >= 0 && unlockIndex >= 0 && currentIndex >= unlockIndex;
  }

  function getActionAvailability(state, action, now, rules) {
    const currentState = isPlainObject(state) ? state : {};
    const currentAction = isPlainObject(action) ? action : {};
    const timestamp = Number(now) || 0;
    const cooldowns = isPlainObject(currentState.cooldowns) ? currentState.cooldowns : {};
    const cooldownUntil = Number(cooldowns[currentAction.id]) || 0;
    const remainingMs = cooldownUntil - timestamp;

    if (remainingMs > 0) {
      return {
        ok: false,
        reason: 'Gotowe za ' + Math.ceil(remainingMs / 1000) + ' s.'
      };
    }

    if (currentAction.awakeOnly && currentState.mode !== 'awake') {
      return {
        ok: false,
        reason: 'Najpierw obudź Pieczarkę.'
      };
    }

    if (currentAction.requiresStage && !isStageAtLeastCore(currentState.stage, currentAction.requiresStage, rules)) {
      return {
        ok: false,
        reason: 'Potrzebny etap dorosłej pieczarki.'
      };
    }

    const stats = isPlainObject(currentState.stats) ? currentState.stats : {};
    if ((Number(stats.energy) || 0) <= 0 && currentAction.id !== 'sleepWake') {
      return {
        ok: false,
        reason: 'Brakuje energii.'
      };
    }

    return { ok: true, reason: '' };
  }

  function isStageAtLeastCore(currentStage, requiredStage, rules) {
    if (!requiredStage || currentStage === requiredStage) {
      return true;
    }

    const thresholds = Array.isArray(rules && rules.stageThresholds) ? rules.stageThresholds : [];
    const order = thresholds.map(function(stage) {
      return stage.id;
    });
    const currentIndex = order.indexOf(currentStage);
    const requiredIndex = order.indexOf(requiredStage);
    return currentIndex >= 0 && requiredIndex >= 0 && currentIndex >= requiredIndex;
  }

  function evaluateAttentionState(rawState, rules, now) {
    const state = isPlainObject(rawState) ? deepClone(rawState) : {};
    const timestamp = Number(now) || 0;
    state.attention = normalizeAttentionCore(state.attention);
    state.careMistakes = normalizeCareMistakesCore(state.careMistakes);
    state.patch = normalizePatchCore(state.patch);
    state.stats = isPlainObject(state.stats) ? Object.assign({}, state.stats) : {};

    const strongestNeed = getStrongestNeedCore(state, rules);
    const events = [];
    if (!strongestNeed) {
      if (state.attention.activeNeed) {
        events.push({ type: 'resolved', need: state.attention.activeNeed });
      }
      state.attention = normalizeAttentionCore({});
      return { state: state, events: events };
    }

    const attentionRules = rules && rules.attention ? rules.attention : {};
    const activeNeed = state.attention.activeNeed;
    const deadline = Date.parse(state.attention.deadlineAt || '');
    const lastMistake = Date.parse(state.attention.lastMistakeAt || '');
    const repeatedCooldown = attentionRules.repeatedMistakeCooldownMs || 900000;

    if (activeNeed !== strongestNeed.id) {
      state.attention = {
        activeNeed: strongestNeed.id,
        severity: strongestNeed.severity,
        startedAt: new Date(timestamp).toISOString(),
        deadlineAt: new Date(timestamp + strongestNeed.deadlineMs).toISOString(),
        lastMistakeAt: state.attention.lastMistakeAt || null
      };
      events.push({ type: 'start', need: strongestNeed.id, severity: strongestNeed.severity });
      return { state: state, events: events };
    }

    state.attention.severity = strongestNeed.severity;
    if (Number.isFinite(deadline) && timestamp >= deadline) {
      const canRecordMistake = !Number.isFinite(lastMistake) || timestamp - lastMistake >= repeatedCooldown;
      if (canRecordMistake) {
        recordCareMistakeCore(state, strongestNeed, timestamp);
        events.push({ type: 'mistake', need: strongestNeed.id, severity: strongestNeed.severity });
      }
      state.attention.deadlineAt = new Date(timestamp + strongestNeed.deadlineMs).toISOString();
    }

    return { state: state, events: events };
  }

  function resolveAttentionAction(rawState, actionId, rules, now) {
    const state = isPlainObject(rawState) ? deepClone(rawState) : {};
    const activeNeed = state.attention && state.attention.activeNeed;
    const definitions = rules && rules.needDefinitions ? rules.needDefinitions : {};
    const definition = activeNeed ? definitions[activeNeed] : null;
    const handledNeed = definition && definition.actionId === actionId;

    state.patch = normalizePatchCore(state.patch);
    if (!handledNeed) {
      return { state: state, handled: false };
    }

    state.patch.careStreak += 1;
    state.patch.quality = clampNumber(Number(state.patch.quality) + 4, 0, 100, 72);
    state.patch.mycelium = clampNumber(Number(state.patch.mycelium) + 2.5, 0, 100, 0);
    state.attention = normalizeAttentionCore({});
    return {
      state: state,
      handled: true,
      event: { type: 'goodReaction', need: activeNeed, at: new Date(Number(now) || 0).toISOString() }
    };
  }

  function getAnimationIntent(state, rules, now) {
    if (!isPlainObject(state)) {
      return { type: 'none', state: null };
    }

    const timestamp = Number(now) || 0;
    const activity = getActiveActivityCore(state, timestamp);
    if (activity) {
      return {
        type: activity.type === 'wake' ? 'wake' : 'activity',
        state: activity.type === 'wake' ? 'wake' : activity.type
      };
    }

    if (state.mode === 'sleeping') {
      return { type: 'state', state: 'sleep' };
    }

    const need = getStrongestNeedCore(state, rules);
    if (need) {
      return {
        type: 'need',
        state: need.severity === 'critical' ? 'critical' : getNeedAnimationStateCore(need.id),
        need: need.id,
        severity: need.severity
      };
    }

    const stats = isPlainObject(state.stats) ? state.stats : {};
    const patch = isPlainObject(state.patch) ? state.patch : {};
    if (Number(stats.happiness) > 82 && Number(stats.health) > 78 && Number(patch.quality) > 82) {
      return { type: 'state', state: 'excellent' };
    }

    if (Number(stats.happiness) > 78 && Number(stats.health) > 72 && Number(patch.quality) > 70) {
      return { type: 'state', state: 'happy' };
    }

    return { type: 'state', state: 'idle' };
  }

  function deriveBattleStats(state, battleRules) {
    const stats = isPlainObject(state && state.stats) ? state.stats : {};
    const battle = normalizeBattleState(state && state.battle);
    const trainingCaps = battleRules && battleRules.trainingCaps ? battleRules.trainingCaps : {};
    const training = {
      strength: Math.min(battle.training.strength, Number(trainingCaps.strength) || battle.training.strength),
      defense: Math.min(battle.training.defense, Number(trainingCaps.defense) || battle.training.defense),
      speed: Math.min(battle.training.speed, Number(trainingCaps.speed) || battle.training.speed),
      focus: Math.min(battle.training.focus, Number(trainingCaps.focus) || battle.training.focus)
    };
    const health = clampNumber(Number(stats.health), 0, 100, 80);
    const energy = clampNumber(Number(stats.energy), 0, 100, 70);
    const happiness = clampNumber(Number(stats.happiness), 0, 100, 60);
    const hydration = clampNumber(Number(stats.hydration), 0, 100, 70);
    const nutrients = clampNumber(Number(stats.nutrients), 0, 100, 70);
    const cleanliness = clampNumber(Number(stats.cleanliness), 0, 100, 70);

    return {
      hp: Math.round(52 + health * 0.42 + hydration * 0.10 + training.defense * 1.4),
      stamina: Math.round(42 + energy * 0.42 + happiness * 0.10 + training.focus * 1.1),
      strength: Math.round(7 + nutrients * 0.10 + training.strength * 1.3),
      attack: Math.round(8 + nutrients * 0.10 + happiness * 0.04 + training.strength * 1.25),
      defense: Math.round(7 + cleanliness * 0.09 + health * 0.05 + training.defense * 1.2),
      speed: Math.round(7 + energy * 0.10 + hydration * 0.04 + training.speed * 1.25),
      focus: Math.round(7 + happiness * 0.09 + health * 0.04 + training.focus * 1.25)
    };
  }

  function trainBattleStat(rawState, statId, rules, now) {
    const state = isPlainObject(rawState) ? deepClone(rawState) : {};
    const battleRules = rules && rules.battle ? rules.battle : {};
    const caps = battleRules.trainingCaps || {};
    const validStats = ['strength', 'defense', 'speed', 'focus'];
    const cost = Math.max(1, clampInteger(battleRules.trainingCost, 1, 999, 1));

    state.inventory = Object.assign({ spores: 0 }, state.inventory || {});
    state.battle = normalizeBattleState(state.battle);

    if (!isArenaUnlocked(state, rules)) {
      return { ok: false, reason: 'Arena jest zablokowana.', state: state };
    }
    if (!validStats.includes(statId)) {
      return { ok: false, reason: 'Nieznany trening.', state: state };
    }

    const cap = Math.max(0, clampInteger(caps[statId], 0, 999, 20));
    if (state.battle.training[statId] >= cap) {
      return { ok: false, reason: 'Ten trening ma już limit.', state: state };
    }

    const availableSpores = Math.max(Number(state.inventory.spores) || 0, Number(state.coins) || 0);
    if (availableSpores < cost) {
      return { ok: false, reason: 'Brakuje zarodników.', state: state };
    }

    const remaining = availableSpores - cost;
    state.inventory.spores = remaining;
    state.coins = remaining;
    state.battle.training[statId] += 1;
    state.battle.mode = 'training';
    addBattleLog(state.battle, 'Trening: ' + statId + ' +' + 1 + '.', now, rules);
    return { ok: true, state: state };
  }

  function startBattle(rawState, rules, now, seedInput) {
    const state = isPlainObject(rawState) ? deepClone(rawState) : {};
    const battleRules = rules && rules.battle ? rules.battle : {};
    const timestamp = Number(now) || Date.now();
    const seed = clampInteger(seedInput || buildBattleSeed(state, timestamp), 1, 2147483646, 1);

    state.battle = normalizeBattleState(state.battle);
    if (!isArenaUnlocked(state, rules)) {
      return { ok: false, reason: 'Arena jest zablokowana.', state: state };
    }

    const playerStats = deriveBattleStats(state, battleRules);
    const opponentStats = createBattleOpponent(state, battleRules, seed);
    const activeBattle = {
      id: 'battle_' + seed + '_' + timestamp,
      seed: seed,
      rngSeed: seed,
      mode: 'choosingMove',
      turn: 0,
      startedAt: new Date(timestamp).toISOString(),
      careSnapshot: deepClone(state.stats || {}),
      trainingSnapshot: deepClone(state.battle.training || {}),
      player: Object.assign({ name: state.mushroomName || 'Pieczarka' }, playerStats, {
        hp: playerStats.hp,
        maxHp: playerStats.hp,
        stamina: playerStats.stamina,
        maxStamina: playerStats.stamina,
        guard: 0
      }),
      opponent: Object.assign({ name: opponentStats.name || 'Rywal' }, opponentStats, {
        hp: opponentStats.hp,
        maxHp: opponentStats.hp,
        stamina: opponentStats.stamina,
        maxStamina: opponentStats.stamina,
        guard: 0
      }),
      selectedMoves: null,
      events: [],
      rewarded: false
    };

    state.battle.mode = 'choosingMove';
    state.battle.activeBattle = activeBattle;
    addBattleLog(state.battle, 'Walka rozpoczęta.', timestamp, rules);
    return { ok: true, state: state, battle: activeBattle };
  }

  function resolveBattleRound(activeBattle, playerMoveId, moveCatalog) {
    const opponentSelection = chooseOpponentMove(activeBattle, moveCatalog);
    const battleWithSelectionSeed = Object.assign({}, activeBattle, {
      rngSeed: opponentSelection.rngSeed
    });
    const resolved = resolveBattleTurn(
      battleWithSelectionSeed,
      playerMoveId,
      opponentSelection.moveId,
      moveCatalog
    );
    return Object.assign({}, resolved, {
      selectedMoves: {
        player: playerMoveId,
        opponent: opponentSelection.moveId
      }
    });
  }

  function chooseOpponentMove(activeBattle, moveCatalog) {
    const catalog = indexMoves(moveCatalog);
    const moves = Object.keys(catalog).map(function(key) {
      return catalog[key];
    });
    const opponent = normalizeCombatant(activeBattle && activeBattle.opponent);
    const viable = moves.filter(function(move) {
      return opponent.stamina >= clampInteger(move.staminaCost, 0, 999, 0);
    });
    const roll = nextRandom(activeBattle && activeBattle.rngSeed);
    const candidates = viable.length ? viable : moves;
    const selected = candidates[Math.floor(roll.value * candidates.length)] || firstMove(catalog);
    return {
      moveId: selected.id,
      rngSeed: roll.seed
    };
  }

  function applyBattleOutcomeRewards(rawState, rules, now) {
    const state = isPlainObject(rawState) ? deepClone(rawState) : {};
    const battleRules = rules && rules.battle ? rules.battle : {};
    const victoryRewards = battleRules.victoryRewards || { spores: 2, wins: 1, trophies: 1 };
    const defeatRewards = battleRules.defeatRewards || { losses: 1 };
    const battle = normalizeBattleState(state.battle);
    const activeBattle = isPlainObject(battle.activeBattle) ? deepClone(battle.activeBattle) : null;

    state.inventory = Object.assign({ spores: 0 }, state.inventory || {});
    state.battle = battle;
    if (!activeBattle || activeBattle.rewarded || !['victory', 'defeat'].includes(activeBattle.mode)) {
      return { ok: false, state: state };
    }

    if (activeBattle.mode === 'victory') {
      const spores = Math.max(0, clampInteger(victoryRewards.spores, 0, 999, 2));
      state.battle.rewards.wins += Math.max(0, clampInteger(victoryRewards.wins, 0, 99, 1));
      state.battle.rewards.trophies += Math.max(0, clampInteger(victoryRewards.trophies, 0, 99, 1));
      state.inventory.spores = (Number(state.inventory.spores) || 0) + spores;
      state.coins = (Number(state.coins) || 0) + spores;
      addBattleLog(state.battle, 'Wygrana: +' + spores + ' zarodniki i trofeum.', now, rules);
    } else {
      state.battle.rewards.losses += Math.max(0, clampInteger(defeatRewards.losses, 0, 99, 1));
      addBattleLog(state.battle, 'Porażka zapisana bez kary dla opieki.', now, rules);
    }

    activeBattle.rewarded = true;
    state.battle.mode = activeBattle.mode;
    state.battle.activeBattle = activeBattle;
    return { ok: true, state: state };
  }

  function resolveBattleTurn(activeBattle, playerMoveId, opponentMoveId, moveCatalog) {
    const battle = isPlainObject(activeBattle) ? deepClone(activeBattle) : {};
    const catalog = indexMoves(moveCatalog);
    const playerMove = catalog[playerMoveId] || catalog.sporeJab || firstMove(catalog);
    const opponentMove = catalog[opponentMoveId] || catalog.sporeJab || firstMove(catalog);
    const player = normalizeCombatant(battle.player);
    const opponent = normalizeCombatant(battle.opponent);
    let seed = clampInteger(battle.rngSeed, 1, 2147483646, 1);
    const events = [];

    const order = player.speed >= opponent.speed
      ? [
          { actor: 'player', source: player, target: opponent, move: playerMove },
          { actor: 'opponent', source: opponent, target: player, move: opponentMove }
        ]
      : [
          { actor: 'opponent', source: opponent, target: player, move: opponentMove },
          { actor: 'player', source: player, target: opponent, move: playerMove }
        ];

    order.forEach(function(turn) {
      if (player.hp <= 0 || opponent.hp <= 0) {
        return;
      }

      const outcome = applyBattleMove(turn.source, turn.target, turn.move, seed);
      seed = outcome.rngSeed;
      events.push(Object.assign({ actor: turn.actor, moveId: turn.move.id }, outcome.event));
    });

    const mode = opponent.hp <= 0 ? 'victory' : player.hp <= 0 ? 'defeat' : 'choosingMove';
    return Object.assign({}, battle, {
      mode: mode,
      rngSeed: seed,
      player: player,
      opponent: opponent,
      turn: clampInteger(battle.turn, 0, 9999, 0) + 1,
      events: events
    });
  }

  function indexMoves(moveCatalog) {
    const fallback = [
      { id: 'sporeJab', staminaCost: 8, power: 14, accuracy: 0.94, stat: 'strength' },
      { id: 'capGuard', staminaCost: 6, power: 4, accuracy: 1, stat: 'defense', guard: 0.35 }
    ];
    return (Array.isArray(moveCatalog) && moveCatalog.length ? moveCatalog : fallback).reduce(function(result, move) {
      result[move.id] = move;
      return result;
    }, {});
  }

  function firstMove(catalog) {
    const firstKey = Object.keys(catalog)[0];
    return catalog[firstKey];
  }

  function normalizeCombatant(rawCombatant) {
    const combatant = isPlainObject(rawCombatant) ? rawCombatant : {};
    const hp = clampInteger(combatant.hp, 0, 999, 80);
    const stamina = clampInteger(combatant.stamina, 0, 999, 50);
    return {
      name: combatant.name || '',
      hp: hp,
      maxHp: clampInteger(combatant.maxHp, Math.max(1, hp), 999, Math.max(1, hp)),
      stamina: stamina,
      maxStamina: clampInteger(combatant.maxStamina, Math.max(1, stamina), 999, Math.max(1, stamina)),
      strength: clampInteger(combatant.strength, 0, 999, 10),
      attack: clampInteger(combatant.attack, 0, 999, 12),
      defense: clampInteger(combatant.defense, 0, 999, 10),
      speed: clampInteger(combatant.speed, 0, 999, 10),
      focus: clampInteger(combatant.focus, 0, 999, 10),
      guard: clampNumber(Number(combatant.guard), 0, 0.9, 0)
    };
  }

  function applyBattleMove(source, target, move, seed) {
    const cost = clampInteger(move.staminaCost, 0, 999, 0);
    if (source.stamina < cost) {
      source.stamina = Math.min(999, source.stamina + 6);
      return {
        rngSeed: seed,
        event: { type: 'rest', damage: 0 }
      };
    }

    source.stamina = Math.max(0, source.stamina - cost);
    const roll = nextRandom(seed);
    const accuracy = clampNumber(Number(move.accuracy), 0, 1, 1);
    if (roll.value > accuracy) {
      return {
        rngSeed: roll.seed,
        event: { type: 'miss', damage: 0 }
      };
    }

    const statBonus = move.stat && source[move.stat] ? source[move.stat] * 0.28 : 0;
    const guardReduction = clampNumber(Number(target.guard), 0, 0.9, 0);
    const rawDamage = (Number(move.power) || 0) + source.attack * 0.58 + statBonus - target.defense * (0.34 + guardReduction);
    const damage = Math.max(1, Math.round(rawDamage));
    target.hp = Math.max(0, target.hp - damage);
    source.guard = clampNumber(Number(move.guard), 0, 0.9, 0);
    return {
      rngSeed: roll.seed,
      event: { type: 'hit', damage: damage }
    };
  }

  function normalizeAttentionCore(attention) {
    const source = isPlainObject(attention) ? attention : {};
    return {
      activeNeed: source.activeNeed || null,
      severity: source.severity || null,
      startedAt: source.startedAt || null,
      deadlineAt: source.deadlineAt || null,
      lastMistakeAt: source.lastMistakeAt || null
    };
  }

  function normalizeCareMistakesCore(careMistakes) {
    const source = isPlainObject(careMistakes) ? careMistakes : {};
    return {
      physical: Math.max(0, Math.floor(Number(source.physical) || 0)),
      mental: Math.max(0, Math.floor(Number(source.mental) || 0)),
      environment: Math.max(0, Math.floor(Number(source.environment) || 0)),
      rest: Math.max(0, Math.floor(Number(source.rest) || 0))
    };
  }

  function normalizePatchCore(patch) {
    const source = isPlainObject(patch) ? patch : {};
    return {
      quality: clampNumber(Number(source.quality), 0, 100, 72),
      mycelium: clampNumber(Number(source.mycelium), 0, 100, 0),
      harvests: Math.max(0, Math.floor(Number(source.harvests) || 0)),
      careStreak: Math.max(0, Math.floor(Number(source.careStreak) || 0))
    };
  }

  function getActiveActivityCore(state, now) {
    const activity = state.currentActivity;
    if (!activity || Number(activity.until) <= now || activity.type === 'notice') {
      return null;
    }

    return activity;
  }

  function getStrongestNeedCore(state, rules) {
    const definitions = rules && rules.needDefinitions ? rules.needDefinitions : {};
    const attentionRules = rules && rules.attention ? rules.attention : {};
    const mildThreshold = attentionRules.mildThreshold || 45;
    const criticalThreshold = attentionRules.criticalThreshold || 25;
    const stats = isPlainObject(state.stats) ? state.stats : {};
    const needs = Object.keys(definitions).map(function(stat) {
      if (stat === 'energy' && state.mode === 'sleeping') {
        return null;
      }

      const value = Number(stats[stat]);
      if (!Number.isFinite(value) || value >= mildThreshold) {
        return null;
      }

      const severity = value < criticalThreshold ? 'critical' : 'mild';
      const definition = definitions[stat];
      return {
        id: stat,
        value: value,
        severity: severity,
        definition: definition,
        message: severity === 'critical' ? definition.criticalMessage : definition.mildMessage,
        deadlineMs: severity === 'critical'
          ? attentionRules.criticalDeadlineMs || 90000
          : attentionRules.deadlineMs || 180000
      };
    }).filter(Boolean);

    needs.sort(function(a, b) {
      if (a.severity !== b.severity) {
        return a.severity === 'critical' ? -1 : 1;
      }

      return a.value - b.value;
    });

    return needs[0] || null;
  }

  function recordCareMistakeCore(state, need, now) {
    const category = need.definition.category || 'physical';
    state.careMistakes[category] = (Number(state.careMistakes[category]) || 0) + 1;
    state.attention.lastMistakeAt = new Date(now).toISOString();
    state.patch.careStreak = 0;
    state.stats.health = (Number(state.stats.health) || 0) - (need.severity === 'critical' ? 8 : 4);
    state.stats.happiness = (Number(state.stats.happiness) || 0) - (need.severity === 'critical' ? 6 : 3);
  }

  function getNeedAnimationStateCore(needId) {
    const stateByNeed = {
      hydration: 'dry',
      nutrients: 'hungry',
      happiness: 'happy',
      cleanliness: 'dirty',
      energy: 'tired',
      health: 'sick'
    };
    return stateByNeed[needId] || 'idle';
  }

  function buildBattleSeed(state, now) {
    const rewards = state && state.battle && state.battle.rewards ? state.battle.rewards : {};
    const base = Math.floor(Number(now) || 1)
      + (Number(rewards.wins) || 0) * 9973
      + (Number(rewards.losses) || 0) * 3181
      + (Number(rewards.trophies) || 0) * 7919;
    return positiveModulo(base, 2147483646) + 1;
  }

  function createBattleOpponent(state, battleRules, seed) {
    const rewards = state && state.battle && state.battle.rewards ? state.battle.rewards : {};
    const trophies = Math.max(0, Number(rewards.trophies) || 0);
    const rank = 1 + Math.floor(trophies / 2);
    const firstRoll = nextRandom(seed);
    const secondRoll = nextRandom(firstRoll.seed);
    const speedLean = Math.round(firstRoll.value * 4);
    const focusLean = Math.round(secondRoll.value * 4);

    return {
      name: rank > 3 ? 'Mistrz grzybni' : 'Rywal grzybni',
      hp: 68 + rank * 8,
      stamina: 46 + rank * 5,
      strength: 9 + rank * 2,
      attack: 11 + rank * 2,
      defense: 9 + rank * 2,
      speed: 8 + rank * 2 + speedLean,
      focus: 8 + rank * 2 + focusLean
    };
  }

  function addBattleLog(battle, message, now, rules) {
    const maxEntries = rules && rules.maxLogEntries ? rules.maxLogEntries : 8;
    const entry = {
      at: new Date(Number(now) || Date.now()).toISOString(),
      text: message || 'Arena poruszyła grzybnię.'
    };
    battle.log = [entry].concat(Array.isArray(battle.log) ? battle.log : []).slice(0, maxEntries);
  }

  function nextRandom(seed) {
    const nextSeed = Math.imul(clampInteger(seed, 1, 2147483646, 1), 48271) % 2147483647;
    const safeSeed = nextSeed > 0 ? nextSeed : nextSeed + 2147483646;
    return {
      seed: safeSeed,
      value: safeSeed / 2147483647
    };
  }

  function isPlainObject(value) {
    return Boolean(value) && typeof value === 'object' && !Array.isArray(value);
  }

  function deepClone(value) {
    if (typeof value === 'undefined') {
      return undefined;
    }
    return JSON.parse(JSON.stringify(value));
  }

  function positiveModulo(value, size) {
    return ((value % size) + size) % size;
  }

  function clampInteger(value, min, max, fallback) {
    return Math.round(clampNumber(Number(value), min, max, fallback));
  }

  function clampNumber(value, min, max, fallback) {
    const next = Number.isFinite(value) ? value : fallback;
    return Math.min(max, Math.max(min, next));
  }

  function roundStatDelta(value) {
    return Math.round(value * 100) / 100;
  }

  function removeZeroDeltas(deltas) {
    return Object.keys(deltas).reduce(function(result, key) {
      if (Math.abs(deltas[key]) >= 0.01) {
        result[key] = deltas[key];
      }
      return result;
    }, {});
  }

  global.PieczargotchiCore = {
    calculateAmbientLife: calculateAmbientLife,
    calculateWeatherStatDeltas: calculateWeatherStatDeltas,
    classifyWeatherCondition: classifyWeatherCondition,
    applyBattleOutcomeRewards: applyBattleOutcomeRewards,
    chooseOpponentMove: chooseOpponentMove,
    createDefaultBattleState: createDefaultBattleState,
    deriveBattleStats: deriveBattleStats,
    evaluateAttentionState: evaluateAttentionState,
    getActionAvailability: getActionAvailability,
    getAnimationIntent: getAnimationIntent,
    isArenaUnlocked: isArenaUnlocked,
    migrateStateVersion: migrateStateVersion,
    normalizeBattleState: normalizeBattleState,
    resolveAttentionAction: resolveAttentionAction,
    resolveBattleRound: resolveBattleRound,
    resolveBattleTurn: resolveBattleTurn,
    startBattle: startBattle,
    trainBattleStat: trainBattleStat,
    defaultWeatherBalance: defaultWeatherBalance
  };
})(typeof window !== 'undefined' ? window : globalThis);
</script>
